flightiness:4,camouflage:1,sizeScore:5,movementPattern:"hopping",flightPattern:"bounding",behaviorNotes:"Typically hops on or near the ground, or sits in dense shrubs. Males often perch prominently to sing. Moderately wary; will flush if approached quickly."},rarity:"common",rarityColor:"#4caf50",points:100,verificationThreshold:.66,verificationMethods:1,description:"One of North America's most beloved birds and a year-round resident across the East. The male's blazing red plumage against winter snow has made him a cultural icon. Females are no less striking — warm brown with a red crest and a bill that can crack open the toughest sunflower seeds. Listen any morning for their ringing whistle from a shrubby perch.",funFacts:['Female cardinals also sing — a behavior rare among North American songbirds. A mated pair will sometimes exchange songs in a "duet" back and forth.','Male cardinals will sometimes feed females bill-to-bill during courtship — a behavior called "mate feeding" that continues through the breeding season.'],eBirdCode:"norcar",merlinId:"Northern_Cardinal"},{id:"american_robin",commonName:"American Robin",scientificName:"Turdus migratorius",family:"Turdidae",order:"Passeriformes",sizeCategory:"small",length_cm:[23,28],wingspan_cm:[31,41],weight_g:[72,94],appearance:{billShape:"thin",billSizeRelative:"medium",billColor:{male:"yellow",female:"yellow"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#2B3A2B",female:"#4A5A4A"},uiColor:"#C85A1E",secondaryColors:{male:["#C85A1E (breast)","#FAFAFA (eye ring, belly)","#F0C030 (bill)"],female:["#C85A1E (paler breast)","#FAFAFA (belly)","#F0C030 (bill)"]},distinctiveMarkings:{male:["Brick-orange breast and belly","Dark gray-black head and back","White eye ring (broken)","Yellow bill","White under-tail coverts"],female:["Paler orange breast than male","Brownish-gray head (not black)","Same white belly and yellow bill"],juvenile:["Spotted orange breast (thrush-family spotting)","Speckled back","This spotting disappears by late summer"]},plumageDescription:{male:"Dark gray-black above with a rich brick-orange breast. A white belly patches below; broken white eye ring and white throat streaks frame a yellow bill. Classic thrush shape — round body, short tail, strong legs.",female:"Similar but with a brownish-gray (not black) head and a slightly paler, peachier breast. Often told apart only by direct comparison.",juvenile:"The spotted juvenile robins of late spring/summer reveal the robin's thrush ancestry — orange breast covered in dark spots, back sprinkled with pale dots."}},primaryHabitat:["lawns","parks","open_woodland","gardens","suburban"],feedingLayer:"ground",flightStyle:"direct",socialBehavior:{breeding:"territorial_pairs",winter:"large_roosts"},typicalGroupSize:{min:1,max:200},activeHours:"diurnal",sound:{callDescription:'"Tut-tut-tut" alarm call; high thin "seee" for aerial predators',songDescription:'Cheerful caroling phrases: "cheerily, cheer up, cheer up, cheerily, cheer up". Arguably the most familiar bird song in North America. Begins singing before dawn.',loudness:7,callFrequency:8,singingSeason:{spring:"frequent",summer:"frequent",fall:"occasional",winter:"rare"},sounds:["tut","song","seee"]},seasons:{spring:{presence:"summer",commonness:"abundant"},summer:{presence:"summer",commonness:"abundant"},fall:{presence:"migrant",commonness:"common"},winter:{presence:"winter",commonness:"uncommon"}},range:"north_america",captureStats:{difficulty:2,speed:4,flightiness:3,camouflage:3,sizeScore:6,movementPattern:"hopping",flightPattern:"direct",behaviorNotes:"Runs across lawns in short bursts, stopping to cock its head and listen/watch for earthworms. Quite bold near humans. Flushes readily if approached quickly but returns soon."},rarity:"common",rarityColor:"#4caf50",points:80,verificationThreshold:.66,verificationMethods:1,description:"The herald of spring across North America. Robins are among the first birds to sing before dawn and among the last to fall silent at dusk. Their earthworm-hunting technique — running, stopping, tilting the head — is one of the most familiar sights in any suburban yard. Despite their familiarity, robins in winter congregate in massive roosts that can number in the thousands.",funFacts:["A robin doesn't actually hear earthworms through the ground — it sees them. That sideways head-tilt is tilting one eye toward the soil to get a better look.","American Robins can raise up to three broods in a single breeding season — the female starts building a new nest while the male still feeds the first brood."],eBirdCode:"amerob",merlinId:"American_Robin"},{id:"blue_jay",commonName:"Blue Jay",scientificName:"Cyanocitta cristata",family:"Corvidae",order:"Passeriformes",sizeCategory:"small",length_cm:[22,30],wingspan_cm:[34,43],weight_g:[70,100],appearance:{billShape:"thin",billSizeRelative:"medium",billColor:{male:"black",female:"black"},crestPresent:!0,crestColor:{male:"blue",female:"blue"},primaryColor:{male:"#4A7FBD",female:"#4A7FBD"},uiColor:"#4A7FBD",secondaryColors:{male:["#FAFAFA (face, belly)","#1A1A1A (necklace, wing bars)","#4A7FBD (crest, wings, tail)"],female:["Same as male — sexes look alike"]},distinctiveMarkings:{male:["Bright blue crest, wings, and tail","White face and underparts","Bold black necklace across throat/chest","White wing bars and tail corners","Black barring on wings and tail"],female:["Identical to male in appearance"],juvenile:["Duller blue than adults; crest shorter; gains adult plumage by first winter"]},plumageDescription:{male:'Unmistakable in flight and at rest. A blue corvid with a pointed crest, white face, and bold black "necklace" connecting the crest, eye, and collar. Blue wings show white wing bars and dark barring. The tail is long, blue, and prominently barred. Underparts white.',female:"Identical to male — one of the few songbirds where field separation of sexes is practically impossible without genetic testing.",juvenile:"Slightly duller blue tones in the first year, with a shorter crest. Nearly identical to adults by autumn."}},primaryHabitat:["deciduous_woodland","parks","suburban","oak_savanna"],feedingLayer:"multi",flightStyle:"direct",socialBehavior:{breeding:"pairs",winter:"family_groups"},typicalGroupSize:{min:1,max:10},activeHours:"diurnal",sound:{callDescription:'Loud, raucous "jay-jay-jay". Also mimics Red-tailed Hawk perfectly — used to alarm other birds or claim food.',songDescription:'A softer, gurgling "whisper song" rarely heard; usually replaced by call repertoire. Also "bell" calls, whistled notes, and many mimicked sounds.',loudness:9,callFrequency:8,singingSeason:{spring:"frequent",summer:"moderate",fall:"frequent",winter:"moderate"},sounds:["jay-call","hawk-mimic","bell","whisper-song"]},seasons:{spring:{presence:"resident",commonness:"common"},summer:{presence:"resident",commonness:"common"},fall:{presence:"resident",commonness:"common"},winter:{presence:"resident",commonness:"common"}},range:"eastern_north_america",captureStats:{difficulty:4,speed:5,flightiness:6,camouflage:2,sizeScore:6,movementPattern:"perching",flightPattern:"direct",behaviorNotes:"Moves between canopy and ground. Very alert — the first to sound an alarm when a predator appears. Bold and often noisy, but spooks quickly when directly approached. Stashes acorns and has excellent spatial memory."},rarity:"common",rarityColor:"#4caf50",points:110,verificationThreshold:.66,verificationMethods:1,description:"Bold, intelligent, and impossible to ignore — the Blue Jay is a corvid in every sense. They are accomplished mimics (their hawk imitation can clear a feeder), dedicated parents, and critical partners in oak forest expansion: they cache thousands of acorns each fall, many of which they never retrieve, planting the oaks of the future. Love them or hate them, a yard without Blue Jays is a quieter place.",funFacts:["A Blue Jay can carry multiple acorns at once — up to 5 in its throat pouch, bill, and esophagus. One study estimated a single jay moved 4,500 acorns in a single fall.","Blue Jays are brilliant mimics — they frequently copy Red-tailed Hawk calls, apparently to alert other jays or to scatter birds from feeders so they can feed in peace."],eBirdCode:"blujay",merlinId:"Blue_Jay"},{id:"black_capped_chickadee",commonName:"Black-capped Chickadee",scientificName:"Poecile atricapillus",family:"Paridae",order:"Passeriformes",sizeCategory:"tiny",length_cm:[12,15],wingspan_cm:[16,21],weight_g:[9,14],appearance:{billShape:"thin",billSizeRelative:"tiny",billColor:{male:"black",female:"black"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#808080",female:"#808080"},uiColor:"#2B6CB0",secondaryColors:{male:["#1A1A1A (cap, bib)","#FAFAFA (cheeks)","#F5E6C8 (flanks)","#808080 (back, wings)"],female:["Sexes look alike"]},distinctiveMarkings:{male:["Bold black cap","Large white cheek patch","Black throat bib","Rusty-buff flanks","Gray back","White wing edges"],female:["Identical to male in field conditions"],juvenile:["Identical to adults; some have a slightly brownish tinge to the cap"]},plumageDescription:{male:'A tiny, round bird with an oversized head. The black cap and black throat bib are separated by large, pillowy white cheek patches. Back and wings are gray; flanks are washed warm buff. White edges on wing feathers create a delicate "etched" look. Constantly in motion.',female:"Identical to male — impossible to tell apart in the field.",juvenile:"Adults by their first fall; the black and white pattern is clean and crisp from the start."}},primaryHabitat:["deciduous_woodland","mixed_forest","suburban","parks","feeders"],feedingLayer:"canopy",flightStyle:"undulating",socialBehavior:{breeding:"pairs",winter:"mixed_flocks"},typicalGroupSize:{min:2,max:12},activeHours:"diurnal",sound:{callDescription:'"Chick-a-dee-dee-dee" — the classic call that names the species. More "dee" notes = greater perceived threat. A perfect alarm system.',songDescription:'Clear, whistled "fee-bee" or "fee-bee-ee" — two or three notes in descending pitch, like a tiny flute. Often heard in late winter before spring fully arrives.',loudness:6,callFrequency:9,singingSeason:{spring:"frequent",summer:"moderate",fall:"frequent",winter:"frequent"},sounds:["chick-a-dee","fee-bee","gargle"]},seasons:{spring:{presence:"resident",commonness:"common"},summer:{presence:"resident",commonness:"common"},fall:{presence:"resident",commonness:"common"},winter:{presence:"resident",commonness:"common"}},range:"northern_north_america",captureStats:{difficulty:5,speed:7,flightiness:3,camouflage:4,sizeScore:2,movementPattern:"darting",flightPattern:"undulating",behaviorNotes:"Tiny and hyperactive — never still for more than a few seconds. Hangs upside-down from branch tips to reach insects. Paradoxically bold around humans; will sometimes land on an outstretched hand at feeders. The challenge is their size and constant motion."},rarity:"common",rarityColor:"#4caf50",points:120,verificationThreshold:.66,verificationMethods:1,description:`Possibly the most cheerful bird in North America. Chickadees stay through the harshest winters, traveling in small flocks through frozen forests, finding insects in bark crevices that no other bird can reach. They have a sophisticated social system and can lower their body temperature at night to conserve energy — a feat called "regulated hypothermia." Their alarm calls carry so much information about a predator's size, speed, and danger level that other species have learned to listen.`,funFacts:["Every autumn, a chickadee's hippocampus (the memory center of the brain) actually grows larger to handle thousands of new food cache locations. It shrinks again in spring.","Chickadees on the edge of a sleeping flock keep one eye open, watching for predators — a form of sentinel behavior that keeps the whole group safer."],eBirdCode:"bkcchi",merlinId:"Black-capped_Chickadee"},{id:"american_goldfinch",commonName:"American Goldfinch",scientificName:"Spinus tristis",family:"Fringillidae",order:"Passeriformes",sizeCategory:"tiny",length_cm:[11,14],wingspan_cm:[19,22],weight_g:[11,20],appearance:{billShape:"conical",billSizeRelative:"small",billColor:{male:"pink-orange",female:"dull-pink"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#FFD700",female:"#B8A840"},uiColor:"#FFD700",secondaryColors:{male:["#1A1A1A (forehead cap, wings, tail)","#FAFAFA (wing bars, rump)","#F0A040 (bill)"],female:["#B8A840 (olive-yellow body)","#1A1A1A (wings)","#FAFAFA (wing bars)"]},distinctiveMarkings:{male:["Brilliant lemon-yellow body (breeding)","Black forehead cap","Black wings with white wing bars","White rump","Stubby pink-orange bill","Winter: olive-yellow, no black cap"],female:["Dull olive-yellow; no black cap","White wing bars on black-ish wings","Paler below than above","Year-round plumage similar to male winter"],juvenile:["Similar to female; buffy wing bars instead of white"]},plumageDescription:{male:"Summer male is electric: pure lemon-yellow with a small black cap on the forehead, jet-black wings with white wing bars, white rump. Winter male molts to olive-yellow, loses the black cap, and becomes almost unrecognizable until spring.",female:"Olive-yellow throughout the year — brighter in summer, duller in winter. Black wings with white bars. Often overlooked despite being present at most nyjer seed feeders.",juvenile:"Resembles female; buffy rather than white wing bars. Acquires adult plumage in first autumn."}},primaryHabitat:["fields","meadows","weedy_areas","feeders","open_woodland"],feedingLayer:"shrub",flightStyle:"undulating",socialBehavior:{breeding:"loose_colonies",winter:"flocks"},typicalGroupSize:{min:2,max:40},activeHours:"diurnal",sound:{callDescription:'"Per-chick-o-ree" or "po-ta-to-chip" call given in flight — this bouncy phrase perfectly matches the undulating flight pattern.',songDescription:"Long, canary-like warble of rapid twitters, trills, and chips. Energetic and sustained.",loudness:5,callFrequency:8,singingSeason:{spring:"moderate",summer:"frequent",fall:"occasional",winter:"rare"},sounds:["per-chick-o-ree","song-warble","contact-call"]},seasons:{spring:{presence:"resident",commonness:"common"},summer:{presence:"summer",commonness:"common"},fall:{presence:"migrant",commonness:"common"},winter:{presence:"winter",commonness:"uncommon"}},range:"north_america",captureStats:{difficulty:5,speed:6,flightiness:5,camouflage:2,sizeScore:2,movementPattern:"darting",flightPattern:"undulating",behaviorNotes:"Feeds acrobatically on seed heads — hanging sideways, upside-down. In flocks, individuals are scattered and constantly moving. The undulating flight — rise on wingbeats, dip on wing-fold — makes tracking in binoculars tricky."},rarity:"common",rarityColor:"#4caf50",points:115,verificationThreshold:.66,verificationMethods:1,description:"New Jersey's state bird and a frequent visitor to nyjer seed feeders. The male in breeding plumage is one of the most vivid birds in North America — a flying lemon with a black beret. Goldfinches are unusual songbirds in that they wait until July or August to nest, timing their breeding to peak thistle-seed abundance. They weave spider silk into their nests, which stretches as the nestlings grow.",funFacts:["Goldfinch nests are so tightly woven they can hold water. If it rains during an early cold snap, the young have been known to drown — one reason late breeding evolved.","American Goldfinches are one of the strictest vegetarians in North America — they feed almost exclusively on seeds and will pick individual insects off seeds if one gets in the way."],eBirdCode:"amegfi",merlinId:"American_Goldfinch"},{id:"mallard",commonName:"Mallard",scientificName:"Anas platyrhynchos",family:"Anatidae",order:"Anseriformes",sizeCategory:"large",length_cm:[50,65],wingspan_cm:[81,98],weight_g:[720,1600],appearance:{billShape:"spatulate",billSizeRelative:"large",billColor:{male:"yellow-orange",female:"orange-black m ng:"frequent",summer:"moderate",fall:"moderate",winter:"moderate"},sounds:["quack","raeb","grunt","whistle"]},seasons:{spring:{presence:"resident",commonness:"abundant"},summer:{presence:"resident",commonness:"common"},fall:{presence:"resident",commonness:"abundant"},winter:{presence:"resident",commonness:"common"}},range:"northern_hemisphere",captureStats:{difficulty:2,speed:2,flightiness:3,camouflage:4,sizeScore:8,movementPattern:"swimming",flightPattern:"direct",behaviorNotes:"Swims slowly on open water; dabbles with head submerged for aquatic vegetation. Accustomed to humans in urban parks — often approaches rather than flees. Large size makes centering easy; slow movement means patience is the only skill required."},rarity:"common",rarityColor:"#4caf50",points:90,verificationThreshold:.66,verificationMethods:1,description:"The world's most familiar duck and the ancestor of almost every domestic duck breed. Mallards are found on every continent except Antarctica and have adapted perfectly to city parks, drainage ditches, and golf course ponds. Watch for the courtship displays in winter — groups of males circle females with elaborate head-pumping, wing-flap, and whistle sequences that look choreographed.",funFacts:['Mallards can sleep with one eye open and half their brain awake — a phenomenon called unihemispheric slow-wave sleep. Ducks at the edge of a flock keep the "outer eye" open, watching for predators.',"A Mallard hen will feign a broken wing to lead predators away from her ducklings — one of the most effective distraction displays in the bird world."],eBirdCode:"mallar3",merlinId:"Mallard"},{id:"red_tailed_hawk",commonName:"Red-tailed Hawk",scientificName:"Buteo jamaicensis",family:"Accipitridae",order:"Accipitriformes",sizeCategory:"large",length_cm:[45,65],wingspan_cm:[110,145],weight_g:[690,1460],appearance:{billShape:"hooked",billSizeRelative:"large",billColor:{male:"gray-yellow",female:"gray-yellow"},crestPresent:!1,crestColor:{male:null,female:null ce:"winter",commonness:"uncommon"}},range:"north_america",captureStats:{difficulty:5,speed:1,flightiness:6,camouflage:6,sizeScore:10,movementPattern:"stalking",flightPattern:"soaring",behaviorNotes:"Stands motionless in shallow water for minutes — sometimes hours — before a lightning-fast strike. In binoculars view, barely moves; the challenge is its distance from shore and its wariness. Will take long, low flight away if alarmed. Reward for patience: one of the most spectacular birds on the continent."},rarity:"uncommon",rarityColor:"#2196f3",points:280,verificationThreshold:.85,verificationMethods:2,description:'Standing four feet tall with a six-foot wingspan, the Great Blue Heron is a living dinosaur. They are consummate hunters — that statue-still pose in the shallows is pure predatory patience, followed by a strike too fast to see. They eat fish, frogs, voles, small birds, even snakes. Colonial nesters called "heronries" can host hundreds of pairs, their giant stick nests filling the tops of tall trees like a fairy-tale forest.',funFacts:[`A heron's neck can strike with such speed and force that biologists call it a "biological spear gun." The S-curve of the neck stores elastic energy like a spring, releasing it in a strike faster than the eye can follow.`,"Great Blue Herons often hunt by standing completely motionless for minutes at a time, then striking in less than a second — patience refined to an evolutionary art."],eBirdCode:"greher",merlinId:"Great_Blue_Heron"},{id:"mourning_dove",commonName:"Mourning Dove",scientificName:"Zenaida macroura",family:"Columbidae",order:"Columbiformes",sizeCategory:"small",length_cm:[22,36],wingspan_cm:[37,45],weight_g:[96,170],appearance:{billShape:"thin",billSizeRelative:"small",billColor:{male:"dark gray",female:"dark gray"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#C4A882",female:"#C4A882"},uiColor:"#C4A882",distinctiveMarkings:{male:["Soft buffy-brown overall","Small black spot below ear", s a prolific breeder — pairs can raise up to six broods per year. It swallows seeds whole and stores them in its crop, returning to a perch to digest.",funFacts:["Mourning Doves can drink by sucking water like a straw, without lifting their heads — a trick shared by very few birds.",`A Mourning Dove's crop produces "crop milk" — a protein-rich secretion fed to nestlings that is chemically similar to mammal milk, made by both parents.`],eBirdCode:"moudov",merlinId:"Mourning_Dove"},{id:"american_crow",commonName:"American Crow",scientificName:"Corvus brachyrhynchos",family:"Corvidae",order:"Passeriformes",sizeCategory:"medium",length_cm:[40,53],wingspan_cm:[85,100],weight_g:[316,620],appearance:{billShape:"hooked",billSizeRelative:"large",billColor:{male:"black",female:"black"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#1A1A1A",female:"#1A1A1A"},uiColor:"#4A4A5A",distinctiveMarkings:{male:["All black with glossy blue-violet iridescence","Fan-shaped tail","Heavy bill",'Loud "caw caw" call'],female:["Identical to male"],juvenile:["Duller black, brighter blue mouth lining"]},plumageDescription:{male:"Entirely black with a blue-violet gloss in good light. Heavy rounded bill, fan-shaped tail (distinguish from Fish Crow and Common Raven). Legs and feet black.",female:"Identical to male.",juvenile:"Dull black without gloss; gape (corner of bill) bright blue, fading by first winter."}},primaryHabitat:["woodland_edge","farmland","urban","parks","roadsides"],feedingLayer:"multi",flightStyle:"direct",socialBehavior:{breeding:"cooperative_family_groups",winter:"large_roosts"},typicalGroupSize:{min:2,max:500},activeHours:"diurnal",sound:{callDescription:'Loud, harsh "caw caw caw" — endlessly varied. Also rattles, clicks, and mimics other sounds.',songDescription:"No true song; communicates with a complex vocabulary of caws, rattles, and coos.",loudness:9,callFrequency:9,singingSeason:{spring:"frequent",summer:"frequent",fall:"frequent",winter:"frequent "Song Sparrows have regional dialects — birds in different areas sing noticeably different versions of the song, similar to regional accents in human speech.",'A male Song Sparrow learns his song partly from his father and partly from neighboring males — he then "crystallizes" his personal version early in his first spring and sings it for life.'],eBirdCode:"sonspa",merlinId:"Song_Sparrow"},{id:"downy_woodpecker",commonName:"Downy Woodpecker",scientificName:"Dryobates pubescens",family:"Picidae",order:"Piciformes",sizeCategory:"small",length_cm:[14,18],wingspan_cm:[25,31],weight_g:[20,33],appearance:{billShape:"spear",billSizeRelative:"small",billColor:{male:"gray",female:"gray"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#FAFAFA",female:"#FAFAFA"},uiColor:"#CC2222",distinctiveMarkings:{male:["Black and white checkered pattern","Bold white back stripe","Red spot on back of head","Small stubby bill"],female:["Identical but no red head spot"],juvenile:["Red cap (both sexes), loses to adult pattern by fall"]},plumageDescription:{male:"Boldly patterned in black and white. A broad white stripe runs down the center of the back. The head has bold black-and-white stripes, and males show a small red patch on the nape. Tiny bill — notably shorter than the Hairy Woodpecker, its near-identical larger cousin.",female:"Same pattern as male but lacks the red nape patch.",juvenile:"Both sexes have a red cap in juvenile plumage."}},primaryHabitat:["woodland","woodland_edge","gardens","orchards","parks"],feedingLayer:"canopy",flightStyle:"undulating",socialBehavior:{breeding:"territorial_pairs",winter:"solitary_or_mixed_flocks"},typicalGroupSize:{min:1,max:2},activeHours:"diurnal",sound:{callDescription:'Sharp "pik!" — higher and softer than Hairy Woodpecker.',songDescription:"Rapid whinny descending in pitch. Also drums on resonant wood.",loudness:5,callFrequency:6,singingSeason:{spring:"frequent",summer:"moderate",fall:"occasional",winter:"occasional"}}, shape","Yellow bill in spring"],female:["Similar to male; bill base pink in female vs. blue in male"],juvenile:["Plain gray-brown, transitioning to adult spottedness"]},plumageDescription:{male:'In summer a glossy, oil-slick mix of iridescent green and purple. In winter the feather tips show white spots that gradually wear away by spring. The short tail and triangular wing shape make it look like a "flying arrowhead" in flight.',female:"Nearly identical to male; distinguished by the pinkish-tan base to the lower mandible (blue in males).",juvenile:"Uniformly grayish-brown, molting into spotted adult plumage through the first winter."}},primaryHabitat:["urban","farmland","parks","woodland_edge"],feedingLayer:"ground",flightStyle:"direct",socialBehavior:{breeding:"loosely_colonial",winter:"massive_flocks"},typicalGroupSize:{min:1,max:1e5},activeHours:"diurnal",sound:{callDescription:"Raspy, varied — whistles, rattles, clicks, and an extraordinary range of mimicry.",songDescription:"A rambling medley of whistles and rattles, often including perfect mimicry of other birds' calls.",loudness:7,callFrequency:8,singingSeason:{spring:"frequent",summer:"moderate",fall:"moderate",winter:"moderate"}},seasons:{spring:{presence:"resident",commonness:"very_common"},summer:{presence:"resident",commonness:"very_common"},fall:{presence:"resident",commonness:"very_common"},winter:{presence:"resident",commonness:"very_common"}},captureStats:{difficulty:3,speed:5,flightiness:4,camouflage:3,sizeScore:4,movementPattern:"walking",captureBackground:"urban_edge",flightPattern:"direct",behaviorNotes:"Walks briskly with head-bobbing gait. Often in large noisy flocks. Winter murmurations are spectacular."},rarity:"common",rarityColor:"#4caf50",points:-15,introduced:!0,invasiveNote:"Released in Central Park in 1890 by Eugene Schieffelin, who wanted to introduce every bird mentioned by Shakespeare. The result: 200 million starlings across North America. Starlings evict woodpeckers, Purple Martins, and bluebirds from nest cavities — sometimes killing the occupants. Spectacular murmurations cannot undo the ecological damage.",verificationThreshold:.6,verificationMethods:1,description:"Introduced from Europe in the 1890s when Shakespeare enthusiasts released 60 birds in Central Park, the European Starling has become one of North America's most abundant birds with over 200 million individuals. Their winter murmurations — swirling flocks of thousands moving in perfect synchrony — are among the most spectacular wildlife sights on earth.",funFacts:["A murmuration of starlings can contain a million birds and move as a single fluid organism. Each bird tracks its seven nearest neighbors, and the information wave travels through the flock faster than any individual can process.","European Starlings were introduced to Central Park in 1890 by a Shakespeare enthusiast who wanted to establish every bird mentioned in Shakespeare's works in North America. Today there are over 200 million in North America."],eBirdCode:"eursta",merlinId:"European_Starling"},{id:"red_winged_blackbird",commonName:"Red-winged Blackbird",scientificName:"Agelaius phoeniceus",family:"Icteridae",order:"Passeriformes",sizeCategory:"small",length_cm:[17,23],wingspan_cm:[31,40],weight_g:[32,77],appearance:{billShape:"spear",billSizeRelative:"medium",billColor:{male:"black",female:"brown"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#1A1A1A",female:"#5A4030"},uiColor:"#CC3311",distinctiveMarkings:{male:["All black with brilliant red-and-yellow epaulets","Epaulets hidden when at rest, flashed during display"],female:["Heavily streaked brown — looks like a large sparrow","Slightly rusty eyebrow"],juvenile:["Similar to female"]},plumageDescription:{male:"Jet black with unmistakable red-and-yellow shoulder patches (epaulets). Males can conceal or display the red patch — a concealed bird looks plain black, a displaying male blazes.",female:"Heavily streaked brown with a hint of rusty tones — so different from males that they were once described as a separate species.",juvenile:"Similar to female."}},primaryHabitat:["wetlands","marshes","meadows","farmland","roadside"],feedingLayer:"ground",flightStyle:"direct",socialBehavior:{breeding:"polygynous_territories",winter:"huge_flocks"},typicalGroupSize:{min:1,max:1e3},activeHours:"diurnal",sound:{callDescription:'Loud "chek" or "tseee" alarm.',songDescription:'The iconic "conk-a-ree!" — a liquid gurgling trill, usually from a cattail perch.',loudness:8,callFrequency:8,singingSeason:{spring:"frequent",summer:"frequent",fall:"occasional",winter:"rare"}},seasons:{spring:{presence:"resident",commonness:"very_common"},summer:{presence:"resident",commonness:"very_common"},fall:{presence:"migrant",commonness:"common"},winter:{presence:"partial_migrant",commonness:"uncommon"}},captureStats:{difficulty:3,speed:5,flightiness:5,camouflage:2,sizeScore:4,movementPattern:"perching",flightPattern:"direct",behaviorNotes:"Males perch conspicuously on cattails and sing constantly. Aggressively defends territory against much larger intruders including hawks."},rarity:"common",rarityColor:"#4caf50",points:100,verificationThreshold:.65,verificationMethods:1,description:`The Red-winged Blackbird may be the most numerous bird in North America — population estimates approach 250 million. The male's "conk-a-ree" from a cattail perch is the defining sound of spring wetlands. Males are fiercely territorial and regularly dive-bomb hawks, crows, and humans who approach nests.`,funFacts:["A male Red-winged Blackbird may have up to 15 females nesting in his territory simultaneously — one of the most polygynous birds in North America.","Red-winged Blackbirds are one of the most numerous birds in North America, with an estimated 130–190 million individuals — yet their population has declined significantly due to agricultural changes."],eBirdCode:"rewbla",merlinId:"Red-winged_Blackbird"},{id:"canada_goose",commonName:"Canada Goose scription:"The Canada Goose's seasonal V-formations overhead are one of the iconic signals of autumn in North America. Once genuinely migratory, many urban populations have gone resident year-round, thriving on parks, golf courses, and manicured lawns. Mated pairs bond for life, and both parents vigorously defend chicks — triggering many a suburban standoff.",funFacts:["Geese fly in V-formation because each bird's wingtip vortex creates an uplift for the bird behind. The lead goose works hardest — so the formation rotates leadership to share the effort.","Canada Geese mate for life and grieve visibly when a partner dies — remaining near the body and sometimes not joining the flock migration for weeks afterward."],eBirdCode:"cangoo",merlinId:"Canada_Goose"},{id:"osprey",commonName:"Osprey",scientificName:"Pandion haliaetus",family:"Pandionidae",order:"Accipitriformes",sizeCategory:"large",length_cm:[52,60],wingspan_cm:[150,180],weight_g:[1200,2050],appearance:{billShape:"hooked",billSizeRelative:"large",billColor:{male:"blue-gray/black",female:"blue-gray/black"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#3A3020",female:"#3A3020"},uiColor:"#5A8080",distinctiveMarkings:{male:["Dark brown above, white below","White head with bold dark eye stripe","Distinctive wrist patches (dark carpal patches) in flight",'Bowed wings in flight ("M" shape)'],female:["Brown necklace across upper breast"],juvenile:["Pale edges on back feathers give scaled appearance"]},plumageDescription:{male:"Dark chocolate-brown above and bright white below. The white head sports a bold dark stripe through the eye. In flight the long, bowed wings with dark carpal patches are unmistakable — no other raptor looks quite like it.",female:"Nearly identical to male but typically shows a brown necklace across the breast.",juvenile:"Similar to adult but back feathers edged with pale buff, giving a scaled look."}},primaryHabitat:["coastlines","rivers","lakes","estuaries","reservoirs"],feedingLayer:"aerial",flightStyle:"soaring",socialBehavior:{breeding:"monogamous_pairs",winter:"solitary"},typicalGroupSize:{min:1,max:2},activeHours:"diurnal",sound:{callDescription:'High, whistled "cheep-cheep-cheep" or "kyew kyew kyew" — surprisingly small-sounding for such a large bird.',songDescription:"No song; communicates with high whistled calls.",loudness:6,callFrequency:4,singingSeason:{spring:"moderate",summer:"moderate",fall:"occasional",winter:"rare"}},seasons:{spring:{presence:"migrant_and_breeder",commonness:"uncommon"},summer:{presence:"breeder",commonness:"uncommon"},fall:{presence:"migrant",commonness:"uncommon"},winter:{presence:"absent_most_of_US",commonness:"rare"}},captureStats:{difficulty:7,speed:7,flightiness:6,camouflage:2,sizeScore:8,movementPattern:"soaring",flightPattern:"soaring",behaviorNotes:"Hunts by hovering over water then plunge-diving feet-first. Perches conspicuously on dead snags near water. Usually detected by call."},rarity:"uncommon",rarityColor:"#2196f3",points:200,verificationThreshold:.75,verificationMethods:1,description:"The Osprey is a specialist fish hunter found on every continent except Antarctica. It is one of the great conservation success stories — DDT nearly wiped it out, but after the ban it has fully recovered across North America. Watching an Osprey stall in a hover, then fold its wings and plunge 30 feet into water feet-first to seize a fish is one of nature's great spectacles.",funFacts:["Ospreys have reversible outer toes and barbed pads on the feet specifically to grip slippery fish — and they always rotate their catch to face forward in flight for aerodynamics.","Ospreys dive feet-first and can submerge completely to catch fish — then use their dense, oiled plumage to shake off water like a dog before flying away."],eBirdCode:"osprey",merlinId:"Osprey"},{id:"eastern_bluebird",commonName:"Eastern Bluebird",scientificName:"Sialia sialis",family:"Turdidae",order:"Passeriformes",sizeCategory:"small",lengt :.75,verificationMethods:1,description:"The Eastern Bluebird is a symbol of happiness and spring across the eastern US. It nearly vanished in the 20th century as competition with introduced House Sparrows and European Starlings for nest cavities sent populations plummeting. A massive citizen-science effort to install nest boxes reversed the decline — millions of boxes now line trails, roadsides, and farmland, and the species has fully recovered.",funFacts:["The Eastern Bluebird's color isn't from pigment — the feathers contain no blue dye. The blue is produced by the microscopic structure of the feather barbs scattering light, similar to how the sky is blue.",'Eastern Bluebird populations crashed in the mid-20th century due to competition from introduced starlings and sparrows for nest cavities — the "Bluebird Trail" movement, placing nest boxes along rural roads, helped bring them back.'],eBirdCode:"easblu",merlinId:"Eastern_Bluebird"},{id:"ruby_throated_hummingbird",commonName:"Ruby-throated Hummingbird",scientificName:"Archilochus colubris",family:"Trochilidae",order:"Apodiformes",sizeCategory:"tiny",length_cm:[7,9],wingspan_cm:[8,11],weight_g:[2,6],appearance:{billShape:"thin",billSizeRelative:"massive",billColor:{male:"black",female:"black"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#2A5A20",female:"#2A5A20"},uiColor:"#CC1122",distinctiveMarkings:{male:["Iridescent green upperparts","Brilliant ruby-red gorget (throat)","White chest and belly","Forked tail","Hovers at flowers"],female:["Green above, white below","No red throat","Rounded tail with white tips"],juvenile:["Similar to female"]},plumageDescription:{male:"Glittering emerald-green above. The throat gorget blazes ruby-red in good light but looks black at the wrong angle. White chest and belly, notched tail.",female:"Green above, white below with faint streaking on throat. White-tipped outer tail feathers.",juvenile:"Resembles female."}},primaryHabitat:["gardens","woodland_edge","orchards","meadows"],feedingLayer:"aerial",flightStyle:"hovering",socialBehavior:{breeding:"solitary_males",winter:"solitary"},typicalGroupSize:{min:1,max:1},activeHours:"diurnal",sound:{callDescription:'Soft "tseep" or "chewp." Wing beats produce an audible hum.',songDescription:"Series of rapid chipping notes; no true song.",loudness:2,callFrequency:4,singingSeason:{spring:"moderate",summer:"moderate",fall:"rare",winter:"absent"}},seasons:{spring:{presence:"migrant_and_breeder",commonness:"uncommon"},summer:{presence:"breeder",commonness:"uncommon"},fall:{presence:"migrant",commonness:"uncommon"},winter:{presence:"absent",commonness:"absent"}},captureStats:{difficulty:9,speed:10,flightiness:8,camouflage:2,sizeScore:1,movementPattern:"hovering",flightPattern:"hovering",behaviorNotes:"Extremely fast — can fly backwards, sideways, and hover perfectly. Defends feeders and flower patches aggressively. Blink and you miss it."},rarity:"uncommon",rarityColor:"#2196f3",points:250,verificationThreshold:.8,verificationMethods:1,description:"The only hummingbird that breeds in the eastern US, the Ruby-throated is a marvel of miniaturized engineering. Its heart beats over 1,200 times per minute in flight. It crosses the Gulf of Mexico non-stop — 800 miles over open water — twice a year on migration, fueled by fat reserves that double its body weight before departure. A single nest, the size of half a walnut, is made of plant fibers bound with spider silk.",funFacts:["A Ruby-throated Hummingbird in migration can double its body weight in fat reserves — then burn it all off crossing the Gulf of Mexico in an 18-20 hour non-stop flight.","A hummingbird's heart beats up to 1,260 times per minute in flight — and they enter torpor at night, lowering their body temperature by 50°F to save energy while sleeping."],eBirdCode:"rthhum",merlinId:"Ruby-throated_Hummingbird"},{id:"cedar_waxwing",commonName:"Cedar Waxwing",scientificName:"Bombycilla cedrorum",family:"Bombycillidae",order:"Passeriformes",sizeCategory:"small",length_cm:[14,17],wingspan_cm:[22,30],weight_g:[30,40],appearance:{billShape:"thin",billSizeRelative:"small",billColor:{male:"black",female:"black"},crestPresent:!0,crestColor:{male:"brown",female:"brown"},primaryColor:{male:"#9B7B55",female:"#9B7B55"},uiColor:"#CC8822",distinctiveMarkings:{male:["Silky warm-brown body","Sleek crest","Black mask","Yellow tail tip","Red waxy wing tips","Lemon-yellow belly"],female:["Nearly identical to male"],juvenile:["Streaky, lacks wax tips; face mask faint"]},plumageDescription:{male:"One of the most elegantly-groomed birds in North America. Silky warm-brown with a sleek crest, black mask, lemon-yellow belly, yellow tail tip, and the namesake red waxy droplets on wing feather tips.",female:"Nearly identical to male; slightly less red wax, slighter mask.",juvenile:"Streaky brown, lacks wax tips until first winter."}},primaryHabitat:["woodland","orchards","gardens","fruiting_trees","streamsides"],feedingLayer:"canopy",flightStyle:"undulating",socialBehavior:{breeding:"loose_colonies",winter:"nomadic_flocks"},typicalGroupSize:{min:5,max:200},activeHours:"diurnal",sound:{callDescription:'High, thin "seee" — a pure high-pitched whistle, often the first sign of a passing flock overhead.',songDescription:'High trilled "sreeee"; thin whistle notes.',loudness:4,callFrequency:8,singingSeason:{spring:"frequent",summer:"frequent",fall:"moderate",winter:"moderate"}},seasons:{spring:{presence:"resident",commonness:"uncommon"},summer:{presence:"resident",commonness:"uncommon"},fall:{presence:"nomadic",commonness:"common"},winter:{presence:"nomadic",commonness:"common"}},captureStats:{difficulty:6,speed:6,flightiness:6,camouflage:3,sizeScore:3,movementPattern:"perching",flightPattern:"undulating",behaviorNotes:"Appears suddenly in fruiting trees, strips them, and moves on. Listen for the high seee calls overhead. Flocks are compact and coordinated."},rarity:"uncommon",rarityColor:"#2196f3",points:200,verificationThreshold:.75,verificationMethods:1,description:"Cedar Waxwings are wandering nomads, following fruit crops across the continent rather than fixed territories. They are famous for their elegant appearance and for passing berries beak-to-beak down a perched line of birds — a social display of fruit-sharing. They have been observed getting drunk on fermented berries, stumbling around until they sober up.",funFacts:["Cedar Waxwings sometimes pass berries beak-to-beak down a row of perched birds — apparently a courtship or social bonding behavior. They also get intoxicated on fermented fruits and have been found unable to fly.","The red waxy tips on Cedar Waxwing wing feathers are actually extensions of the feather shafts — like tiny red beads — and older birds have more of them, making age visible at a glance."],eBirdCode:"cedwax",merlinId:"Cedar_Waxwing"},{id:"turkey_vulture",commonName:"Turkey Vulture",scientificName:"Cathartes aura",family:"Cathartidae",order:"Cathartiformes",sizeCategory:"very_large",length_cm:[62,81],wingspan_cm:[160,183],weight_g:[854,2260],appearance:{billShape:"hooked",billSizeRelative:"large",billColor:{male:"ivory-white",female:"ivory-white"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#2A1A10",female:"#2A1A10"},uiColor:"#CC3311",distinctiveMarkings:{male:["All dark body","Naked red head (adult)","Silvery wing lining from below",'Soars in a "V" (dihedral) with much teetering'],female:["Identical to male"],juvenile:["Gray head instead of red"]},plumageDescription:{male:"All dark brown-black body. The naked red head is the key adult field mark — a featherless head helps when feeding inside carcasses. From below, the flight feathers are silvery, contrasting with darker wing linings.",female:"Identical to male.",juvenile:"Gray-headed; bill dark-tipped."}},primaryHabitat:["open_country","roadsides","farmland","forest_edge","thermals"],feedingLayer:"aerial",flightStyle:"soaring",socialBehavior:{breeding:"loose_colonies",winter:"large_roosts"},typicalGroupSize:{min:1,max:50},activeHours:"diurnal",sound:{callDescription:"Essentially silent — only produces hisses and grunts. No vocal organ.",songDescription:"No song; lacks a syrinx (voice organ).",loudness:1,callFrequency:1,singingSeason:{spring:"rare",summer:"rare",fall:"rare",winter:"rare"}},seasons:{spring:{presence:"migrant_and_breeder",commonness:"common"},summer:{presence:"breeder",commonness:"common"},fall:{presence:"migrant",commonness:"common"},winter:{presence:"partial_migrant",commonness:"uncommon"}},captureStats:{difficulty:5,speed:6,flightiness:5,camouflage:2,sizeScore:9,movementPattern:"soaring",flightPattern:"soaring",behaviorNotes:'Soars in wide circles on thermals, rocking side to side in a "V." Locate by scanning the sky rather than the ground.'},rarity:"common",rarityColor:"#4caf50",points:130,verificationThreshold:.7,verificationMethods:1,description:"The Turkey Vulture is nature's sanitation crew, and arguably one of the most important birds in the ecosystem. It locates carrion primarily by smell — extraordinarily rare among birds — using one of the most highly developed olfactory systems in the animal kingdom. Its stomach acid is powerful enough to destroy anthrax, botulism, and cholera, preventing these diseases from spreading through the environment.",funFacts:["Turkey Vultures are one of the only birds that find food primarily by smell. They have a greatly enlarged olfactory lobe in the brain and can detect a dead animal hidden under forest canopy from a mile away.",'Turkey Vultures practice "urohidrosis" — they urinate on their own legs to cool down. The evaporating liquid lowers their temperature, similar to sweating, and the uric acid may also kill bacteria from standing on carcasses.'],eBirdCode:"turvul",merlinId:"Turkey_Vulture"},{id:"common_grackle",commonName:"Common Grackle",scientificName:"Quiscalus quiscula",family:"Icteridae",order:"Passeriformes",sizeCategory:"small",length_cm:[28,34],wingspan_
