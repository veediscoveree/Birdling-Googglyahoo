# Nginx reverse proxy — handles large file uploads, timeouts, and TLS termination
#
# For 100 GB datasets:
#   client_max_body_size 50g  → allows individual files up to 50 GB
#   proxy_read_timeout 3600s  → 1-hour timeout for large upload processing
#   proxy_send_timeout 3600s  → prevents timeout on slow connections
#
# In production, put TLS here (certbot / Let's Encrypt):
#   listen 443 ssl;
#   ssl_certificate /etc/letsencrypt/live/yourdomain/fullchain.pem;
#   ssl_certificate_key /etc/letsencrypt/live/yourdomain/privkey.pem;

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  sendfile            on;
  tcp_nopush          on;
  tcp_nodelay         on;
  keepalive_timeout   65;
  types_hash_max_size 2048;

  # ── Upload size limit: 50 GB per file ───────────────────────────────────────
  client_max_body_size 50g;

  # ── Timeouts for large uploads ───────────────────────────────────────────────
  proxy_connect_timeout    60s;
  proxy_send_timeout       3600s;    # 1 hour
  proxy_read_timeout       3600s;
  client_body_timeout      3600s;
  send_timeout             3600s;

  # ── Buffer tuning for large files (stream, don't buffer to disk) ─────────────
  proxy_buffering          off;
  proxy_request_buffering  off;      # stream request body directly to upstream

  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/json application/javascript text/xml;

  # ── Frontend (React SaaS UI) ─────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Frontend
    location / {
      proxy_pass         http://frontend:5173;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
    }

    # API (backend)
    location /api/ {
      proxy_pass         http://backend:3001;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # Required for large file uploads
      proxy_request_buffering  off;
      proxy_buffering          off;
      client_max_body_size     50g;
    }

    # MinIO direct upload (presigned URLs)
    location /minio/ {
      proxy_pass         http://minio:9000/;
      proxy_http_version 1.1;
      proxy_set_header   Host              minio:9000;
      proxy_request_buffering  off;
      proxy_buffering          off;
      client_max_body_size     50g;
    }
  }
}
