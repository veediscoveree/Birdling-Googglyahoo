version: '3.9'

services:
  # ─────────────────────────────────────────────────────────
  # PostgreSQL — source of truth for all metadata & audit logs
  # ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vdiscovery}
      POSTGRES_USER: ${POSTGRES_USER:-vdiscovery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vdiscovery}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────
  # Redis — job queue + caching
  # ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────
  # Elasticsearch — full-text search across all documents
  # ─────────────────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.12.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - cluster.name=vdiscovery
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────────────────────
  # MinIO — S3-compatible object storage for all files
  # ─────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-vdiscovery}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─────────────────────────────────────────────────────────
  # Apache Tika — universal file type detection + text extraction
  # ─────────────────────────────────────────────────────────
  tika:
    image: apache/tika:2.9.1-full
    restart: unless-stopped
    ports:
      - "9998:9998"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9998/tika | grep -q 'Apache Tika'"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─────────────────────────────────────────────────────────
  # Backend API — Express REST API server
  # ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-vdiscovery}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-vdiscovery}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-vdiscovery}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme123}
      MINIO_BUCKET: ${MINIO_BUCKET:-vdiscovery-files}
      TIKA_URL: http://tika:9998
      JWT_SECRET: ${JWT_SECRET:-changeme-jwt-secret-32chars}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_started
      tika:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  # ─────────────────────────────────────────────────────────
  # Processor — background worker for document processing
  # ─────────────────────────────────────────────────────────
  processor:
    build:
      context: ./processor
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-vdiscovery}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-vdiscovery}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-vdiscovery}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme123}
      MINIO_BUCKET: ${MINIO_BUCKET:-vdiscovery-files}
      TIKA_URL: http://tika:9998
      CONCURRENCY: ${PROCESSOR_CONCURRENCY:-4}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      tika:
        condition: service_healthy
    volumes:
      - ./processor:/app
      - /app/node_modules

  # ─────────────────────────────────────────────────────────
  # Nginx — reverse proxy, large-file upload handling, TLS termination
  # ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
      - minio
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────────
  # Frontend — React SaaS UI (dev mode; prod uses nginx)
  # ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
  es_data:
  minio_data:
