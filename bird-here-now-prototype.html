 hops on or near the ground, or sits in dense shrubs. Males often perch prominently to sing. Moderately wary; will flush if approached quickly."},rarity:"common",rarityColor:"#4caf50",points:100,verificationThreshold:.66,verificationMethods:1,description:"One of North America's most beloved birds and a year-round resident across the East. The male's blazing red plumage against winter snow has made him a cultural icon. Females are no less striking — warm brown with a red crest and a bill that can crack open the toughest sunflower seeds. Listen any morning for their ringing whistle from a shrubby perch.",funFact:'Female cardinals also sing — a behavior rare among North American songbirds. A mated pair will sometimes exchange songs in a "duet" back and forth.',eBirdCode:"norcar",merlinId:"Northern_Cardinal"},{id:"american_robin",commonName:"American Robin",scientificName:"Turdus migratorius",family:"Turdidae",order:"Passeriformes",sizeCategory:"small",length_cm:[23,28],wingspan_cm:[31,41],weight_g:[72,94],appearance:{billShape:"thin",billSizeRelative:"medium",billColor:{male:"yellow",female:"yellow"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#2B3A2B",female:"#4A5A4A"},uiColor:"#C85A1E",secondaryColors:{male:["#C85A1E (breast)","#FAFAFA (eye ring, belly)","#F0C030 (bill)"],female:["#C85A1E (paler breast)","#FAFAFA (belly)","#F0C030 (bill)"]},distinctiveMarkings:{male:["Brick-orange breast and belly","Dark gray-black head and back","White eye ring (broken)","Yellow bill","White under-tail coverts"],female:["Paler orange breast than male","Brownish-gray head (not black)","Same white belly and yellow bill"],juvenile:["Spotted orange breast (thrush-family spotting)","Speckled back","This spotting disappears by late summer"]},plumageDescription:{male:"Dark gray-black above with a rich brick-orange breast. A white belly patches below; broken white eye ring and white throat streaks frame a yellow bill. Classic thrush shape — round body, short tail, Fact:"A robin doesn't actually hear earthworms through the ground — it sees them. That sideways head-tilt is tilting one eye toward the soil to get a better look.",eBirdCode:"amerob",merlinId:"American_Robin"},{id:"blue_jay",commonName:"Blue Jay",scientificName:"Cyanocitta cristata",family:"Corvidae",order:"Passeriformes",sizeCategory:"small",length_cm:[22,30],wingspan_cm:[34,43],weight_g:[70,100],appearance:{billShape:"thin",billSizeRelative:"medium",billColor:{male:"black",female:"black"},crestPresent:!0,crestColor:{male:"blue",female:"blue"},primaryColor:{male:"#4A7FBD",female:"#4A7FBD"},uiColor:"#4A7FBD",secondaryColors:{male:["#FAFAFA (face, belly)","#1A1A1A (necklace, wing bars)","#4A7FBD (crest, wings, tail)"],female:["Same as male — sexes look alike"]},distinctiveMarkings:{male:["Bright blue crest, wings, and tail","White face and underparts","Bold black necklace across throat/chest","White wing bars and tail corners","Black barring on wings and tail"],female:["Identical to male in appearance"],juvenile:["Duller blue than adults; crest shorter; gains adult plumage by first winter"]},plumageDescription:{male:'Unmistakable in flight and at rest. A blue corvid with a pointed crest, white face, and bold black "necklace" connecting the crest, eye, and collar. Blue wings show white wing bars and dark barring. The tail is long, blue, and prominently barred. Underparts white.',female:"Identical to male — one of the few songbirds where field separation of sexes is practically impossible without genetic testing.",juvenile:"Slightly duller blue tones in the first year, with a shorter crest. Nearly identical to adults by autumn."}},primaryHabitat:["deciduous_woodland","parks","suburban","oak_savanna"],feedingLayer:"multi",flightStyle:"direct",socialBehavior:{breeding:"pairs",winter:"family_groups"},typicalGroupSize:{min:1,max:10},activeHours:"diurnal",sound:{callDescription:'Loud, raucous "jay-jay-jay". Also mimics Red-tailed Hawk perfectly — used to alarm other birds or claim food.',songDescription:'A softer, gurgling "whisper song" rarely heard; usually replaced by call repertoire. Also "bell" calls, whistled notes, and many mimicked sounds.',loudness:9,callFrequency:8,singingSeason:{spring:"frequent",summer:"moderate",fall:"frequent",winter:"moderate"},sounds:["jay-call","hawk-mimic","bell","whisper-song"]},seasons:{spring:{presence:"resident",commonness:"common"},summer:{presence:"resident",commonness:"common"},fall:{presence:"resident",commonness:"common"},winter:{presence:"resident",commonness:"common"}},range:"eastern_north_america",captureStats:{difficulty:4,speed:5,flightiness:6,camouflage:2,sizeScore:6,movementPattern:"perching",flightPattern:"direct",behaviorNotes:"Moves between canopy and ground. Very alert — the first to sound an alarm when a predator appears. Bold and often noisy, but spooks quickly when directly approached. Stashes acorns and has excellent spatial memory."},rarity:"common",rarityColor:"#4caf50",points:110,verificationThreshold:.66,verificationMethods:1,description:"Bold, intelligent, and impossible to ignore — the Blue Jay is a corvid in every sense. They are accomplished mimics (their hawk imitation can clear a feeder), dedicated parents, and critical partners in oak forest expansion: they cache thousands of acorns each fall, many of which they never retrieve, planting the oaks of the future. Love them or hate them, a yard without Blue Jays is a quieter place.",funFact:"A Blue Jay can carry multiple acorns at once — up to 5 in its throat pouch, bill, and esophagus. One study estimated a single jay moved 4,500 acorns in a single fall.",eBirdCode:"blujay",merlinId:"Blue_Jay"},{id:"black_capped_chickadee",commonName:"Black-capped Chickadee",scientificName:"Poecile atricapillus",family:"Paridae",order:"Passeriformes",sizeCategory:"tiny",length_cm:[12,15],wingspan_cm:[16,21],weight_g:[9,14],appearance:{billShape:"thin",billSizeRelative:"tiny",billColor:{male:"black",female:"black"},crestPresent:!1,crest izeScore:2,movementPattern:"darting",flightPattern:"undulating",behaviorNotes:"Tiny and hyperactive — never still for more than a few seconds. Hangs upside-down from branch tips to reach insects. Paradoxically bold around humans; will sometimes land on an outstretched hand at feeders. The challenge is their size and constant motion."},rarity:"common",rarityColor:"#4caf50",points:120,verificationThreshold:.66,verificationMethods:1,description:`Possibly the most cheerful bird in North America. Chickadees stay through the harshest winters, traveling in small flocks through frozen forests, finding insects in bark crevices that no other bird can reach. They have a sophisticated social system and can lower their body temperature at night to conserve energy — a feat called "regulated hypothermia." Their alarm calls carry so much information about a predator's size, speed, and danger level that other species have learned to listen.`,funFact:"Every autumn, a chickadee's hippocampus (the memory center of the brain) actually grows larger to handle thousands of new food cache locations. It shrinks again in spring.",eBirdCode:"bkcchi",merlinId:"Black-capped_Chickadee"},{id:"american_goldfinch",commonName:"American Goldfinch",scientificName:"Spinus tristis",family:"Fringillidae",order:"Passeriformes",sizeCategory:"tiny",length_cm:[11,14],wingspan_cm:[19,22],weight_g:[11,20],appearance:{billShape:"conical",billSizeRelative:"small",billColor:{male:"pink-orange",female:"dull-pink"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#FFD700",female:"#B8A840"},uiColor:"#FFD700",secondaryColors:{male:["#1A1A1A (forehead cap, wings, tail)","#FAFAFA (wing bars, rump)","#F0A040 (bill)"],female:["#B8A840 (olive-yellow body)","#1A1A1A (wings)","#FAFAFA (wing bars)"]},distinctiveMarkings:{male:["Brilliant lemon-yellow body (breeding)","Black forehead cap","Black wings with white wing bars","White rump","Stubby pink-orange bill","Winter: olive-yellow, no black cap"],female:["Dull olive-yellow; no black cap","White wing bars on black-ish wings","Paler below than above","Year-round plumage similar to male winter"],juvenile:["Similar to female; buffy wing bars instead of white"]},plumageDescription:{male:"Summer male is electric: pure lemon-yellow with a small black cap on the forehead, jet-black wings with white wing bars, white rump. Winter male molts to olive-yellow, loses the black cap, and becomes almost unrecognizable until spring.",female:"Olive-yellow throughout the year — brighter in summer, duller in winter. Black wings with white bars. Often overlooked despite being present at most nyjer seed feeders.",juvenile:"Resembles female; buffy rather than white wing bars. Acquires adult plumage in first autumn."}},primaryHabitat:["fields","meadows","weedy_areas","feeders","open_woodland"],feedingLayer:"shrub",flightStyle:"undulating",socialBehavior:{breeding:"loose_colonies",winter:"flocks"},typicalGroupSize:{min:2,max:40},activeHours:"diurnal",sound:{callDescription:'"Per-chick-o-ree" or "po-ta-to-chip" call given in flight — this bouncy phrase perfectly matches the undulating flight pattern.',songDescription:"Long, canary-like warble of rapid twitters, trills, and chips. Energetic and sustained.",loudness:5,callFrequency:8,singingSeason:{spring:"moderate",summer:"frequent",fall:"occasional",winter:"rare"},sounds:["per-chick-o-ree","song-warble","contact-call"]},seasons:{spring:{presence:"resident",commonness:"common"},summer:{presence:"summer",commonness:"common"},fall:{presence:"migrant",commonness:"common"},winter:{presence:"winter",commonness:"uncommon"}},range:"north_america",captureStats:{difficulty:5,speed:6,flightiness:5,camouflage:2,sizeScore:2,movementPattern:"darting",flightPattern:"undulating",behaviorNotes:"Feeds acrobatically on seed heads — hanging sideways, upside-down. In flocks, individuals are scattered and constantly moving. The undulating flight — rise on wingbeats, dip on wing-fold — makes tracking in binoculars tricky."},rarity:"common",rarityColor:"#4caf50",points:115,verificationThreshold:.66,verificationMethods:1,description:"New Jersey's state bird and a frequent visitor to nyjer seed feeders. The male in breeding plumage is one of the most vivid birds in North America — a flying lemon with a black beret. Goldfinches are unusual songbirds in that they wait until July or August to nest, timing their breeding to peak thistle-seed abundance. They weave spider silk into their nests, which stretches as the nestlings grow.",funFact:"Goldfinch nests are so tightly woven they can hold water. If it rains during an early cold snap, the young have been known to drown — one reason late breeding evolved.",eBirdCode:"amegfi",merlinId:"American_Goldfinch"},{id:"mallard",commonName:"Mallard",scientificName:"Anas platyrhynchos",family:"Anatidae",order:"Anseriformes",sizeCategory:"medium",length_cm:[50,65],wingspan_cm:[81,98],weight_g:[720,1600],appearance:{billShape:"spatulate",billSizeRelative:"large",billColor:{male:"yellow-orange",female:"orange-black mottled"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#2D6B4A",female:"#8B6914"},uiColor:"#2D6B4A",secondaryColors:{male:["#2D6B4A (iridescent green head)","#FAFAFA (neck ring)","#8B3A2A (chestnut breast)","#C8C8C8 (gray flanks)","#1A1A1A (black stern)","#E8B830 (bill)"],female:["#8B6914 (mottled brown overall)","#FF8C00 (orange sides of bill)","#5B7F9E (speculum)","#FAFAFA (tail)"]},distinctiveMarkings:{male:["Iridescent green head","Thin white neck ring","Chestnut-brown breast","Gray body","Black rear end with curled tail feathers","Yellow-orange bill","Blue-purple speculum (wing patch)"],female:["Mottled brown streaky overall","Orange bill with black splotches","Dark eye stripe","Blue-purple speculum with white borders","Pale orange legs"],juvenile:["Resembles female; gains adult plumage through first winter"]},plumageDescription:{male:'Breeding male is a gallery piece: iridescent bottle-green head (that  every continent except Antarctica and have adapted perfectly to city parks, drainage ditches, and golf course ponds. Watch for the courtship displays in winter — groups of males circle females with elaborate head-pumping, wing-flap, and whistle sequences that look choreographed.",funFact:'Mallards can sleep with one eye open and half their brain awake — a phenomenon called unihemispheric slow-wave sleep. Ducks at the edge of a flock keep the "outer eye" open, watching for predators.',eBirdCode:"mallar3",merlinId:"Mallard"},{id:"red_tailed_hawk",commonName:"Red-tailed Hawk",scientificName:"Buteo jamaicensis",family:"Accipitridae",order:"Accipitriformes",sizeCategory:"large",length_cm:[45,65],wingspan_cm:[110,145],weight_g:[690,1460],appearance:{billShape:"hooked",billSizeRelative:"large",billColor:{male:"gray-yellow",female:"gray-yellow"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#8B6030",female:"#8B6030"},uiColor:"#C85020",secondaryColors:{male:["#C85020 (rufous-red tail, adults only)","#8B6030 (brown above)","#F5E6C8 (pale below)","#1A1A1A (belly band)","#F0C030 (cere, feet)"],female:["Same — sexes look identical; females are larger"]},distinctiveMarkings:{male:["Brick-red upper tail (adults; visible from above in flight)","Dark brown above",'Pale buffy below with dark "belly band" of streaking',"Hooked yellow-cere bill","Yellow taloned feet","Short, broad wings; short tail in soaring silhouette"],female:["Identical to male in plumage; notably larger in body size"],juvenile:["No red tail — brown barred tail instead","Yellow iris (adults have dark brown)","Heavily streaked breast and belly"]},plumageDescription:{male:"A large, bulky buteo with broad rounded wings and a short tail. The field mark that names it: the brick-red upper tail surface, visible as the bird banks in a soar. Below, pale body with a band of dark streaking across the belly. Brown above. Many color variants exist across its range.",female:"Identical to male in pattern
