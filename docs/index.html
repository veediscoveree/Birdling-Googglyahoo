cts from the air in swooping dives."},rarity:"common",rarityColor:"#4caf50",points:140,verificationThreshold:.7,verificationMethods:1,description:"The Barn Swallow is the world's most widespread swallow, breeding on every continent except Antarctica. Its deeply forked tail (longer streamers signal genetic fitness) and acrobatic insect-catching flight over fields and water make it one of summer's most cheerful presences. It has co-evolved with humans for thousands of years, nesting on man-made structures almost exclusively.",funFact:"Female Barn Swallows prefer males with longer, more symmetrical tail streamers — the streamers are an honest signal of parasite resistance and genetic health.",eBirdCode:"barswa",merlinId:"Barn_Swallow"},{id:"american_kestrel",commonName:"American Kestrel",scientificName:"Falco sparverius",family:"Falconidae",order:"Falconiformes",sizeCategory:"small",length_cm:[22,31],wingspan_cm:[51,61],weight_g:[80,165],appearance:{billShape:"hooked",billSizeRelative:"small",billColor:{male:"yellow/gray",female:"yellow/gray"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#D4703A",female:"#8B5030"},uiColor:"#D4703A",distinctiveMarkings:{male:["Rufous back and tail","Blue-gray wings",'Bold black facial marks (two "sideburns")',"Spotted cream underparts","Hovers in place while hunting"],female:["Rufous-brown all over, heavily streaked","Same bold face pattern"],juvenile:["Similar to adults by sex"]},plumageDescription:{male:`North America's most colorful raptor: rufous back, blue-gray wings, cream underparts spotted with black, and a rufous tail with a black band. Two black "sideburn" marks on the face are diagnostic.`,female:"Rufous-brown and heavily streaked, less colorful than male but same bold face marks.",juvenile:"Similar to respective adult sex."}},primaryHabitat:["open_fields","farmland","roadsides","meadows","suburban"],feedingLayer:"aerial",flightStyle:"hovering",socialBehavior:{breeding:"monogamous_pairs",winter:"solitary"},typicalGroupSize:{min:1,max:2},activeHours:"diurnal",sound:{callDescription:'Rapid, excited "killy killy killy killy" — unmistakable.',songDescription:"Same rapid killy call used in most contexts.",loudness:7,callFrequency:5,singingSeason:{spring:"frequent",summer:"moderate",fall:"moderate",winter:"moderate"}},seasons:{spring:{presence:"resident",commonness:"uncommon"},summer:{presence:"resident",commonness:"uncommon"},fall:{presence:"resident",commonness:"uncommon"},winter:{presence:"resident",commonness:"uncommon"}},captureStats:{difficulty:7,speed:7,flightiness:7,camouflage:2,sizeScore:3,movementPattern:"hovering",captureBackground:"open_field",flightPattern:"hovering",behaviorNotes:"Perches on wires and fence posts, kiting into the wind or hovering to spot prey below. Pumps tail when perched."},rarity:"uncommon",rarityColor:"#2196f3",points:220,verificationThreshold:.8,verificationMethods:1,description:"North America's smallest and most colorful falcon, the American Kestrel is a tiny powerhouse — roughly the size of a robin yet a fierce predator of insects, mice, and small birds. It hovers into the wind on rapid wingbeats scanning the ground below. Kestrels can see ultraviolet light, which lets them track vole urine trails invisible to human eyes.",funFact:"American Kestrels can see ultraviolet light, which lets them track the urine trails of voles (which fluoresce in UV) like a glowing road map leading directly to prey.",eBirdCode:"amekes",merlinId:"American_Kestrel"},{id:"prothonotary_warbler",commonName:"Prothonotary Warbler",scientificName:"Protonotaria citrea",family:"Parulidae",order:"Passeriformes",sizeCategory:"tiny",length_cm:[13,14],wingspan_cm:[19,23],weight_g:[12,15],appearance:{billShape:"thin",billSizeRelative:"medium",billColor:{male:"dark gray-black",female:"dark gray-black"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#F5C518",female:"#D4A816"},uiColor:"#F5C518",secondaryColors:{male:["#7890A8 (wings, tail, back)","#1A1A1A (bill)"],female:["#7890A8 (wings)"]},distinctiveMarkings:{male:["Brilliant golden-yellow head, breast, and belly","Contrasting blue-gray wings and back","Bold dark eye on all-yellow face","White undertail coverts","Heavy for a warbler"],female:["Slightly duller yellow than male","Same blue-gray wings","No mask or other marking"],juvenile:["Resembles female"]},plumageDescription:{male:"Unmistakable: the head, breast, and belly glow intense golden-yellow, contrasting sharply with the solid blue-gray of the wings, back, and tail. The face is plain — no mask, no streaks — just that brilliant unmarked gold, divided by a dark bill and dark eye. Among warblers this is exceptional size and color saturation.",female:"Similar but with slightly less saturated yellow and more olive tones on the crown and nape. Still one of the most striking female warblers."}},primaryHabitat:["forested_swamps","bottomland_hardwoods","cypress_tupelo","flooded_forest"],feedingLayer:"shrub",flightStyle:"direct",socialBehavior:{breeding:"monogamous_pairs",winter:"solitary"},typicalGroupSize:{min:1,max:2},activeHours:"diurnal",sound:{callDescription:'Sharp metallic "tseet".',songDescription:'Ringing, emphatic "zweet-zweet-zweet-zweet-zweet" — a series of identical loud notes on one pitch, unlike most warblers. Carries far through the swamp.',loudness:8,callFrequency:5,singingSeason:{spring:"frequent",summer:"frequent",fall:"rare",winter:"absent"}},seasons:{spring:{presence:"summer",commonness:"uncommon"},summer:{presence:"summer",commonness:"uncommon"},fall:{presence:"migrant",commonness:"rare"},winter:{presence:"absent",commonness:"absent"}},range:"eastern_north_america",captureStats:{difficulty:6,speed:6,flightiness:6,camouflage:2,sizeScore:2,movementPattern:"flit",captureBackground:"wetland",behaviorNotes:"Forages low in swampy vegetation, flying between branches near water. Nest in tree cavities over standing water. Flits actively but pauses on exposed branches."},rarity:"rare",rarityColor:"#9c27b0",points:250,verificationThreshold:.75,verificationMethods:1,description:"A jewel of the swamp. The Prothonotary Warbler is named for the gold-robed papal secretaries (protonotaries) of the Catholic Church — its plumage really is that intense. Uniquely among eastern warblers, it nests in tree cavities over standing water: old woodpecker holes in stumps and snags rising from flooded bottomlands. Its song echoes across cypress swamps like ringing gold.",funFact:"The Prothonotary Warbler will readily use nest boxes — one of the easiest warblers to attract to a man-made cavity. Alger Hiss's lawyers famously challenged whether a Prothonotary Warbler sighting was credible testimony in his 1948 espionage trial.",eBirdCode:"prowat",merlinId:"Prothonotary_Warbler"},{id:"american_redstart",commonName:"American Redstart",scientificName:"Setophaga ruticilla",family:"Parulidae",order:"Passeriformes",sizeCategory:"tiny",length_cm:[11,14],wingspan_cm:[16,23],weight_g:[6,9],appearance:{billShape:"thin",billSizeRelative:"small",billColor:{male:"black",female:"dark gray"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#1A1A1A",female:"#7A8A7A"},uiColor:"#FF7800",secondaryColors:{male:["#FF7800 (wing patches, tail base, breast sides)","#FFFFFF (belly)"],female:["#FFD000 (yellow in wing/tail where male has orange)"]},distinctiveMarkings:{male:["Jet black overall","Vivid orange patches: base of tail, wing stripe, breast sides","White belly","Constantly fans tail to flash orange","Droops wings in display"],female:["Gray-olive overall","Yellow patches in exact same positions as male's orange","Clean white belly","Same tail-fanning behavior"],juvenile:["Males in first year resemble females (yellow patches) — acquire black gradually"]},plumageDescription:{male:"The male is a study in contrast: jet black from crown to tail, interrupted by blazing orange-flame patches on the wing edges, the sides of the breast, and the base of the tail. The white belly gleams below. The tail is constantly being fanned and spread, flashing the orange like a signal mirror in the forest.",female:"Soft gray-olive above and white below, with clean lemon-yellow patches exactly where the male has orange. The tail-fanning behavior is the same, and equally revealing."}},primaryHabitat:["mixed_forest","forest_edge","second_growth","riparian_woods"],feedingLayer:"shrub",flightStyle:"direct",socialBehavior:{breeding:"monogamous_pairs",winter:"solitary"},typicalGroupSize:{min:1,max:1},activeHours:"diurnal",sound:{callDescription:'Sharp "chip" — similar to many warblers.',songDescription:'Variable; often "zee zee zee zee zwee" with the last note dropping or rising. Some males have multiple song types. High, thin, warbler-quality notes.',loudness:6,callFrequency:7,singingSeason:{spring:"frequent",summer:"frequent",fall:"rare",winter:"absent"}},seasons:{spring:{presence:"summer",commonness:"uncommon"},summer:{presence:"summer",commonness:"uncommon"},fall:{presence:"migrant",commonness:"uncommon"},winter:{presence:"absent",commonness:"absent"}},range:"eastern_north_america",captureStats:{difficulty:7,speed:8,flightiness:7,camouflage:1,sizeScore:1,movementPattern:"fanning",captureBackground:"forest_canopy",behaviorNotes:"Highly active; never sits still long. Constantly fans tail, droops wings, and makes rapid sallies to catch flying insects. Moves through mid-level vegetation with quick hops and sudden darts."},rarity:"uncommon",rarityColor:"#2196f3",points:170,verificationThreshold:.75,verificationMethods:1,description:"The American Redstart is a bird of perpetual motion — it rarely sits still for more than a second before fanning its tail, drooping its wings, or darting after an insect. This behavior isn't restless energy; it's a strategy. Fanning the tail flushes insects hidden in foliage that the redstart then snatches mid-air. The bird is running a trap.",funFact:'In Central America, redstarts are called "candelita" — the little candle — for the way the orange tail patches flicker like a flame in the forest understory.',eBirdCode:"amered",merlinId:"American_Redstart"},{id:"common_yellowthroat",commonName:"Common Yellowthroat",scientificName:"Geothlypis trichas",family:"Parulidae",order:"Passeriformes",sizeCategory:"tiny",length_cm:[11,13],wingspan_cm:[15,19],weight_g:[9,11],appearance:{billShape:"thin",billSizeRelative:"medium",billColor:{male:"dark gray",female:"dark gray"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#7A9040",female:"#8A9050"},uiColor:"#F5E000",secondaryColors:{male:["#1A1A1A (mask)","#F5E000 (throat, breast)","#FFFFFF (band above mask)"],female:["#F5D800 (throat, less extensive)"]},distinctiveMarkings:{male:["Bold black mask spanning forehead, eye, and cheek to neck","White-gray band above mask","Brilliant yellow throat and breast","Olive-yellow belly and undertail","Olive-green back and wings"],female:["Plain olive above","Yellow throat (less bright than male)","Buffy flanks, no mask"],juvenile:["Resembles female; duller"]},plumageDescription:{male:"The male wears his identity in bold: a broad, velvety black mask sweeps from the forehead across the eye and cheeks, bordered above by a pale gray band. Below the mask, the throat blazes deep yellow and the breast glows butter-yellow. Olive-green above. Unmistakable, but a skulking bird that often makes you work to see it.",female:"Olive above, yellow-washed below on the throat and breast, without the mask. Buffy flanks. Understated but identifiable."}},primaryHabitat:["wetland_edge","marsh","dense_shrubs","cattail","overgrown_fields"],feedingLayer:"shrub",flightStyle:"direct",socialBehavior:{breeding:"monogamous_pairs",winter:"solitary"},typicalGroupSize:{min:1,max:1},activeHours:"diurnal",sound:{callDescription:'Distinctive "tchet" — dry and emphatic.',songDescription:'"witchety-witchety-witchety" — three to five rapid repetitions. One of the most recognizable warbler songs, carrying well over marsh and brushy habitat.',loudness:7,callFrequency:8,singingSeason:{spring:"frequent",summer:"frequent",fall:"occasional",winter:"absent"}},seasons:{spring:{presence:"summer",commonness:"common"},summer:{presence:"summer",commonness:"common"},fall:{presence:"migrant",commonness:"common"},winter:{presence:"absent",commonness:"absent"}},range:"north_america",captureStats:{difficulty:6,speed:5,flightiness:8,camouflage:5,sizeScore:2,movementPattern:"skulking",captureBackground:"marsh_edge",behaviorNotes:"A master skulker in dense vegetation — the bird is often heard but rarely seen well. Males pop briefly to exposed stems to sing then dive back into cover. Patience required."},rarity:"common",rarityColor:"#4caf50",points:130,verificationThreshold:.7,verificationMethods:1,description:'One of the most widespread warblers in North America, the Common Yellowthroat inhabits any patch of rank vegetation with water nearby — cattail marshes, wet meadows, overgrown fields, roadside ditches. The "witchety-witchety" song is everywhere in spring. The bird itself is harder to pin down: it skulks through tangles and rarely perches in the open for long.',funFact:"The Common Yellowthroat is one of the most polygynous warblers — males routinely maintain two breeding females simultaneously, sometimes three, each tending their own nest in adjacent territories.",eBirdCode:"comyel",merlinId:"Common_Yellowthroat"},{id:"black_and_white_warbler",commonName:"Black-and-white Warbler",scientificName:"Mniotilta varia",family:"Parulidae",order:"Passeriformes",sizeCategory:"tiny",length_cm:[11,13],wingspan_cm:[18,22],weight_g:[8,11],appearance:{billShape:"thin",billSizeRelative:"small",billColor:{male:"dark gray",female:"dark gray"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#F0F0F0",female:"#F0F0F0"},uiColor:"#A0A0A0",secondaryColors:{male:["#1A1A1A (bold black stripes throughout)","#FFFFFF (median crown stripe, supercilium)"],female:["Same but black replaced by dark brown; throat white not black"]},distinctiveMarkings:{male:["Crisp black-and-white stripes from crown to undertail","Bold white median crown stripe","White supercilium","Black throat and cheek","Streaked breast and flanks","Long hind claw — adapted to bark-climbing"],female:["Pattern identical but black softened to brown-gray","White (not black) throat"],juvenile:["Resembles female"]},plumageDescription:{male:"A living barcode: crisp black-and-white stripes run from the crown all the way to the undertail coverts. The median crown stripe gleams white; the face shows a bold white supercilium above a black cheek and throat. Moves along bark with its strong legs and elongated hind claw — the only warbler that forages like a nuthatch.",female:"Identical pattern, but the black areas are replaced by warm brown-gray, and the throat is white rather than black."}},primaryHabitat:["deciduous_forest","mixed_forest","forest_interior"],feedingLayer:"canopy",flightStyle:"bounding",socialBehavior:{breeding:"monogamous_pairs",winter:"solitary"},typicalGroupSize:{min:1,max:1},activeHours:"diurnal",sound:{callDescription:'Sharp, squeaky "tsit".',songDescription:'"Weesy-weesy-weesy-weesy" — a thin, wiry, high-pitched series, like a squeaky wheel. Repeating pairs of notes.',loudness:5,callFrequency:7,singingSeason:{spring:"frequent",summer:"moderate",fall:"rare",winter:"absent"}},seasons:{spring:{presence:"summer",commonness:"uncommon"},summer:{presence:"summer",commonness:"uncommon"},fall:{presence:"migrant",commonness:"uncommon"},winter:{presence:"absent",commonness:"absent"}},range:"eastern_north_america",captureStats:{difficulty:5,speed:4,flightiness:5,camouflage:3,sizeScore:2,movementPattern:"creeping",captureBackground:"forest_trunk",behaviorNotes:"Creeps along tree trunks and large branches, working up, sideways, and even downward in search of hidden insects in bark crevices. One of the first warblers to arrive in spring and last to depart in fall."},rarity:"uncommon",rarityColor:"#2196f3",points:155,verificationThreshold:.7,verificationMethods:1,description:"The Black-and-white Warbler is a taxonomic outlier among warblers: it forages almost exclusively on tree bark rather than in foliage, working along trunks and major limbs like a nuthatch or creeper. Its long hind claw is an adaptation to bark-clinging. The crisp black-and-white pattern is unmistakable, and it arrives early — often in late March when few other warblers have returned.",funFact:"The Black-and-white Warbler is the oldest known wild warbler ever recorded: a banded individual in Wisconsin was recaptured 11 years later, remarkable longevity for a tiny long-distance migrant.",eBirdCode:"bawwar",merlinId:"Black-and-white_Warbler"},{id:"yellow_rumped_warbler",commonName:"Yellow-rumped Warbler",scientificName:"Setophaga coronata",family:"Parulidae",order:"Passeriformes",sizeCategory:"tiny",length_cm:[12,14],wingspan_cm:[19,24],weight_g:[11,14],appearance:{billShape:"thin",billSizeRelative:"small",billColor:{male:"dark gray",female:"dark gray"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#6A7A8A",female:"#8A7A6A"},uiColor:"#F5D000",secondaryColors:{male:["#F5D000 (crown patch, rump, sides)","#FFFFFF (throat, wing bars)","#1A1A1A (breast patch, mask)"],female:["Duller, browner version of male"]},distinctiveMarkings:{male:["Four yellow patches: crown, rump, and both sides of breast",'Yellow rump flashes white in flight — the "butter butt"',"White throat (Myrtle form)","Black breast band and mask","Two white wing bars","Gray back with dark streaks"],female:["Browner than male; same yellow patches but duller","Less distinct breast band"],juvenile:["Very brown and streaky; yellow rump still visible"]},plumageDescription:{male:'Gray and boldly patterned: the white throat is flanked by a black breast patch, and four yellow patches — crown, rump, and both shoulder-sides — mark the bird at every angle. The yellow rump is visible whenever the bird moves or flies, earning the species its informal name "butter butt."',female:"Brown where the male is gray, and the yellow patches are duller, but the same shape and position. The yellow rump remains the clinching field mark."}},primaryHabitat:["forest_edge","open_woodland","shrubby_fields","coastal_thickets","parks"],feedingLayer:"multi",flightStyle:"bounding",socialBehavior:{breeding:"monogamous_pairs",winter:"loose_flocks"},typicalGroupSize:{min:1,max:50},activeHours:"diurnal",sound:{callDescription:'Loud, sharp "check" — the most distinctive warbler call, easy to learn.',songDescription:'Slow, rising or falling trill: "seee-seee-seee-seee" with a quality change at the end. Variable.',loudness:6,callFrequency:9,singingSeason:{spring:"frequent",summer:"moderate",fall:"moderate",winter:"rare"}},seasons:{spring:{presence:"migrant",commonness:"abundant"},summer:{presence:"absent_most_areas",commonness:"rare"},fall:{presence:"migrant",commonness:"abundant"},winter:{presence:"winter",commonness:"common"}},range:"north_america",captureStats:{difficulty:4,speed:6,flightiness:5,camouflage:3,sizeScore:2,movementPattern:"flit",captureBackground:"forest_edge",behaviorNotes:"Highly adaptable forager: flycatches, gleans foliage, picks berries from bayberry and wax myrtle. Often in loose flocks during migration. Can winter farther north than most warblers by eating waxy berries."},rarity:"common",rarityColor:"#4caf50",points:120,verificationThreshold:.65,verificationMethods:1,description:"The Yellow-rumped Warbler is the warbler everyone encounters: the most abundant warbler in North America, a persistent migrant through backyards and parks in fall, and the one most likely to overwinter. It has a unique adaptation — the ability to digest the wax in bayberries and wax myrtle — that lets it survive in coastal areas long after other warblers have fled south.",funFacts:["The Yellow-rumped Warbler can digest wax from bayberries — a feat no other warbler can manage — letting it winter 1,500 miles north of other species.",'"Butter butt" is the official-unofficial nickname, used even in scientific contexts. The yellow rump flashing as the bird flies away is the most reliable field mark.'],eBirdCode:"yerwar",merlinId:"Yellow-rumped_Warbler"},{id:"red_eyed_vireo",commonName:"Red-eyed Vireo",scientificName:"Vireo olivaceus",family:"Vireonidae",order:"Passeriformes",sizeCategory:"small",length_cm:[13,14],wingspan_cm:[22,25],weight_g:[12,26],appearance:{billShape:"hooked",billSizeRelative:"medium",billColor:{male:"dark gray",female:"dark gray"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#6B8C3A",female:"#6B8C3A"},uiColor:"#6B8C3A",secondaryColors:{male:["#7090A8 (gray cap)","#F0F0F0 (white below)","#1A1A1A (black eye-line)","#8B2020 (red iris — hard to see)"]},distinctiveMarkings:{male:["Olive-green above, white below","Blue-gray cap","Bold white supercilium","Black border above and below the supercilium","Red iris (best seen up close)","Hook-tipped bill","No wing bars"],female:["Identical to male"],juvenile:["Brown iris through first year"]},plumageDescription:{male:"A clean, elegantly marked vireo: olive-green above and white below, with a contrasting blue-gray cap. The white eyebrow stripe is bordered by black above and below, giving it a spectacled expression. The namesake red eye requires a close look — often overlooked. Hook-tipped bill marks it as a vireo. No wing bars.",female:"Identical to male in all plumage aspects."}},primaryHabitat:["deciduous_forest","forest_canopy","woodland_edge","parks"],feedingLayer:"canopy",flightStyle:"direct",socialBehavior:{breeding:"monogamous_pairs",winter:"solitary"},typicalGroupSize:{min:1,max:1},activeHours:"diurnal",sound:{callDescription:'Nasal, whining "veeah" — distinctive and useful for finding the bird.',songDescription:'Endless series of short, burry phrases separated by brief pauses: "cheer-o-wit, cheree, sissy-a-wit, tee-oo..." — singing for hours without stopping, even at midday in summer when other birds are quiet. Has been recorded singing 22,197 times in a single day.',loudness:6,callFrequency:10,singingSeason:{spring:"frequent",summer:"frequent",fall:"rare",winter:"absent"}},seasons:{spring:{presence:"summer",commonness:"common"},summer:{presence:"summer",commonness:"common"},fall:{presence:"migrant",commonness:"common"},winter:{presence:"absent",commonness:"absent"}},range:"eastern_north_america",captureStats:{difficulty:4,speed:3,flightiness:4,camouflage:5,sizeScore:4,movementPattern:"vireo",captureBackground:"forest_canopy",behaviorNotes:"Slow, deliberate forager in the upper canopy. Hops methodically through leaves, pausing to inspect each leaf carefully before moving on. Stays well up in the canopy and blends remarkably well with the foliage despite being common."},rarity:"common",rarityColor:"#4caf50",points:115,verificationThreshold:.65,verificationMethods:1,description:"The most abundant songbird in the eastern forests during summer. The Red-eyed Vireo sings tirelessly from the canopy — a string of burry two-note phrases, over and over, all day long, even at midday in August when every other bird has gone silent. One individual was recorded singing 22,197 times in a single day. Despite this constant singing, the bird is maddeningly hard to spot, hidden in the dense canopy foliage.",funFacts:["A single Red-eyed Vireo male was recorded singing 22,197 times in one day — by far the highest count for any North American bird.","Red-eyed Vireos make the longest overwater migration of any vireo, crossing the Gulf of Mexico in a single overnight flight to reach South America."],eBirdCode:"reevir",merlinId:"Red-eyed_Vireo"},{id:"blue_headed_vireo",commonName:"Blue-headed Vireo",scientificName:"Vireo solitarius",family:"Vireonidae",order:"Passeriformes",sizeCategory:"small",length_cm:[13,15],wingspan_cm:[20,24],weight_g:[13,19],appearance:{billShape:"hooked",billSizeRelative:"medium",billColor:{male:"dark gray",female:"dark gray"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#6080A0",female:"#6080A0"},uiColor:"#6080A0",secondaryColors:{male:["#6B8C3A (olive-green back)","#F0F0F0 (white below, spectacles)","#F5E850 (yellow-green sides)","#FFFFFF (two bold wing bars)"]},distinctiveMarkings:{male:['Bright blue-gray head and nape — the "blue" is real',"Bold white spectacles (connected eye ring + supercilium)","Olive-green back","White below with yellow-green wash on sides","Two bold white wing bars","Hook-tipped bill"],female:["Identical to male"],juvenile:["Same as adults"]},plumageDescription:{male:"The Blue-headed Vireo is the handsomest of the eastern vireos: a genuine blue-gray head (not just grayish) with bold white spectacles that look painted on — the eye ring and supercilium connect into one clean white loop. Olive-green back, white below with a citrine wash on the sides, and two crisp white wing bars. An alert, deliberate bird.",female:"Identical to male in all plumage aspects."}},primaryHabitat:["mixed_forest","hemlock_forest","deciduous_forest","forest_edge"],feedingLayer:"canopy",flightStyle:"direct",socialBehavior:{breeding:"monogamous_pairs",winter:"solitary"},typicalGroupSize:{min:1,max:1},activeHours:"diurnal",sound:{callDescription:'Nasal "veeeah" — typical vireo call.',songDescription:'Slower and richer than Red-eyed Vireo: deliberate, musical phrases separated by longer pauses. "Cheeio... cheewit... cheerio..." An early spring singer.',loudness:6,callFrequency:7,singingSeason:{spring:"frequent",summer:"moderate",fall:"rare",winter:"absent"}},seasons:{spring:{presence:"summer",commonness:"uncommon"},summer:{presence:"summer",commonness:"uncommon"},fall:{presence:"migrant",commonness:"uncommon"},winter:{presence:"absent",commonness:"absent"}},range:"eastern_north_america",captureStats:{difficulty:5,speed:3,flightiness:4,camouflage:4,sizeScore:4,movementPattern:"vireo",captureBackground:"forest_canopy",behaviorNotes:"One of the earliest vireos to return in spring. Forages deliberately through foliage, often in mixed-species flocks during migration. The blue head and bold spectacles make it identifiable when you get a clear look."},rarity:"uncommon",rarityColor:"#2196f3",points:155,verificationThreshold:.7,verificationMethods:1,description:"The most visually striking eastern vireo, with a genuine blue-gray head that earns its name. The bold white spectacles — connected eye ring and supercilium — make it look perpetually alert. It's an early spring migrant, often appearing in late April before the leaves have fully opened, and it favors hemlock and mixed forest. Its song is slower and more musical than the Red-eyed Vireo's.",funFact:`The Blue-headed Vireo was once lumped with two western species (Cassin's Vireo and Plumbeous Vireo) as a single species called "Solitary Vireo." Careful analysis of song and genetics separated them again in 1997.`,eBirdCode:"blhvir",merlinId:"Blue-headed_Vireo"},{id:"yellow_throated_vireo",commonName:"Yellow-throated Vireo",scientificName:"Vireo flavifrons",family:"Vireonidae",order:"Passeriformes",sizeCategory:"small",length_cm:[13,15],wingspan_cm:[20,25],weight_g:[14,22],appearance:{billShape:"hooked",billSizeRelative:"large",billColor:{male:"dark gray, heavy",female:"dark gray, heavy"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#F5D020",female:"#F5D020"},uiColor:"#F5D020",secondaryColors:{male:["#6B8C3A (olive-green head/back)","#F5D020 (yellow spectacles — vivid)","#FFFFFF (belly)","#FFFFFF (two bold wing bars)"]},distinctiveMarkings:{male:["Brilliant yellow throat and breast","Vivid yellow spectacles (eye ring + supercilium) on olive-green head","Olive-green head and back (brighter olive than other vireos)","White belly","Two bold white wing bars","Heavy hook-tipped bill"],female:["Identical to male"],juvenile:["Same as adults"]},plumageDescription:{male:"The Yellow-throated Vireo is the most brilliantly colored vireo in eastern North America. The throat and breast glow deep cadmium yellow, and the spectacles — the connected eye ring and supercilium — are the same yellow, bold against the olive-green head. The white belly and two crisp wing bars complete a pattern that makes this the most recognizable vireo despite its canopy habits.",female:"Identical to male in all plumage aspects."}},primaryHabitat:["open_deciduous_forest","forest_edge","riparian_woodland","shade_trees"],feedingLayer:"canopy",flightStyle:"direct",socialBehavior:{breeding:"monogamous_pairs",winter:"solitary"},typicalGroupSize:{min:1,max:1},activeHours:"diurnal",sound:{callDescription:'Raspy "chatter" call.',songDescription:'Slow, burry phrases like Red-eyed Vireo but lower-pitched and with a distinctly hoarse, buzzy quality: "three-eight... look-at-me..." Sounds like it needs to clear its throat.',loudness:6,callFrequency:6,singingSeason:{spring:"frequent",summer:"frequent",fall:"rare",winter:"absent"}},seasons:{spring:{presence:"summer",commonness:"uncommon"},summer:{presence:"summer",commonness:"uncommon"},fall:{presence:"migrant",commonness:"rare"},winter:{presence:"absent",commonness:"absent"}},range:"eastern_north_america",captureStats:{difficulty:6,speed:3,flightiness:4,camouflage:3,sizeScore:4,movementPattern:"vireo",captureBackground:"forest_canopy",behaviorNotes:"Forages high in the canopy of open deciduous forest — often found in larger trees than other vireos. Slow and deliberate. The yellow spectacles and throat are brilliantly visible when the bird comes to a sunlit branch."},rarity:"uncommon",rarityColor:"#2196f3",points:165,verificationThreshold:.72,verificationMethods:1,description:"The Yellow-throated Vireo is the showiest vireo: the brilliant yellow throat, yellow spectacles, and bold white wing bars make it stand out even in dense canopy. It favors larger, more open deciduous forest than other vireos and is somewhat less common — a quality sighting on any spring morning. Its song has a distinctive low, burry quality that is slower and more forceful than other vireos.",funFact:"Yellow-throated Vireos build one of the most architecturally elaborate nests of any North American bird — a deep cup woven with bark strips, plant fibers, and spider silk, decorated on the outside with lichens, hung from a branch fork.",eBirdCode:"yetvir",merlinId:"Yellow-throated_Vireo"},{id:"scarlet_tanager",commonName:"Scarlet Tanager",scientificName:"Piranga olivacea",family:"Cardinalidae",order:"Passeriformes",sizeCategory:"small",length_cm:[16,19],wingspan_cm:[25,30],weight_g:[23,38],appearance:{billShape:"conical",billSizeRelative:"medium",billColor:{male:"pale gray",female:"pale gray"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#DC2020",female:"#8AAA30"},uiColor:"#DC2020",secondaryColors:{male:["#1A1A1A (wings and tail — jet black)","#F0F0F0 (white belly)"],female:["#1A1A1A (dark wings)","#F5E840 (yellow-green)"]},distinctiveMarkings:{male:["Brilliant scarlet-red body with jet-black wings and tail","The contrast is total and unmistakable","Pale heavy bill","White wing linings visible in flight","Molts to female-like plumage in fall — green-yellow with dark wings"],female:["Olive-yellow above, yellow-green below","Darker olive wings (not black)","Best told from female Summer Tanager by wing color"],juvenile:["Resembles female"]},plumageDescription:{male:"The male Scarlet Tanager in breeding plumage is perhaps the most striking bird likely to appear in an eastern forest: the body is a brilliant, saturated scarlet-red — not orange, not pink, but fire-engine red — contrasted completely against jet-black wings and tail. Seeing one in dappled forest light is startling. In fall he molts to yellowish-green with black wings — still distinctive.",female:"Olive-yellow and understated, with darker olive wings that help distinguish her from other tanagers."}},primaryHabitat:["deciduous_forest","forest_interior","oak_forest","large_woodlots"],feedingLayer:"canopy",flightStyle:"direct",socialBehavior:{breeding:"monogamous_pairs",winter:"loose_flocks"},typicalGroupSize:{min:1,max:2},activeHours:"diurnal",sound:{callDescription:'"Chip-burr" — distinctive two-note call, easy to learn.',songDescription:'Robin-like phrases but hoarser, with a burry quality: "querit, queer, queerit, queer..." — like a robin with a sore throat. Sings from high in the canopy.',loudness:7,callFrequency:5,singingSeason:{spring:"frequent",summer:"frequent",fall:"rare",winter:"absent"}},seasons:{spring:{presence:"summer",commonness:"uncommon"},summer:{presence:"summer",commonness:"uncommon"},fall:{presence:"migrant",commonness:"uncommon"},winter:{presence:"absent",commonness:"absent"}},range:"eastern_north_america",captureStats:{difficulty:6,speed:3,flightiness:5,camouflage:2,sizeScore:5,movementPattern:"perching",captureBackground:"forest_canopy",behaviorNotes:'Sits motionless in the high canopy for long periods, scanning for insects. Despite the brilliant plumage, can be hard to spot among dense leaves at height. The "chip-burr" call usually reveals it before you see it.'},rarity:"uncommon",rarityColor:"#2196f3",points:220,verificationThreshold:.75,verificationMethods:1,description:'The Scarlet Tanager is a creature of superlatives: the reddest bird in the eastern forest, a traveler that winters in the Andes, and a reminder that something truly tropical passes through suburban parks every May. Despite the blazing color, it can be frustratingly hard to see in the high canopy. The "chip-burr" call — given repeatedly — is often the only clue to its presence overhead.',funFacts:["The Scarlet Tanager winters in the foothill forests of the Andes in Colombia, Ecuador, and Peru — a round-trip journey of over 6,000 miles.","In fall, the male molts into a female-like green-yellow plumage — but retains the black wings, making him look like a giant Yellow-rumped Warbler."],eBirdCode:"scatan",merlinId:"Scarlet_Tanager"},{id:"baltimore_oriole",commonName:"Baltimore Oriole",scientificName:"Icterus galbula",family:"Icteridae",order:"Passeriformes",sizeCategory:"small",length_cm:[17,22],wingspan_cm:[23,30],weight_g:[22,42],appearance:{billShape:"thin",billSizeRelative:"medium",billColor:{male:"silver-gray",female:"pale gray"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#FF8000",female:"#C87020"},uiColor:"#FF8000",secondaryColors:{male:["#1A1A1A (head, back, wings, central tail)","#FF8000 (breast, belly, rump, outer tail)","#FFFFFF (wing bar)"],female:["Yellow-orange below","Grayish-brown above with wing bars"]},distinctiveMarkings:{male:["Brilliant orange breast, belly, and rump","Jet black head, back, and wings","Black central tail with orange outer feathers","Single bold white wing bar","Silver-gray pointed bill"],female:["Yellow-orange below (duller than male)","Olive-brownish above","Two white wing bars","No black hood"],juvenile:["Resembles female; males acquire black in second year"]},plumageDescription:{male:"Baltimore Oriole males are all contrast: jet black above and blazing orange below. The black hood covers the entire head, throat, and back; the breast, belly, rump, and outer tail feathers are brilliant flame-orange. A single white wing bar cuts across the dark wing. The silver-gray pointed bill gives the face a clean, sleek look.",female:"Yellow-orange below with olive-brownish upperparts and two white wing bars. Handsome but understated compared to the male."}},primaryHabitat:["tall_deciduous_trees","riparian_woodland","forest_edge","parks","suburbs"],feedingLayer:"canopy",flightStyle:"direct",socialBehavior:{breeding:"monogamous_pairs",winter:"loose_flocks"},typicalGroupSize:{min:1,max:4},activeHours:"diurnal",sound:{callDescription:"Chattering rattle; also a distinctive clear whistle.",songDescription:"Rich, flute-like whistled phrases: clear, melodious, and carrying. Each male has a repertoire of several phrases. The female also sings.",loudness:8,callFrequency:6,singingSeason:{spring:"frequent",summer:"moderate",fall:"rare",winter:"absent"}},seasons:{spring:{presence:"summer",commonness:"uncommon"},summer:{presence:"summer",commonness:"uncommon"},fall:{presence:"migrant",commonness:"uncommon"},winter:{presence:"absent",commonness:"absent"}},range:"eastern_north_america",captureStats:{difficulty:6,speed:5,flightiness:6,camouflage:1,sizeScore:5,movementPattern:"oriole",captureBackground:"tall_trees",behaviorNotes:"Forages in the upper canopy, hanging from branch tips to reach nectar, insects, and fruit. Pendulum-like movements along branches. Conspicuous in tall elms, cottonwoods, and sycamores along watercourses."},rarity:"uncommon",rarityColor:"#2196f3",points:195,verificationThreshold:.72,verificationMethods:1,description:"The Baltimore Oriole is spring in a bird: the moment one appears in a tall elm or cottonwood, orange against the fresh green leaves, the season has truly arrived. The female weaves one of the most intricate nests in North America — a hanging pouch of plant fibers and plant down suspended from a drooping branch tip, swinging in the wind. The male sings from a prominent branch, a rich whistled phrase that carries far.",funFacts:["Female Baltimore Orioles weave their hanging basket nests entirely without using their feet — all with the bill alone, threading each fiber back and forth.","Baltimore Orioles have a trick for getting nectar from tubular flowers: they cut straight through the base of the flower with their sharp bill, bypassing the bloom entirely."],eBirdCode:"balori",merlinId:"Baltimore_Oriole"},{id:"rose_breasted_grosbeak",commonName:"Rose-breasted Grosbeak",scientificName:"Pheucticus ludovicianus",family:"Cardinalidae",order:"Passeriformes",sizeCategory:"small",length_cm:[18,21],wingspan_cm:[29,33],weight_g:[35,65],appearance:{billShape:"conical",billSizeRelative:"massive",billColor:{male:"pale ivory-gray",female:"pale gray"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#1A1A1A",female:"#7A6040"},uiColor:"#DC3060",secondaryColors:{male:["#DC3060 (rose-red inverted triangle on breast)","#FFFFFF (belly, wing patches)","#1A1A1A (head, back, wings, tail)"],female:["#F5F5C8 (buffy white below with streaks)","#FFFFFF (supercilium, crown stripe)"]},distinctiveMarkings:{male:["Black head, back, wings, and tail","Brilliant rose-red inverted triangular patch on the breast","White belly and undertail","Large white wing patches visible in flight","Massive pale ivory bill — unmistakably large"],female:["Brown and heavily streaked","Broad white supercilium","White median crown stripe","Yellow wing linings (visible in flight)","Massive bill — same size as male"],juvenile:["Males begin showing rose breast patches in first fall"]},plumageDescription:{male:"One of the most striking birds at an eastern bird feeder or in a forest edge: the male is jet black from crown to tail except for a blazing rose-red triangle on the center of the breast, white belly, and large white wing patches. The massive pale ivory bill is almost comically large — built for cracking the toughest seeds and buds.",female:"Brown and heavily streaked, with a bold white supercilium and crown stripe. The massive bill and yellow wing linings (visible when she stretches a wing) are the telltale signs."}},primaryHabitat:["forest_edge","second_growth","woodland","parks","suburban"],feedingLayer:"multi",flightStyle:"bounding",socialBehavior:{breeding:"monogamous_pairs",winter:"loose_flocks"},typicalGroupSize:{min:1,max:4},activeHours:"diurnal",sound:{callDescription:'Sharp "peek" — distinctive, like a sneaker squeaking on a floor.',songDescription:"Rich, robin-like caroling but faster and more melodic — with a sweeter, more liquid quality. Both sexes sing. Males sing from a conspicuous perch.",loudness:7,callFrequency:6,singingSeason:{spring:"frequent",summer:"moderate",fall:"rare",winter:"absent"}},seasons:{spring:{presence:"summer",commonness:"uncommon"},summer:{presence:"summer",commonness:"uncommon"},fall:{presence:"migrant",commonness:"uncommon"},winter:{presence:"absent",commonness:"absent"}},range:"eastern_north_america",captureStats:{difficulty:4,speed:3,flightiness:4,camouflage:2,sizeScore:5,movementPattern:"perching",captureBackground:"forest_edge",behaviorNotes:"Often conspicuous: the male perches openly in forest edge trees to sing. Visits feeders readily during migration. Chunky, robin-sized build with the telltale massive bill."},rarity:"uncommon",rarityColor:"#2196f3",points:185,verificationThreshold:.7,verificationMethods:1,description:"The Rose-breasted Grosbeak is a showstopper at any bird feeder: the male's jet-black plumage and blazing rose-red breast patch are unmistakable, and the ivory bill is proportionately enormous — designed to crack seeds too hard for most birds. Both sexes sing, and the male even sings softly while incubating eggs on the nest. A forest-edge bird that readily visits sunflower feeders during spring migration.",funFacts:["Male Rose-breasted Grosbeaks incubate eggs and brood young just as much as females do — and they sing quietly while on the nest.",'The call note — a sharp "peek" — is so distinctive that experienced birders can identify migrating grosbeaks flying overhead at night by this sound alone.'],eBirdCode:"robgro",merlinId:"Rose-breasted_Grosbeak"},{id:"indigo_bunting",commonName:"Indigo Bunting",scientificName:"Passerina cyanea",family:"Cardinalidae",order:"Passeriformes",sizeCategory:"tiny",length_cm:[11,13],wingspan_cm:[18,23],weight_g:[11,21],appearance:{billShape:"conical",billSizeRelative:"small",billColor:{male:"silver-gray",female:"pale gray"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#3060D0",female:"#9A7A50"},uiColor:"#3060D0",secondaryColors:{male:["#3060D0 to #4080F0 (brilliant cobalt blue, uniform)","#1A2050 (wing and tail slightly darker)"],female:["#C8A870 (brown, streaky underparts)","#9A7A50 (plain brown above)"]},distinctiveMarkings:{male:["All-over brilliant cobalt blue — no other marking","In certain light appears black (iridescence)","Small conical bill","Compact sparrow-like body","No wing bars"],female:["Plain buffy-brown overall","Faint streaks on breast","No wing bars","Easily overlooked"],juvenile:["First-year males are blotchy brown and blue"]},plumageDescription:{male:"A male Indigo Bunting in full breeding plumage is extraordinary: the entire bird — head, back, wings, tail, breast, belly — is brilliant cobalt blue without any other marking. The intensity varies dramatically with the angle of light; in shadow the bird can look almost black, but in direct sunlight it glows electric cobalt. There is nothing quite like it in the eastern avifauna.",female:"Plain, streaky brown — one of the plainest-looking birds in North America, and almost impossible to recognize as related to the brilliant male."}},primaryHabitat:["shrubby_fields","forest_edge","roadsides","brushy_woodland_edge","weedy_fields"],feedingLayer:"shrub",flightStyle:"bounding",socialBehavior:{breeding:"monogamous_pairs",winter:"large_flocks"},typicalGroupSize:{min:1,max:100},activeHours:"diurnal",sound:{callDescription:'Sharp "spit" call.',songDescription:'"fire-fire, where-where, here-here, see-it-see-it" — sweet, high-pitched phrases in pairs, each pair on a slightly different pitch. Sings all day throughout summer, even at midday heat.',loudness:6,callFrequency:8,singingSeason:{spring:"frequent",summer:"frequent",fall:"rare",winter:"absent"}},seasons:{spring:{presence:"summer",commonness:"uncommon"},summer:{presence:"summer",commonness:"uncommon"},fall:{presence:"migrant",commonness:"uncommon"},winter:{presence:"absent",commonness:"absent"}},range:"eastern_north_america",captureStats:{difficulty:5,speed:4,flightiness:6,camouflage:1,sizeScore:2,movementPattern:"perching",captureBackground:"shrubby_field",behaviorNotes:"Males sing tirelessly from exposed perches — weed tops, wire fences, power lines — making them easy to locate. But they flush readily when approached. Navigates by the stars during night migration."},rarity:"uncommon",rarityColor:"#2196f3",points:180,verificationThreshold:.72,verificationMethods:1,description:"Indigo Buntings are birds of edges — they thrive in that narrow zone where forest meets field, singing from exposed weed stalks and fence wires throughout the summer. The male's all-blue plumage has no structural blue pigment (rare in birds); the color is created entirely by microscopic feather structures that scatter light. Move your position, and the bird goes from electric cobalt to dark slate.",funFacts:["Indigo Buntings navigate by the stars — specifically, they memorize the fixed point of the night sky around Polaris and orient their migration accordingly.","The blue of an Indigo Bunting is not a pigment — there is no blue pigment in the feathers. The color comes from microscopic feather structures that refract light, the same principle as a soap bubble."],eBirdCode:"indbun",merlinId:"Indigo_Bunting"},{id:"wood_thrush",commonName:"Wood Thrush",scientificName:"Hylocichla mustelina",family:"Turdidae",order:"Passeriformes",sizeCategory:"small",length_cm:[18,22],wingspan_cm:[30,35],weight_g:[48,72],appearance:{billShape:"thin",billSizeRelative:"medium",billColor:{male:"pinkish-yellow base, dark tip",female:"same"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#AA4020",female:"#AA4020"},uiColor:"#AA4020",secondaryColors:{male:["#8A6030 (olive-brown back)","#F5F5F5 (white breast)","#1A1A1A (bold round spots on breast and flanks)","#FFFFFF (eye ring)"]},distinctiveMarkings:{male:["Rufous-brown head and nape — distinctly more rufous than back","Olive-brown back","White breast and flanks with bold round (not streaked) black spots","White eye ring","Thrush proportions: round body, strong legs"],female:["Identical to male"],juvenile:["Spotted back typical of thrush fledglings"]},plumageDescription:{male:"The Wood Thrush is robustly built for a forest-floor bird: the head and nape are rich rufous-brown — deeper and redder than the olive-brown back — giving it a two-toned upper surface. The breast and flanks are clean white, heavily spotted with large, bold, round black spots that extend far down the flanks. The white eye ring gives the bird a clear-eyed, attentive expression. Classic thrush proportions — pot-bellied, upright, alert.",female:"Identical to male in all aspects."}},primaryHabitat:["deciduous_forest","forest_interior","moist_woodland","ravines"],feedingLayer:"ground",flightStyle:"direct",socialBehavior:{breeding:"territorial_pairs",winter:"solitary"},typicalGroupSize:{min:1,max:1},activeHours:"diurnal",sound:{callDescription:'"Pit-pit-pit" — rapid staccato alarm.',songDescription:'The ethereal "ee-oh-lay" fluted phrases — some of the most beautiful singing of any North American bird. The bird sings two notes simultaneously using different parts of its syrinx, creating an internal harmony. Rich, organ-like quality in dim forest light.',loudness:8,callFrequency:6,singingSeason:{spring:"frequent",summer:"frequent",fall:"rare",winter:"absent"}},seasons:{spring:{presence:"summer",commonness:"uncommon"},summer:{presence:"summer",commonness:"uncommon"},fall:{presence:"migrant",commonness:"uncommon"},winter:{presence:"absent",commonness:"absent"}},range:"eastern_north_america",captureStats:{difficulty:5,speed:4,flightiness:6,camouflage:3,sizeScore:6,movementPattern:"hopping",captureBackground:"forest_floor",behaviorNotes:"Forages on the forest floor by hopping and tossing leaf litter, stopping to stand erect and watch. Less nervous than many thrushes but flushes readily if approached directly. Often seen in dappled light on shaded slopes."},rarity:"uncommon",rarityColor:"#2196f3",points:195,verificationThreshold:.7,verificationMethods:1,description:`The Wood Thrush sings with two voices simultaneously. Its syrinx — the bird's vocal organ — is divided, and the Wood Thrush has mastered using both halves independently, creating internal harmonies with a single throat. Henry David Thoreau called it "the finest singer of the woods" and "the only bird with a hymn." Its population has declined steeply as forest fragments become too small to support breeding pairs.`,funFacts:["The Wood Thrush sings two notes at once using the two sides of its syrinx independently — producing internal harmonies from a single bird.","Wood Thrush populations have declined by 60% since the 1960s. The cause: forest fragmentation creates edge habitat where Brown-headed Cowbirds parasitize nests, and deforestation in its Central American wintering grounds."],eBirdCode:"woothr",merlinId:"Wood_Thrush"},{id:"eastern_towhee",commonName:"Eastern Towhee",scientificName:"Pipilo erythrophthalmus",family:"Passerellidae",order:"Passeriformes",sizeCategory:"small",length_cm:[17,21],wingspan_cm:[20,30],weight_g:[33,53],appearance:{billShape:"conical",billSizeRelative:"medium",billColor:{male:"dark gray",female:"dark gray"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#1A1A1A",female:"#7A5030"},uiColor:"#C04020",secondaryColors:{male:["#C04020 (rich rufous sides)","#F5F5F5 (white belly)","#FFFFFF (white wing spots, white tail corners)","#9B2020 (red eye)"],female:["Warm brown replaces black; same rufous sides and white belly"]},distinctiveMarkings:{male:["Jet black head, throat, back, wings, and tail","Rich rufous-orange sides and flanks","White belly and undertail","White spots in closed wing","White corners on long tail","Red eye","Chunky, large sparrow"],female:["Rich warm brown where male is black","Same rufous sides, white belly, wing spots","Red eye present"],juvenile:["Streaky brown; adult pattern acquired by first fall"]},plumageDescription:{male:"The Eastern Towhee is large and boldly patterned for a sparrow: the male is jet black above (head, back, wings, tail) and white below, with rich rufous-orange sides that create a tricolor pattern. White spots in the closed wing and white outer tail corners add detail. The red eye is brilliant at close range. A large, handsome bird with a distinctive double-scratch foraging style.",female:"Warm tawny-brown replaces the black of the male, but the pattern is identical: same rufous sides, same white belly, same white wing spots and tail corners, and the same red eye."}},primaryHabitat:["shrubby_woodland","forest_edge","thickets","overgrown_fields","undergrowth"],feedingLayer:"ground",flightStyle:"bounding",socialBehavior:{breeding:"territorial_pairs",winter:"small_groups"},typicalGroupSize:{min:1,max:6},activeHours:"diurnal",sound:{callDescription:'"Chewink" or "towhee" — a rising, emphatic two-note call that gave the bird both its common names.',songDescription:'"Drink-your-teeeea" — an emphatic, buzzy phrase with a rising trill on the last note. Often the first thing you hear in brushy second growth.',loudness:7,callFrequency:7,singingSeason:{spring:"frequent",summer:"frequent",fall:"occasional",winter:"rare"}},seasons:{spring:{presence:"resident",commonness:"common"},summer:{presence:"resident",commonness:"common"},fall:{presence:"resident",commonness:"common"},winter:{presence:"resident",commonness:"uncommon"}},range:"eastern_north_america",captureStats:{difficulty:4,speed:4,flightiness:5,camouflage:3,sizeScore:5,movementPattern:"scratching",captureBackground:"forest_undergrowth",behaviorNotes:'Forages by kicking backward with both feet simultaneously — the "double-scratch" — sending leaf litter flying in search of hidden insects and seeds. Often heard more than seen; skulks in dense brush but males sing from exposed perches.'},rarity:"common",rarityColor:"#4caf50",points:130,verificationThreshold:.65,verificationMethods:1,description:"The Eastern Towhee is a bird with a technique: its famous double-scratch — kicking backward with both feet simultaneously to flip leaf litter — is one of the most distinctive foraging behaviors of any woodland bird, loud enough to sound like a small mammal in the undergrowth. The bird itself is boldly colored and unmistakable when seen: tricolored black, white, and rufous, with a red eye that glows in forest shade.",funFacts:["The Eastern Towhee scratches with both feet simultaneously — a technique so loud that many birdwatchers first hear it and look for a squirrel. Very few songbirds use this two-footed kick.",'The towhee has two names from its call: "towhee" is one phonetic rendering and "chewink" is another — and birders spent decades arguing which was correct before both names became standard.'],eBirdCode:"eastem",merlinId:"Eastern_Towhee"},{id:"blackthroated_green_warbler",commonName:"Black-throated Green Warbler",scientificName:"Setophaga virens",family:"Parulidae",order:"Passeriformes",sizeCategory:"tiny",length_cm:[11,13],wingspan_cm:[17,20],weight_g:[7,11],appearance:{billShape:"thin",billSizeRelative:"small",billColor:{male:"dark",female:"dark"},crestPresent:!1,primaryColor:{male:"#4a8a3a",female:"#5a9a4a"},uiColor:"#4a8a3a",secondaryColors:{male:["#1A1A1A (throat)","#FFEE88 (face)"],female:["#AAC8AA (throat)","#FFEE88 (face)"]},distinctiveMarkings:{male:["Olive-green back","Bright yellow face","Solid black throat and upper breast","Two white wing bars"],female:["Same pattern; yellow-olive replaces black on throat"]},plumageDescription:{male:"Olive-green back, glowing yellow face, and a bold black bib — one of the most cleanly patterned warblers on the flyway.",female:"Nearly identical but throat is pale yellow-olive rather than black."}},primaryHabitat:["hemlock_forest","mixed_conifers","woodland_canopy"],feedingLayer:"canopy",flightStyle:"direct",socialBehavior:{breeding:"territorial_pairs",winter:"mixed_flocks"},typicalGroupSize:{min:1,max:3},activeHours:"diurnal",sound:{callDescription:'High, thin "tsip"',songDescription:'"Zoo zee zoo zoo zee" — a dreamy, buzzy phrase. One of the signature sounds of the northeastern hemlock forest.',loudness:6,callFrequency:5,singingSeason:{spring:"frequent",summer:"frequent",fall:"rare",winter:"silent"}},seasons:{spring:{presence:"migrant",commonness:"common"},summer:{presence:"breeder",commonness:"common"},fall:{presence:"migrant",commonness:"uncommon"},winter:{presence:"absent",commonness:"absent"}},range:"atlantic_flyway",regions:["NE","SE"],captureStats:{difficulty:5,speed:6,flightiness:6,camouflage:4,sizeScore:2,movementPattern:"canopy_gleaning",captureBackground:"hemlock_canopy",behaviorNotes:"Forages methodically through hemlock boughs. Often sings from an exposed upper branch — look for the yellow face catching the light."},rarity:"uncommon",rarityColor:"#2196f3",points:210,verificationThreshold:.7,verificationMethods:2,description:"A gem of the hemlock forest. The Black-throated Green Warbler's song — five lazy, buzzy notes — is one of the most evocative sounds of the northeastern spring canopy.",funFacts:["One male was recorded singing 466 times in an hour — remarkable even by warbler standards.","Where woolly adelgid kills hemlocks, Black-throated Green Warbler numbers fall almost immediately — making it a sentinel for hemlock health."],eBirdCode:"btnwar",merlinId:"Black-throated_Green_Warbler"},{id:"blackburnian_warbler",commonName:"Blackburnian Warbler",scientificName:"Setophaga fusca",family:"Parulidae",order:"Passeriformes",sizeCategory:"tiny",length_cm:[11,13],wingspan_cm:[20,22],weight_g:[8,13],appearance:{billShape:"thin",billSizeRelative:"small",billColor:{male:"dark",female:"dark"},crestPresent:!1,primaryColor:{male:"#FF6B00",female:"#E8A050"},uiColor:"#FF6B00",secondaryColors:{male:["#1A1A1A (back, cheek)","#FFFFFF (wing patch)"],female:["#B87030 (throat)","#F5F5DC (wing bars)"]},distinctiveMarkings:{male:['Blazing orange throat — the "fire throat"',"Black-and-white streaked back","Large white wing patch","Black cheek patch framing orange face"],female:["Same pattern but orange replaced with pale yellow-buff"]},plumageDescription:{male:"The male Blackburnian is genuinely startling: a throat the color of embers, set against a black-and-white body. Nothing else in North America looks like this.",female:"Streaked brown above, yellow-buff throat. Recognizable by the streaking pattern and two white wing bars, but far more subtly marked than the male."}},primaryHabitat:["mature_conifers","spruce_fir_forest","woodland_canopy"],feedingLayer:"canopy",flightStyle:"direct",socialBehavior:{breeding:"territorial_pairs",winter:"mixed_flocks"},typicalGroupSize:{min:1,max:2},activeHours:"diurnal",sound:{callDescription:'Sharp "tsip" or "chip"',songDescription:"An ultra-high, thin ascending whistle, often ending with a rising note beyond many adult ears. One of the highest-pitched warbler songs.",loudness:6,callFrequency:4,singingSeason:{spring:"frequent",summer:"moderate",fall:"silent",winter:"silent"}},seasons:{spring:{presence:"migrant",commonness:"uncommon"},summer:{presence:"breeder",commonness:"uncommon"},fall:{presence:"migrant",commonness:"rare"},winter:{presence:"absent",commonness:"absent"}},range:"atlantic_flyway",regions:["NE","SE"],captureStats:{difficulty:7,speed:7,flightiness:7,camouflage:3,sizeScore:2,movementPattern:"high_canopy_creeping",captureBackground:"spruce_canopy",behaviorNotes:"Almost always forages at the very tops of tall conifers — stiff neck required. During migration, may drop lower into mixed flocks."},rarity:"rare",rarityColor:"#9c27b0",points:320,verificationThreshold:.75,verificationMethods:2,description:"The Blackburnian Warbler is the fire-throated jewel of the spruce-fir canopy. The male's blazing orange throat is unlike anything else in North American birds.",funFacts:["The Blackburnian was named after Anna Blackburne, an 18th-century English botanist who never visited North America but maintained a private natural history museum.","Its song is so high-pitched that some birders over 50 genuinely cannot hear it — a hearing test disguised as a field trip."],eBirdCode:"blawar",merlinId:"Blackburnian_Warbler"},{id:"magnolia_warbler",commonName:"Magnolia Warbler",scientificName:"Setophaga magnolia",family:"Parulidae",order:"Passeriformes",sizeCategory:"tiny",length_cm:[11,13],wingspan_cm:[16,20],weight_g:[6,12],appearance:{billShape:"thin",billSizeRelative:"small",billColor:{male:"dark",female:"dark"},crestPresent:!1,primaryColor:{male:"#FFD700",female:"#EEC950"},uiColor:"#FFD700",secondaryColors:{male:["#1A1A1A (back, necklace streaks)","#FFFFFF (wing patch, tail band)"],female:["#7a7a7a (back)","#1A1A1A (light streaking)"]},distinctiveMarkings:{male:["Yellow rump and underparts","Heavy black necklace streaks","Black back with gray crown","Broad white tail band visible in flight"],female:["Two white wing bars, yellow wash below with faint streaking"]},plumageDescription:{male:"Unmistakable: blazing yellow below with a heavy black necklace of streaks, gray crown, and a white tail band that flashes in flight. Looks like a warbler wearing a thunderbolt.",female:"Gray-olive above, yellow below with faint streaking. The white tail band is still diagnostic."}},primaryHabitat:["young_conifers","forest_edges","spruce_regeneration"],feedingLayer:"shrub",flightStyle:"direct",socialBehavior:{breeding:"territorial_pairs",winter:"mixed_flocks"},typicalGroupSize:{min:1,max:4},activeHours:"diurnal",sound:{callDescription:'Nasal "tseet" — distinctive even among warblers',songDescription:'"Weeta weeta weeteo" — short, sweet, and emphatic. Often compared to a fast Yellow Warbler.',loudness:6,callFrequency:6,singingSeason:{spring:"frequent",summer:"frequent",fall:"rare",winter:"silent"}},seasons:{spring:{presence:"migrant",commonness:"common"},summer:{presence:"breeder",commonness:"uncommon"},fall:{presence:"migrant",commonness:"common"},winter:{presence:"absent",commonness:"absent"}},range:"atlantic_flyway",regions:["NE","SE"],captureStats:{difficulty:5,speed:6,flightiness:5,camouflage:2,sizeScore:2,movementPattern:"active_gleaning",captureBackground:"young_spruce",behaviorNotes:"Active and low-foraging during migration — easier to see than many warblers. Males fan the tail frequently, flashing the diagnostic white tail band."},rarity:"uncommon",rarityColor:"#2196f3",points:220,verificationThreshold:.7,verificationMethods:2,description:"The Magnolia Warbler was named not for its habitat but because Alexander Wilson first collected one in a magnolia tree in 1811. It's one of the showiest migrants of the Atlantic flyway.",funFacts:["Despite the name, Magnolia Warblers don't use magnolias — Wilson just happened to first see one in one.","Magnolias are among the most cooperative migrants: during fall migration, they often forage low and slowly, giving excellent looks."],eBirdCode:"magwar",merlinId:"Magnolia_Warbler"},{id:"chestnuside_warbler",commonName:"Chestnut-sided Warbler",scientificName:"Setophaga pensylvanica",family:"Parulidae",order:"Passeriformes",sizeCategory:"tiny",length_cm:[11,13],wingspan_cm:[16,19],weight_g:[8,13],appearance:{billShape:"thin",billSizeRelative:"small",billColor:{male:"dark",female:"dark"},crestPresent:!1,primaryColor:{male:"#FFFF99",female:"#E0E8B0"},uiColor:"#8B4513",secondaryColors:{male:["#8B4513 (chestnut sides)","#FFFF99 (crown)","#1A1A1A (face mask)"],female:["light chestnut sides, lime-green cap"]},distinctiveMarkings:{male:["Bright yellow cap","Rich chestnut stripe along flanks","White face and underparts","Black cheek and malar stripe"],female:["Lime-green cap, reduced chestnut, faint streaking"]},plumageDescription:{male:"Distinctive in every season: yellow cap, chestnut flanks, and white underparts divided by black facial markings. Looks permanently surprised.",female:"Olive-green cap, reduced or absent chestnut, white below. Two white wing bars."}},primaryHabitat:["shrubby_regrowth","forest_edges","overgrown_clearcuts"],feedingLayer:"shrub",flightStyle:"direct",socialBehavior:{breeding:"territorial_pairs",winter:"mixed_flocks"},typicalGroupSize:{min:1,max:3},activeHours:"diurnal",sound:{callDescription:'Sharp "chip"',songDescription:'"Please please pleased to meetcha" — one of the most memorable mnemonic phrases in birding. The final note emphatically drops.',loudness:7,callFrequency:7,singingSeason:{spring:"frequent",summer:"frequent",fall:"rare",winter:"silent"}},seasons:{spring:{presence:"migrant",commonness:"common"},summer:{presence:"breeder",commonness:"common"},fall:{presence:"migrant",commonness:"uncommon"},winter:{presence:"absent",commonness:"absent"}},range:"atlantic_flyway",regions:["NE","SE"],captureStats:{difficulty:4,speed:5,flightiness:5,camouflage:3,sizeScore:2,movementPattern:"shrub_gleaning",captureBackground:"shrubby_edge",behaviorNotes:"Forages in dense shrubs, often holding wings slightly drooped. Males are bold and approach intruders — territorial."},rarity:"uncommon",rarityColor:"#2196f3",points:190,verificationThreshold:.68,verificationMethods:2,description:"Before European settlement, the Chestnut-sided Warbler was rare — it thrives in young second-growth forest that humans inadvertently created. It's one of the few species genuinely benefiting from forest fragmentation.",funFacts:["John James Audubon saw this species only once in his lifetime. Now it's one of the most common warblers in the northeastern US — a complete reversal driven by land use change.","Males hold two song types: one for attracting mates and one for repelling rivals."],eBirdCode:"chswar",merlinId:"Chestnut-sided_Warbler"},{id:"blackthroated_blue_warbler",commonName:"Black-throated Blue Warbler",scientificName:"Setophaga caerulescens",family:"Parulidae",order:"Passeriformes",sizeCategory:"tiny",length_cm:[12,14],wingspan_cm:[17,20],weight_g:[8,13],appearance:{billShape:"thin",billSizeRelative:"small",billColor:{male:"dark",female:"dark"},crestPresent:!1,primaryColor:{male:"#1a3a8a",female:"#7a9a6a"},uiColor:"#1a3a8a",secondaryColors:{male:["#1A1A1A (throat, flanks)","#FFFFFF (belly, wing spot)"],female:["#FFFFF0 (supercilium)","#9ab07a (underparts)"]},distinctiveMarkings:{male:["Deep navy-blue back and crown","Solid black face and throat","White belly",'Small white wing spot ("handkerchief")'],female:["Olive-green above, buffy below — entirely different look. White supercilium and tiny white wing spot are the giveaways"]},plumageDescription:{male:"One of the most strikingly two-toned warblers: rich navy-blue above, jet black below on the face and throat, clean white belly. The white wing spot is a tiny beacon.",female:"Looks like a completely different species. Plain olive-green above, warm buff below. The white wing spot and pale eyebrow stripe are the identification keys."}},primaryHabitat:["deciduous_forest","rhododendron_understory","mountain_slopes"],feedingLayer:"shrub",flightStyle:"direct",socialBehavior:{breeding:"territorial_pairs",winter:"mixed_flocks"},typicalGroupSize:{min:1,max:2},activeHours:"diurnal",sound:{callDescription:'Flat "chuck" — low for a warbler',songDescription:'"I am so laz-eee" — a slow, husky, ascending buzz. Sounds as if the bird is too relaxed to finish its sentence.',loudness:6,callFrequency:5,singingSeason:{spring:"frequent",summer:"moderate",fall:"rare",winter:"silent"}},seasons:{spring:{presence:"migrant",commonness:"common"},summer:{presence:"breeder",commonness:"uncommon"},fall:{presence:"migrant",commonness:"common"},winter:{presence:"absent",commonness:"absent"}},range:"atlantic_flyway",regions:["NE","SE"],captureStats:{difficulty:5,speed:5,flightiness:5,camouflage:5,sizeScore:2,movementPattern:"understory_foraging",captureBackground:"rhododendron_forest",behaviorNotes:"Forages low to mid-story, often in dense rhododendron. Males sing repeatedly from exposed perches. The female's olive camouflage makes her hard to spot."},rarity:"uncommon",rarityColor:"#2196f3",points:230,verificationThreshold:.72,verificationMethods:2,description:"The Black-throated Blue Warbler is unusual in that males and females look so different they were described as separate species by Audubon and Wilson. The male is indigo-dark; the female is plainly olive.",funFacts:["BTB Warblers return to the same 1–3 hectare territory year after year — remarkable site fidelity for a bird that winters in the Caribbean.","Female BTBs are among the plainest-looking warblers in the east — a classic case of sexual dimorphism taken to extremes."],eBirdCode:"btbwar",merlinId:"Black-throated_Blue_Warbler"},{id:"canada_warbler",commonName:"Canada Warbler",scientificName:"Cardellina canadensis",family:"Parulidae",order:"Passeriformes",sizeCategory:"tiny",length_cm:[12,14],wingspan_cm:[17,20],weight_g:[9,13],appearance:{billShape:"thin",billSizeRelative:"small",billColor:{male:"dark",female:"dark"},crestPresent:!1,primaryColor:{male:"#607090",female:"#708090"},uiColor:"#607090",secondaryColors:{male:["#FFD700 (underparts, eye ring)","#1A1A1A (necklace streaks, face)"],female:["#FFD700 (underparts)","#888 (reduced necklace)"]},distinctiveMarkings:{male:["Gray-blue back and cap","Bright yellow underparts","Bold black necklace of spots across breast","Yellow eye ring","No wing bars"],female:["Same pattern; necklace is faint or absent"]},plumageDescription:{male:"Clean and graphic: blue-gray back, brilliant yellow below, with a necklace of black spots that looks hand-painted. Yellow spectacles (eye ring) add to the jeweled look.",female:"Olive-gray above, yellow below, with a faint necklace and yellow eye ring. Still distinctive once you know the pattern."}},primaryHabitat:["cool_damp_forest","alder_thickets","stream_corridors","boreal_edge"],feedingLayer:"shrub",flightStyle:"direct",socialBehavior:{breeding:"territorial_pairs",winter:"mixed_flocks"},typicalGroupSize:{min:1,max:2},activeHours:"diurnal",sound:{callDescription:'Sharp "chep"',songDescription:"An erratic, bubbling chip-chip-chittychitty-chip — like a musical sentence with no grammar. Complex and variable.",loudness:6,callFrequency:6,singingSeason:{spring:"frequent",summer:"frequent",fall:"rare",winter:"silent"}},seasons:{spring:{presence:"migrant",commonness:"uncommon"},summer:{presence:"breeder",commonness:"uncommon"},fall:{presence:"migrant",commonness:"rare"},winter:{presence:"absent",commonnes
