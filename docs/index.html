tory space.","Pewees build one of the most beautiful bird nests: a shallow cup covered in lichen, saddle-mounted on a branch and nearly invisible from below."],eBirdCode:"eawpew"},{id:"great_crested_flycatcher",commonName:"Great Crested Flycatcher",scientificName:"Myiarchus crinitus",family:"Tyrannidae",order:"Passeriformes",sizeCategory:"small",length_cm:[17,21],wingspan_cm:[32,38],weight_g:[27,40],appearance:{billShape:"flat",billSizeRelative:"large",billColor:{male:"black",female:"black"},crestPresent:!0,crestColor:{male:"#4A5A30",female:"#4A5A30"},primaryColor:{male:"#4A5A30",female:"#4A5A30"},uiColor:"#F5C800",secondaryColors:{male:["#F0C800 (bright yellow belly)","#8A5030 (rufous tail and wing panels)","#7A8090 (gray throat and breast)","#4A5A30 (olive-green back)"]},distinctiveMarkings:{male:["Olive-green back","Gray throat and breast","Brilliant yellow belly","Rufous tail — flashes in flight","Chestnut in wings","Bushy crest",'Loud "wheep!" call']},plumageDescription:{male:"A strikingly colorful flycatcher: olive-green back, gray throat and breast, bright yellow belly, and a rufous tail that glows when backlit. Bushy crest and chestnut wing panels complete the look."}},primaryHabitat:["forest_interior","woodland","forest_edge"],feedingLayer:"canopy",flightStyle:"sallying",socialBehavior:{breeding:"monogamous_pairs",winter:"solitary"},typicalGroupSize:{min:1,max:1},activeHours:"diurnal",sound:{callDescription:'Loud, rolling "wheep!" — unmistakable once learned.',singingSeason:{spring:"frequent",summer:"frequent",fall:"rare",winter:"absent"},loudness:8,callFrequency:7},seasons:{spring:{presence:"summer",commonness:"uncommon"},summer:{presence:"summer",commonness:"uncommon"},fall:{presence:"migrant",commonness:"uncommon"},winter:{presence:"absent",commonness:"absent"}},range:"eastern_north_america",captureStats:{difficulty:5,speed:5,flightiness:5,camouflage:2,sizeScore:3,movementPattern:"darting",captureBackground:"forest_canopy",behaviorNotes:"Stays high in the canopy, often heard before seen. The rufous tail flash is the first clue when it moves between perches."},rarity:"uncommon",rarityColor:"#2196f3",points:145,verificationThreshold:.68,verificationMethods:1,description:'The Great Crested Flycatcher is a canopy bird with a personality as big as its voice. It nests in tree cavities and has a famous habit of incorporating shed snakeskin into its nest — possibly as a predator deterrent, possibly just because it can. The explosive "wheep!" call carries far through summer forests.',funFacts:["Great Crested Flycatchers famously line their nests with shed snakeskin — and will also use cellophane or plastic wrap if they find it first.","Despite nesting in cavities, they never excavate their own holes — always using natural cavities or abandoned woodpecker holes."],eBirdCode:"grcfly"},{id:"eastern_kingbird",commonName:"Eastern Kingbird",scientificName:"Tyrannus tyrannus",family:"Tyrannidae",order:"Passeriformes",sizeCategory:"small",length_cm:22,wingspan_cm:38,weight_g:47,appearance:{billShape:"flat_hooked",billSizeRelative:"medium",billColor:"black",crestPresent:!1,crestColor:null,primaryColor:"black",uiColor:"#212121",secondaryColors:["white"],distinctiveMarkings:["white_terminal_tail_band","white_underparts","hidden_red_crown_patch"],plumageDescription:"Slate-black above, clean white below. Tail tipped with a crisp white band. Rarely reveals a concealed orange-red crown patch when agitated."},primaryHabitat:["open_country","forest_edge","riparian","farmland"],feedingLayer:"aerial",flightStyle:"sallying",socialBehavior:{breeding:"territorial_pairs",winter:"flocking"},typicalGroupSize:{min:1,max:2},activeHours:"diurnal",sound:{callDescription:'Loud, harsh buzzy chattering "dzeet-dzeet-bzeeer" — aggressive and conspicuous.',singingSeason:{spring:"frequent",summer:"frequent",fall:"rare",winter:"absent"},loudness:8,callFrequency:8},seasons:{spring:{presence:"summer",commonness:"common"},summer:{presence:"summer",commonness:"common"},fall:{presence:"migrant",commonness:"uncommon"},winter:{presence:"absent",commonness:"absent"}},range:"eastern_north_america",captureStats:{difficulty:3,speed:6,flightiness:4,camouflage:1,sizeScore:3,movementPattern:"sallying_perch",captureBackground:"open_sky",behaviorNotes:"Bold and conspicuous — perches in the open and aggressively chases anything that flies by, including hawks and crows vastly larger than itself."},rarity:"common",rarityColor:"#4caf50",points:100,verificationThreshold:.62,verificationMethods:2,description:"The Eastern Kingbird earns its name. Fiercely territorial, it attacks crows, hawks, and eagles with reckless boldness — landing on their backs mid-flight to drive them away. The clean tuxedo pattern and crisp white tail tip make it unmistakable on an open perch.",funFacts:["Eastern Kingbirds have been recorded attacking and riding on the backs of Red-tailed Hawks to drive them from territory.","Despite being aggressive tyrants in summer, they become highly social in winter, traveling in large fruit-eating flocks in South America."],eBirdCode:"easkin"},{id:"barred_owl",commonName:"Barred Owl",scientificName:"Strix varia",family:"Strigidae",order:"Strigiformes",sizeCategory:"medium",length_cm:53,wingspan_cm:112,weight_g:800,appearance:{billShape:"hooked",billSizeRelative:"medium",billColor:"yellow",crestPresent:!1,crestColor:null,primaryColor:"brown",uiColor:"#795548",secondaryColors:["white","buff"],distinctiveMarkings:["horizontal_barring_breast","vertical_streaking_belly","round_head_no_ear_tufts","dark_eyes"],plumageDescription:"Brown and white with horizontal bars on the upper breast and vertical streaking on the belly. Round-headed with no ear tufts and striking dark brown eyes."},primaryHabitat:["mature_forest","riparian_forest","swamp"],feedingLayer:"understory",flightStyle:"gliding",socialBehavior:{breeding:"monogamous_pairs",winter:"solitary"},typicalGroupSize:{min:1,max:1},activeHours:"nocturnal",sound:{callDescription:'"Who cooks for you? Who cooks for you-all!" — deep resonant hooting, often answered between pairs.',singingSeason:{spring:"frequent",summer:"occasional",fall:"occasional",winter:"occasional"},loudness:9,callFrequency:5},seasons:{spring:{presence:"year_round",commonness:"uncommon"},summer:{presence:"year_round",commonness:"uncommon"},fall:{presence:"year_round",commonness:"uncommon"},winter:{presence:"year_round",commonness:"uncommon"}},range:"eastern_north_america",captureStats:{difficulty:6,speed:3,flightiness:3,camouflage:5,sizeScore:5,movementPattern:"still_perch",captureBackground:"forest_interior",behaviorNotes:"Roosts in dense cover during the day, often very still and well-camouflaged. The classic call drifts through forest at dawn and dusk."},rarity:"uncommon",rarityColor:"#2196f3",points:150,verificationThreshold:.68,verificationMethods:2,description:"The Barred Owl is the forest's night watchman, with a resonant call that echoes through swampy woodlands. Unlike most eastern owls, it has dark brown eyes instead of yellow, giving it an unusually gentle expression. It has expanded its range westward, sometimes hybridizing with the rare Spotted Owl.",funFacts:["The Barred Owl's range has expanded dramatically westward, where it now competes with — and hybridizes with — the endangered Spotted Owl.","Barred Owls sometimes call in the middle of the day, especially on overcast days in dense forest."],eBirdCode:"brdowl"},{id:"great_horned_owl",commonName:"Great Horned Owl",scientificName:"Bubo virginianus",family:"Strigidae",order:"Strigiformes",sizeCategory:"large",length_cm:56,wingspan_cm:140,weight_g:1400,appearance:{billShape:"hooked",billSizeRelative:"large",billColor:"gray",crestPresent:!0,crestColor:"brown",primaryColor:"brown",uiColor:"#5d4037",secondaryColors:["buff","black","white"],distinctiveMarkings:["prominent_ear_tufts","white_throat_patch","yellow_eyes","mottled_brown_pattern"],plumageDescription:"Richly mottled brown, black, and buff. Bold white bib on the te_black",crestPresent:!0,crestColor:"iridescent_green",primaryColor:"iridescent_green",uiColor:"#00695c",secondaryColors:["chestnut","white","buff","black","blue"],distinctiveMarkings:["iridescent_green_head","white_face_pattern","chestnut_breast","red_eye","swept_back_crest"],plumageDescription:"Male is arguably the most ornate waterfowl in North America: iridescent green and purple crested head with intricate white face markings, chestnut breast, buff flanks, and bold black and white accents. Female is grayish-brown with white teardrop eye-ring."},primaryHabitat:["swamp","wooded_wetland","beaver_pond","river"],feedingLayer:"water_surface",flightStyle:"direct_fast",socialBehavior:{breeding:"monogamous_pairs",winter:"small_flocks"},typicalGroupSize:{min:1,max:20},activeHours:"diurnal",sound:{callDescription:'Female gives rising "oo-eek oo-eek" when startled; male a thin rising whistle.',singingSeason:{spring:"occasional",summer:"rare",fall:"occasional",winter:"rare"},loudness:5,callFrequency:3},seasons:{spring:{presence:"year_round",commonness:"uncommon"},summer:{presence:"year_round",commonness:"uncommon"},fall:{presence:"year_round",commonness:"uncommon"},winter:{presence:"year_round",commonness:"rare"}},range:"eastern_north_america",captureStats:{difficulty:5,speed:7,flightiness:6,camouflage:2,sizeScore:5,movementPattern:"swift_direct",captureBackground:"wooded_water",behaviorNotes:"Wary and fast-flushing. Flies through dense wooded swamps at speed. Males in breeding plumage are unmistakable; females resemble other brown ducks but have the distinctive white eye-ring."},rarity:"uncommon",rarityColor:"#2196f3",points:155,verificationThreshold:.65,verificationMethods:2,description:"The Wood Duck may be the most beautiful bird in North America. The male's breeding plumage is so ornate it seems almost unreal — a jeweled mosaic of iridescent greens, chestnuts, and precise white markings. Unlike most ducks, Wood Ducks nest in tree cavities, and ducklings leap from their nest holes to the forest floor within a day of hatching.",funFacts:["Wood Duck ducklings jump from tree cavities up to 15 meters high within 24 hours of hatching, bouncing unharmed on the forest floor.","Wood Ducks were nearly extinct in the early 1900s due to overhunting; the Migratory Bird Treaty Act of 1918 helped them recover dramatically."],eBirdCode:"wooduc"},{id:"coopers_hawk",commonName:"Cooper's Hawk",scientificName:"Accipiter cooperii",family:"Accipitridae",order:"Accipitriformes",sizeCategory:"medium",length_cm:43,wingspan_cm:78,weight_g:400,appearance:{billShape:"hooked",billSizeRelative:"medium",billColor:"gray",crestPresent:!1,crestColor:null,primaryColor:"blue_gray",uiColor:"#546e7a",secondaryColors:["rufous","white"],distinctiveMarkings:["blue_gray_back","rufous_barring_underparts","rounded_tail","red_eye_adult","cap_darker_than_back"],plumageDescription:"Adults have blue-gray upperparts, rufous-barred underparts, and a rounded tail. The dark cap is distinctly darker than the back. Yellow eyes in juveniles turn orange then red with age."},primaryHabitat:["forest","woodland","suburban","forest_edge"],feedingLayer:"understory",flightStyle:"accipiter_flap_glide",socialBehavior:{breeding:"monogamous_pairs",winter:"solitary"},typicalGroupSize:{min:1,max:1},activeHours:"diurnal",sound:{callDescription:'Loud, rapid "kak-kak-kak-kak" near the nest; otherwise mostly silent.',singingSeason:{spring:"occasional",summer:"occasional",fall:"rare",winter:"rare"},loudness:7,callFrequency:2},seasons:{spring:{presence:"year_round",commonness:"uncommon"},summer:{presence:"year_round",commonness:"uncommon"},fall:{presence:"year_round",commonness:"uncommon"},winter:{presence:"year_round",commonness:"uncommon"}},range:"north_america_wide",captureStats:{difficulty:6,speed:8,flightiness:5,camouflage:3,sizeScore:5,movementPattern:"fast_low_ambush",captureBackground:"forest_edge",behaviorNotes:"A stealth hunter that flies low through dense vegetation. Often seen briefly before it flushes into cover. The accipiter flap-flap-glide flight style is key to identification."},rarity:"uncommon",rarityColor:"#2196f3",points:155,verificationThreshold:.68,verificationMethods:2,description:"Cooper's Hawk is the original backyard bird feeder ambush predator — a forest-adapted accipiter that has adapted remarkably well to suburban environments. It hunts birds with explosive speed through dense vegetation, often pursuing prey into thickets. The species is famously difficult to distinguish from the smaller Sharp-shinned Hawk, but the rounded tail and larger head help.",funFacts:["Cooper's Hawks frequently injure themselves during hunts — studies show that the majority of museum skeletons show healed fractures from collisions with vegetation.","Despite being a predator of songbirds, Cooper's Hawks have dramatically increased in suburban and urban areas, following the spread of bird feeders."],eBirdCode:"coohaw"},{id:"red_bellied_woodpecker",commonName:"Red-bellied Woodpecker",scientificName:"Melanerpes carolinus",family:"Picidae",order:"Piciformes",sizeCategory:"small",length_cm:24,wingspan_cm:38,weight_g:72,appearance:{billShape:"chisel",billSizeRelative:"large",billColor:"gray",crestPresent:!1,crestColor:null,primaryColor:"black_white",uiColor:"#37474f",secondaryColors:["red","buff"],distinctiveMarkings:["bold_black_white_barred_back","red_crown_nape","pale_buff_underparts","subtle_red_belly_patch"],plumageDescription:"Black and white ladder-barred back. Red crown and nape in males (just nape in females). Pale buff face and underparts; the namesake red belly is often hidden and surprisingly hard to see."},primaryHabitat:["forest","woodland","suburban","forest_edge"],feedingLayer:"bark",flightStyle:"undulating",socialBehavior:{breeding:"monogamous_pairs",winter:"solitary"},typicalGroupSize:{min:1,max:1},activeHours:"diurnal",sound:{callDescription:'Rolling, churring "churr" or "kwirr" call — loud and carries well.',singingSeason:{spring:"frequent",summer:"frequent",fall:"occasional",winter:"occasional"},loudness:7,callFrequency:7},seasons:{spring:{presence:"year_round",commonness:"common"},summer:{presence:"year_round",commonness:"common"},fall:{presence:"year_round",commonness:"common"},winter:{presence:"year_round",commonness:"common"}},range:"eastern_north_america",captureStats:{difficulty:3,speed:4,flightiness:4,camouflage:2,sizeScore:3,movementPattern:"bark_creeping",captureBackground:"tree_trunk",behaviorNotes:"Works tree trunks and branches with methodical hitching movements. Visits suet feeders readily. The bold barred back is visible from a distance."},rarity:"common",rarityColor:"#4caf50",points:90,verificationThreshold:.6,verificationMethods:2,description:"The Red-bellied Woodpecker is a common and vocal resident of eastern forests and suburbs, despite its misleadingly named red belly which is rarely visible in the field. The bold black-and-white barred back and red cap make it one of the most recognizable woodpeckers. It caches food and has a famously long, sticky tongue adapted for extracting insects.",funFacts:["The Red-bellied Woodpecker's tongue extends nearly 2 inches past the tip of its bill, barbed at the end for extracting insects from bark.","They store food in bark crevices and can remember thousands of cache locations — and sometimes steal from other woodpeckers' caches."],eBirdCode:"rebwoo"},{id:"pileated_woodpecker",commonName:"Pileated Woodpecker",scientificName:"Dryocopus pileatus",family:"Picidae",order:"Piciformes",sizeCategory:"large",length_cm:48,wingspan_cm:74,weight_g:300,appearance:{billShape:"chisel",billSizeRelative:"very_large",billColor:"gray",crestPresent:!0,crestColor:"red",primaryColor:"black",uiColor:"#212121",secondaryColors:["white","red"],distinctiveMarkings:["flaming_red_crest","black_body","white_neck_stripe","white_wing_patches_in_flight","red_mustache_male"],plumageDescription:"Crow-sized, mostly black with a brilliant red triangular crest. White stripes on the neck and face. White wing linings flash prominently in flight. Male has red mustache stripe."},primaryHabitat:["mature_forest","old_growth","forest_interior"],feedingLayer:"bark",flightStyle:"undulating",socialBehavior:{breeding:"monogamous_pairs",winter:"solitary"},typicalGroupSize:{min:1,max:1},activeHours:"diurnal",sound:{callDescription:'Wild, prehistoric-sounding "wuk-wuk-wuk" call; also a resonant slow drumming on dead wood.',singingSeason:{spring:"frequent",summer:"occasional",fall:"occasional",winter:"occasional"},loudness:9,callFrequency:4},seasons:{spring:{presence:"year_round",commonness:"uncommon"},summer:{presence:"year_round",commonness:"uncommon"},fall:{presence:"year_round",commonness:"uncommon"},winter:{presence:"year_round",commonness:"uncommon"}},range:"eastern_north_america",captureStats:{difficulty:5,speed:5,flightiness:3,camouflage:2,sizeScore:7,movementPattern:"bark_creeping",captureBackground:"old_growth_trunk",behaviorNotes:"Unmistakable — crow-sized with a blazing red crest. Excavates large rectangular holes in dead trees. Often heard before seen; the wild call echoes through mature forest."},rarity:"uncommon",rarityColor:"#2196f3",points:165,verificationThreshold:.65,verificationMethods:2,description:"The Pileated Woodpecker is the largest woodpecker in North America — a crow-sized bird with a flaming red crest that looks like it belongs in the Jurassic. Its powerful excavations create large rectangular holes that become essential habitat for dozens of other cavity-nesting species. The wild, prehistoric call is unforgettable.",funFacts:["Pileated Woodpecker excavations are so large that other species — including wood ducks, owls, and pine martens — depend on them for nest cavities.","A single Pileated can excavate holes a foot deep in a rotting log, following carpenter ant galleries that form the bulk of its diet."],eBirdCode:"pilwoo"},{id:"yellow_bellied_sapsucker",commonName:"Yellow-bellied Sapsucker",scientificName:"Sphyrapicus varius",family:"Picidae",order:"Piciformes",sizeCategory:"small",length_cm:21,wingspan_cm:34,weight_g:50,appearance:{billShape:"chisel",billSizeRelative:"medium",billColor:"gray",crestPresent:!1,crestColor:null,primaryColor:"black_white",uiColor:"#455a64",secondaryColors:["red","yellow","buff"],distinctiveMarkings:["red_crown","red_throat_male","white_throat_female","bold_white_wing_stripe","yellowish_belly","black_chest_band"],plumageDescription:"Black and white with a bold white wing stripe visible at rest. Red crown. Male has red throat; female has white. Yellowish wash on the belly. Black chest band."},primaryHabitat:["forest","woodland","orchard","forest_edge"],feedingLayer:"bark",flightStyle:"undulating",socialBehavior:{breeding:"monogamous_pairs",winter:"solitary"},typicalGroupSize:{min:1,max:1},activeHours:"diurnal",sound:{callDescription:'Cat-like mewing "meeah" call; also a rhythmic syncopated drumming pattern unlike other woodpeckers.',singingSeason:{spring:"occasional",summer:"rare",fall:"occasional",winter:"rare"},loudness:5,callFrequency:3},seasons:{spring:{presence:"migrant",commonness:"uncommon"},summer:{presence:"absent",commonness:"absent"},fall:{presence:"migrant",commonness:"uncommon"},winter:{presence:"winter",commonness:"rare"}},range:"eastern_north_america",captureStats:{difficulty:5,speed:4,flightiness:4,camouflage:3,sizeScore:3,movementPattern:"bark_creeping",captureBackground:"sap_well_tree",behaviorNotes:'Drills rows of small "sap wells" in tree bark and returns to lap up the sap and trapped insects. Look for rows of small holes in the bark of birches and fruit trees — a sure sign sapsuckers are present.'},rarity:"uncommon",rarityColor:"#2196f3",points:145,verificationThreshold:.65,verificationMethods:2,description:'The Yellow-bellied Sapsucker is the only North American woodpecker that is fully migratory. It drills neat rows of small holes in tree bark — "sap wells" — and returns to drink the oozing sap and eat the insects it attracts. Dozens of other species, including Ruby-throated Hummingbirds, depend on sapsucker wells as a food source.',funFacts:["Ruby-throated Hummingbirds time their spring migration to follow Yellow-bellied Sapsuckers northward, relying on their sap wells for early-season food.","Sapsuckers drill sap wells in hundreds of tree species but are most attracted to birches, maples, and fruit trees."],eBirdCode:"yebsap"},{id:"hermit_thrush",commonName:"Hermit Thrush",scientificName:"Catharus guttatus",family:"Turdidae",order:"Passeriformes",sizeCategory:"small",length_cm:17,wingspan_cm:27,weight_g:31,appearance:{billShape:"pointed",billSizeRelative:"medium",billColor:"gray_pink",crestPresent:!1,crestColor:null,primaryColor:"brown",uiColor:"#6d4c41",secondaryColors:["rufous","white","buff"],distinctiveMarkings:["spotted_breast","rufous_tail_contrasting_brown_back","eye_ring","tail_raising_habit"],plumageDescription:"Brown above with a contrasting rufous tail — unique among similar Catharus thrushes. Spotted breast on a white background. Subtle eye ring. Habitually raises and slowly lowers tail."},primaryHabitat:["forest","woodland","forest_understory","shrubby_areas"],feedingLayer:"ground",flightStyle:"direct",socialBehavior:{breeding:"solitary",winter:"solitary"},typicalGroupSize:{min:1,max:1},activeHours:"crepuscular",sound:{callDescription:"Ethereal, fluting song — a clear note followed by spiraling harmonics on different pitches. Often described as the most beautiful birdsong in North America.",singingSeason:{spring:"frequent",summer:"frequent",fall:"rare",winter:"absent"},loudness:7,callFrequency:6},seasons:{spring:{presence:"migrant",commonness:"uncommon"},summer:{presence:"summer",commonness:"uncommon"},fall:{presence:"migrant",commonness:"uncommon"},winter:{presence:"winter",commonness:"rare"}},range:"north_america_wide",captureStats:{difficulty:5,speed:4,flightiness:5,camouflage:5,sizeScore:2,movementPattern:"ground_hopping",captureBackground:"forest_floor",behaviorNotes:"Secretive and typically stays in dense vegetation. The rufous tail and tail-raising behavior are the key field marks. Sings from high in the forest canopy at dawn and dusk."},rarity:"uncommon",rarityColor:"#2196f3",points:140,verificationThreshold:.67,verificationMethods:2,description:"The Hermit Thrush sings what many consider the most beautiful song of any North American bird — a liquid, ethereal spiral of fluted notes that seems to shimmer through the forest. It is the only spotted thrush to winter in the US, identifiable by its warm rufous tail contrasting with its browner back, and its characteristic slow tail-raising habit.",funFacts:["The Hermit Thrush is the state bird of Vermont, chosen partly for the haunting beauty of its song.","Unlike its spotted thrush relatives, the Hermit Thrush regularly winters in the southern US — the others all migrate to the tropics."],eBirdCode:"herthr"},{id:"veery",commonName:"Veery",scientificName:"Catharus fuscescens",family:"Turdidae",order:"Passeriformes",sizeCategory:"small",length_cm:17,wingspan_cm:29,weight_g:33,appearance:{billShape:"pointed",billSizeRelative:"medium",billColor:"gray_pink",crestPresent:!1,crestColor:null,primaryColor:"tawny_brown",uiColor:"#8d6e63",secondaryColors:["white","buff"],distinctiveMarkings:["uniform_tawny_brown_upperparts","faint_spotting_breast","minimal_eye_ring"],plumageDescription:"Uniformly warm tawny-brown above — the warmest-toned of the Catharus thrushes. Faint spotting on the upper breast fades to plain white below. Minimal eye ring."},primaryHabitat:["moist_forest","riparian_forest","forest_understory"],feedingLayer:"ground",flightStyle:"direct",socialBehavior:{breeding:"solitary",winter:"solitary"},typicalGroupSize:{min:1,max:1},activeHours:"crepuscular",sound:{callDescription:'Cascading, downward-spiraling "veer-veer-veer" — a spiraling, descending, whirling sound unlike anything else.',singingSeason:{spring:"frequent",summer:"frequent",fall:"absent",winter:"absent"},loudness:7,callFrequency:6},seasons:{spring:{presence:"summer",commonness:"uncommon"},summer:{presence:"summer",commonness:"uncommon"},fall:{presence:"migrant",commonness:"rare"},winter:{presence:"absent",commonness:"absent"}},range:"eastern_north_america",captureStats:{difficulty:6,speed:4,flightiness:5,camouflage:6,sizeScore:2,movementPattern:"ground_hopping",captureBackground:"forest_floor",behaviorNotes:"Extremely secretive — almost always stays hidden in dense vegetation. The descending whirling song is unmistakable but the bird itself is rarely seen. Most likely encountered hopping quietly on the forest floor near damp areas."},rarity:"uncommon",rarityColor:"#2196f3",points:145,verificationThreshold:.68,verificationMethods:2,description:"The Veery is a master of disguise — a tawny, soft-spotted thrush of moist forests whose descending, spiraling song seems to tumble downward like water falling through reeds. It spends most of its time hidden in the forest understory, making it far more often heard than seen. One of the longest-migrating songbirds in North America, traveling to Brazil for the winter.",funFacts:["Veeries are one of the longest-distance migrants in North America — they travel from the northeastern US to central Brazil, about 8,000 km each way.","Research has shown that Veeries end their breeding season earlier in years when hurricane activity in the Atlantic will be high — they may be sensitive to atmospheric cues we don't yet understand."],eBirdCode:"veery1"},{id:"white_throated_sparrow",commonName:"White-throated Sparrow",scientificName:"Zonotrichia albicollis",family:"Passerellidae",order:"Passeriformes",sizeCategory:"tiny",length_cm:17,wingspan_cm:23,weight_g:26,appearance:{billShape:"conical",billSizeRelative:"small",billColor:"pink_gray",crestPresent:!1,crestColor:null,primaryColor:"brown",uiColor:"#795548",secondaryColors:["white","black","yellow"],distinctiveMarkings:["white_throat_patch","black_white_head_stripes","yellow_lore_spot","streaked_brown_back"],pluma ss (giving it its name). The explosive "teacher-teacher-TEACHER" song is one of the defining sounds of mature eastern deciduous forest, yet the singer itself is maddeningly hard to spot among the leaf litter.',funFacts:["The Ovenbird builds a domed nest on the forest floor shaped like a Dutch oven — with a side entrance hidden under dead leaves.","Ovenbirds are one of the most common victims of window strikes during migration, as they migrate at night and are attracted to lit buildings."],eBirdCode:"ovenbi"},{id:"blue_winged_warbler",commonName:"Blue-winged Warbler",scientificName:"Vermivora cyanoptera",family:"Parulidae",order:"Passeriformes",sizeCategory:"tiny",length_cm:12,wingspan_cm:19,weight_g:9,appearance:{billShape:"pointed",billSizeRelative:"long",billColor:"gray",crestPresent:!1,crestColor:null,primaryColor:"yellow",uiColor:"#f9a825",secondaryColors:["blue_gray","white","black"],distinctiveMarkings:["bright_yellow_head_breast","blue_gray_wings","white_wing_bars","black_eye_stripe","olive_back"],plumageDescription:"Bright yellow head and underparts. Blue-gray wings with two white wing bars. Thin black eye stripe. Olive-green back. Clean, distinctive coloration."},primaryHabitat:["shrubby_fields","forest_edge","regenerating_forest","thickets"],feedingLayer:"shrub",flightStyle:"direct",socialBehavior:{breeding:"territorial",winter:"solitary"},typicalGroupSize:{min:1,max:1},activeHours:"diurnal",sound:{callDescription:'"Beee-bzzz" — an inhaled "bee" note followed by a buzzy exhaled trill. Distinctive once learned.',singingSeason:{spring:"frequent",summer:"frequent",fall:"absent",winter:"absent"},loudness:5,callFrequency:6},seasons:{spring:{presence:"summer",commonness:"uncommon"},summer:{presence:"summer",commonness:"uncommon"},fall:{presence:"migrant",commonness:"rare"},winter:{presence:"absent",commonness:"absent"}},range:"eastern_north_america",captureStats:{difficulty:5,speed:4,flightiness:4,camouflage:2,sizeScore:1,movementPattern:"creeping_vines",capture
