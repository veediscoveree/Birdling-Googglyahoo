nd body, short tail, strong legs.",female:"Similar but with a brownish-gray (not black) head and a slightly paler, peachier breast. Often told apart only by direct comparison.",juvenile:"The spotted juvenile robins of late spring/summer reveal the robin's thrush ancestry — orange breast covered in dark spots, back sprinkled with pale dots."}},primaryHabitat:["lawns","parks","open_woodland","gardens","suburban"],feedingLayer:"ground",flightStyle:"direct",socialBehavior:{breeding:"territorial_pairs",winter:"large_roosts"},typicalGroupSize:{min:1,max:200},activeHours:"diurnal",sound:{callDescription:'"Tut-tut-tut" alarm call; high thin "seee" for aerial predators',songDescription:'Cheerful caroling phrases: "cheerily, cheer up, cheer up, cheerily, cheer up". Arguably the most familiar bird song in North America. Begins singing before dawn.',loudness:7,callFrequency:8,singingSeason:{spring:"frequent",summer:"frequent",fall:"occasional",winter:"rare"},sounds:["tut","song","seee"]},seasons:{spring:{presence:"summer",commonness:"abundant"},summer:{presence:"summer",commonness:"abundant"},fall:{presence:"migrant",commonness:"common"},winter:{presence:"winter",commonness:"uncommon"}},range:"north_america",captureStats:{difficulty:2,speed:4,flightiness:3,camouflage:3,sizeScore:6,movementPattern:"hopping",flightPattern:"direct",behaviorNotes:"Runs across lawns in short bursts, stopping to cock its head and listen/watch for earthworms. Quite bold near humans. Flushes readily if approached quickly but returns soon."},rarity:"common",rarityColor:"#4caf50",points:80,verificationThreshold:.66,verificationMethods:1,description:"The herald of spring across North America. Robins are among the first birds to sing before dawn and among the last to fall silent at dusk. Their earthworm-hunting technique — running, stopping, tilting the head — is one of the most familiar sights in any suburban yard. Despite their familiarity, robins in winter congregate in massive roosts that can number in the thousands.",funFact:"A robin doesn't actually hear earthworms through the ground — it sees them. That sideways head-tilt is tilting one eye toward the soil to get a better look.",eBirdCode:"amerob",merlinId:"American_Robin"},{id:"blue_jay",commonName:"Blue Jay",scientificName:"Cyanocitta cristata",family:"Corvidae",order:"Passeriformes",sizeCategory:"small",length_cm:[22,30],wingspan_cm:[34,43],weight_g:[70,100],appearance:{billShape:"thin",billSizeRelative:"medium",billColor:{male:"black",female:"black"},crestPresent:!0,crestColor:{male:"blue",female:"blue"},primaryColor:{male:"#4A7FBD",female:"#4A7FBD"},uiColor:"#4A7FBD",secondaryColors:{male:["#FAFAFA (face, belly)","#1A1A1A (necklace, wing bars)","#4A7FBD (crest, wings, tail)"],female:["Same as male — sexes look alike"]},distinctiveMarkings:{male:["Bright blue crest, wings, and tail","White face and underparts","Bold black necklace across throat/chest","White wing bars and tail corners","Black barring on wings and tail"],female:["Identical to male in appearance"],juvenile:["Duller blue than adults; crest shorter; gains adult plumage by first winter"]},plumageDescription:{male:'Unmistakable in flight and at rest. A blue corvid with a pointed crest, white face, and bold black "necklace" connecting the crest, eye, and collar. Blue wings show white wing bars and dark barring. The tail is long, blue, and prominently barred. Underparts white.',female:"Identical to male — one of the few songbirds where field separation of sexes is practically impossible without genetic testing.",juvenile:"Slightly duller blue tones in the first year, with a shorter crest. Nearly identical to adults by autumn."}},primaryHabitat:["deciduous_woodland","parks","suburban","oak_savanna"],feedingLayer:"multi",flightStyle:"direct",socialBehavior:{breeding:"pairs",winter:"family_groups"},typicalGroupSize:{min:1,max:10},activeHours:"diurnal",sound:{callDescription:'Loud, raucous "jay-jay-jay". Also mimics Red-tailed Hawk perfectly — used to alarm other birds or claim food.',songDescription:'A softer, gurgling "whisper song" rarely heard; usually replaced by call repertoire. Also "bell" calls, whistled notes, and many mimicked sounds.',loudness:9,callFrequency:8,singingSeason:{spring:"frequent",summer:"moderate",fall:"frequent",winter:"moderate"},sounds:["jay-call","hawk-mimic","bell","whisper-song"]},seasons:{spring:{presence:"resident",commonness:"common"},summer:{presence:"resident",commonness:"common"},fall:{presence:"resident",commonness:"common"},winter:{presence:"resident",commonness:"common"}},range:"eastern_north_america",captureStats:{difficulty:4,speed:5,flightiness:6,camouflage:2,sizeScore:6,movementPattern:"perching",flightPattern:"direct",behaviorNotes:"Moves between canopy and ground. Very alert — the first to sound an alarm when a predator appears. Bold and often noisy, but spooks quickly when directly approached. Stashes acorns and has excellent spatial memory."},rarity:"common",rarityColor:"#4caf50",points:110,verificationThreshold:.66,verificationMethods:1,description:"Bold, intelligent, and impossible to ignore — the Blue Jay is a corvid in every sense. They are accomplished mimics (their hawk imitation can clear a feeder), dedicated parents, and critical partners in oak forest expansion: they cache thousands of acorns each fall, many of which they never retrieve, planting the oaks of the future. Love them or hate them, a yard without Blue Jays is a quieter place.",funFact:"A Blue Jay can carry multiple acorns at once — up to 5 in its throat pouch, bill, and esophagus. One study estimated a single jay moved 4,500 acorns in a single fall.",eBirdCode:"blujay",merlinId:"Blue_Jay"},{id:"black_capped_chickadee",commonName:"Black-capped Chickadee",scientificName:"Poecile atricapillus",family:"Paridae",order:"Passeriformes",sizeCategory:"tiny",length_cm:[12,15],wingspan_cm:[16,21],weight_g:[9,14],appearance:{billShape:"thin",billSizeRelative:"tiny",billColor:{male:"black",female:"black"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#808080",female:"#808080"},uiColor:"#2B6CB0",secondaryColors:{male:["#1A1A1A (cap, bib)","#FAFAFA (cheeks)","#F5E6C8 (flanks)","#808080 (back, wings)"],female:["Sexes look alike"]},distinctiveMarkings:{male:["Bold black cap","Large white cheek patch","Black throat bib","Rusty-buff flanks","Gray back","White wing edges"],female:["Identical to male in field conditions"],juvenile:["Identical to adults; some have a slightly brownish tinge to the cap"]},plumageDescription:{male:'A tiny, round bird with an oversized head. The black cap and black throat bib are separated by large, pillowy white cheek patches. Back and wings are gray; flanks are washed warm buff. White edges on wing feathers create a delicate "etched" look. Constantly in motion.',female:"Identical to male — impossible to tell apart in the field.",juvenile:"Adults by their first fall; the black and white pattern is clean and crisp from the start."}},primaryHabitat:["deciduous_woodland","mixed_forest","suburban","parks","feeders"],feedingLayer:"canopy",flightStyle:"undulating",socialBehavior:{breeding:"pairs",winter:"mixed_flocks"},typicalGroupSize:{min:2,max:12},activeHours:"diurnal",sound:{callDescription:'"Chick-a-dee-dee-dee" — the classic call that names the species. More "dee" notes = greater perceived threat. A perfect alarm system.',songDescription:'Clear, whistled "fee-bee" or "fee-bee-ee" — two or three notes in descending pitch, like a tiny flute. Often heard in late winter before spring fully arrives.',loudness:6,callFrequency:9,singingSeason:{spring:"frequent",summer:"moderate",fall:"frequent",winter:"frequent"},sounds:["chick-a-dee","fee-bee","gargle"]},seasons:{spring:{presence:"resident",commonness:"common"},summer:{presence:"resident",commonness:"common"},fall:{presence:"resident",commonness:"common"},winter:{presence:"resident",commonness:"common"}},range:"northern_north_america",captureStats:{difficulty:5,speed:7,flightiness:3,camouflage:4,sizeScore:2,movementPattern:"darting",flightPattern:"undulating",behaviorNotes:"Tiny and hyperactive — never still for more than a few seconds. Hangs upside-down from branch tips to reach insects. Paradoxically bold around humans; will sometimes land on an outstretched hand at feeders. The challenge is their size and constant motion."},rarity:"common",rarityColor:"#4caf50",points:120,verificationThreshold:.66,verificationMethods:1,description:`Possibly the most cheerful bird in North America. Chickadees stay through the harshest winters, traveling in small flocks through frozen forests, finding insects in bark crevices that no other bird can reach. They have a sophisticated social system and can lower their body temperature at night to conserve energy — a feat called "regulated hypothermia." Their alarm calls carry so much information about a predator's size, speed, and danger level that other species have learned to listen.`,funFact:"Every autumn, a chickadee's hippocampus (the memory center of the brain) actually grows larger to handle thousands of new food cache locations. It shrinks again in spring.",eBirdCode:"bkcchi",merlinId:"Black-capped_Chickadee"},{id:"american_goldfinch",commonName:"American Goldfinch",scientificName:"Spinus tristis",family:"Fringillidae",order:"Passeriformes",sizeCategory:"tiny",length_cm:[11,14],wingspan_cm:[19,22],weight_g:[11,20],appearance:{billShape:"conical",billSizeRelative:"small",billColor:{male:"pink-orange",female:"dull-pink"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#FFD700",female:"#B8A840"},uiColor:"#FFD700",secondaryColors:{male:["#1A1A1A (forehead cap, wings, tail)","#FAFAFA (wing bars, rump)","#F0A040 (bill)"],female:["#B8A840 (olive-yellow body)","#1A1A1A (wings)","#FAFAFA (wing bars)"]},distinctiveMarkings:{male:["Brilliant lemon-yellow body (breeding)","Black forehead cap","Black wings with white wing bars","White rump","Stubby pink-orange bill","Winter: olive-yellow, no black cap"],female:["Dull olive-yellow; no black cap","White wing bars on black-ish wings","Paler below than above","Year-round plumage similar to male winter"],juvenile:["Similar to female; buffy wing bars instead of white"]},plumageDescription:{male:"Summer male is electric: pure lemon-yellow with a small black cap on the forehead, jet-black wings with white wing bars, white rump. Winter male molts to olive-yellow, loses the black cap, and becomes almost unrecognizable until spring.",female:"Olive-yellow throughout the year — brighter in summer, duller in winter. Black wings with white bars. Often overlooked despite being present at most nyjer seed feeders.",juvenile:"Resembles female; buffy rather than white wing bars. Acquires adult plumage in first autumn."}},primaryHabitat:["fields","meadows","weedy_areas","feeders","open_woodland"],feedingLayer:"shrub",flightStyle:"undulating",socialBehavior:{breeding:"loose_colonies",winter:"flocks"},typicalGroupSize:{min:2,max:40},activeHours:"diurnal",sound:{callDescription:'"Per-chick-o-ree" or "po-ta-to-chip" call given in flight — this bouncy phrase perfectly matches the undulating flight pattern.',songDescription:"Long, canary-like warble of rapid twitters, trills, and chips. Energetic and sustained.",loudness:5,callFrequency:8,singingSeason:{spring:"moderate",summer:"frequent",fall:"occasional",winter:"rare"},sounds:["per-chick-o-ree","song-warble","contact-call"]},seasons:{spring:{presence:"resident",commonness:"common"},summer:{presence:"summer",commonness:"common"},fall:{presence:"migrant",commonness:"common"},winter:{presence:"winter",commonness:"uncommon"}},range:"north_america",captureStats:{difficulty:5,speed:6,flightiness:5,camouflage:2,sizeScore:2,movementPattern:"darting",flightPattern:"undulating",behaviorNotes:"Feeds acrobatically on seed heads — hanging sideways, upside-down. In flocks, individuals are scattered and constantly moving. The undulating flight — rise on wingbeats, dip on wing-fold — makes tracking in binoculars tricky."},rarity:"common",rarityColor:"#4caf50",points:115,verificationThreshold:.66,verificationMethods:1,description:"New Jersey's state bird and a frequent visitor to nyjer seed feeders. The male in breeding plumage is one of the most vivid birds in North America — a flying lemon with a black beret. Goldfinches are unusual songbirds in that they wait until July or August to nest, timing their breeding to peak thistle-seed abundance. They weave spider silk into their nests, which stretches as the nestlings grow.",funFact:"Goldfinch nests are so tightly woven they can hold water. If it rains during an early cold snap, the young have been known to drown — one reason late breeding evolved.",eBirdCode:"amegfi",merlinId:"American_Goldfinch"},{id:"mallard",commonName:"Mallard",scientificName:"Anas platyrhynchos",family:"Anatidae",order:"Anseriformes",sizeCategory:"medium",length_cm:[50,65],wingspan_cm:[81,98],weight_g:[720,1600],appearance:{billShape:"spatulate",billSizeRelative:"large",billColor:{male:"yellow-orange",female:"orange-black mottled"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#2D6B4A",female:"#8B6914"},uiColor:"#2D6B4A",secondaryColors:{male:["#2D6B4A (iridescent green head)","#FAFAFA (neck ring)","#8B3A2A (chestnut breast)","#C8C8C8 (gray flanks)","#1A1A1A (black stern)","#E8B830 (bill)"],female:["#8B6914 (mottled brown overall)","#FF8C00 (orange sides of bill)","#5B7F9E (speculum)","#FAFAFA (tail)"]},distinctiveMarkings:{male:["Iridescent green head","Thin white neck ring","Chestnut-brown breast","Gray body","Black rear end with curled tail feathers","Yellow-orange bill","Blue-purple speculum (wing patch)"],female:["Mottled brown streaky overall","Orange bill with black splotches","Dark eye stripe","Blue-purple speculum with white borders","Pale orange legs"],juvenile:["Resembles female; gains adult plumage through first winter"]},plumageDescription:{male:'Breeding male is a gallery piece: iridescent bottle-green head (that changes color angle to angle), separated by a crisp white neck ring from a chestnut breast. Gray flanks, black rump, and a distinctive curled black tail feather ("sex feather"). Bill bright yellow-orange.',female:"Mottled brown — perfectly camouflaged for nesting. Her orange bill shows black blotching. The blue-purple speculum (wing patch) flashes in flight on both sexes.",juvenile:"Resembles female initially. Males begin showing green head by November of their first year."}},primaryHabitat:["ponds","lakes","rivers","wetlands","parks","urban_water"],feedingLayer:"water",flightStyle:"direct",socialBehavior:{breeding:"pairs",winter:"large_flocks"},typicalGroupSize:{min:2,max:100},activeHours:"diurnal",sound:{callDescription:'Iconic "quack" — actually a female call. Males make a softer, nasal "raeb-raeb". Both sexes grunt, whistle, and murmur.',songDescription:`Not a songbird; uses calls for communication. The female's loud descending "quack-quack-quack" is the "duck sound" of cultural memory.`,loudness:7,callFrequency:6,singingSeason:{spring:"frequent",summer:"moderate",fall:"moderate",winter:"moderate"},sounds:["quack","raeb","grunt","whistle"]},seasons:{spring:{presence:"resident",commonness:"abundant"},summer:{presence:"resident",commonness:"common"},fall:{presence:"resident",commonness:"abundant"},winter:{presence:"resident",commonness:"common"}},range:"northern_hemisphere",captureStats:{difficulty:2,speed:2,flightiness:3,camouflage:4,sizeScore:8,movementPattern:"swimming",flightPattern:"direct",behaviorNotes:"Swims slowly on open water; dabbles with head submerged for aquatic vegetation. Accustomed to humans in urban parks — often approaches rather than flees. Large size makes centering easy; slow movement means patience is the only skill required."},rarity:"common",rarityColor:"#4caf50",points:90,verificationThreshold:.66,verificationMethods:1,description:"The world's most familiar duck and the ancestor of almost every domestic duck breed. Mallards are found on every continent except Antarctica and have adapted perfectly to city parks, drainage ditches, and golf course ponds. Watch for the courtship displays in winter — groups of males circle females with elaborate head-pumping, wing-flap, and whistle sequences that look choreographed.",funFact:'Mallards can sleep with one eye open and half their brain awake — a phenomenon called unihemispheric slow-wave sleep. Ducks at the edge of a flock keep the "outer eye" open, watching for predators.',eBirdCode:"mallar3",merlinId:"Mallard"},{id:"red_tailed_hawk",commonName:"Red-tailed Hawk",scientificName:"Buteo jamaicensis",family:"Accipitridae",order:"Accipitriformes",sizeCategory:"large",length_cm:[45,65],wingspan_cm:[110,145],weight_g:[690,1460],appearance:{billShape:"hooked",billSizeRelative:"large",billColor:{male:"gray-yellow",female:"gray-yellow"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#8B6030",female:"#8B6030"},uiColor:"#C85020",secondaryColors:{male:["#C85020 (rufous-red tail, adults only)","#8B6030 (brown above)","#F5E6C8 (pale below)","#1A1A1A (belly band)","#F0C030 (cere, feet)"],female:["Same — sexes look identical; females are larger"]},distinctiveMarkings:{male:["Brick-red upper tail (adults; visible from above in flight)","Dark brown above",'Pale buffy below with dark "belly band" of streaking',"Hooked yellow-cere bill","Yellow taloned feet","Short, broad wings; short tail in soaring silhouette"],female:["Identical to male in plumage; notably larger in body size"],juvenile:["No red tail — brown barred tail instead","Yellow iris (adults have dark brown)","Heavily streaked breast and belly"]},plumageDescription:{male:"A large, bulky buteo with broad rounded wings and a short tail. The field mark that names it: the brick-red upper tail surface, visible as the bird banks in a soar. Below, pale body with a band of dark streaking across the belly. Brown above. Many color variants exist across its range.",female:"Identical to male in pattern; females average 25% larger and heavier — female red-tails are powerfully built hunters.",juvenile:"No red tail until the second year. Brown barred tail; heavily streaked underparts. Pale iris."}},primaryHabitat:["open_fields","roadsides","woodland_edge","deserts","mountains"],feedingLayer:"aerial",flightStyle:"soaring",socialBehavior:{breeding:"pairs",winter:"solitary"},typicalGroupSize:{min:1,max:2},activeHours:"diurnal",sound:{callDescription:'The iconic raptor scream: a long, hoarse, descending "keeeeeer". This is the call overdubbed onto virtually every other bird of prey in Hollywood films.',songDescription:"No true song. Calls used for territorial defense and pair communication.",loudness:8,callFrequency:3,singingSeason:{spring:"moderate",summer:"occasional",fall:"occasional",winter:"occasional"},sounds:["scream","keer"]},seasons:{spring:{presence:"resident",commonness:"uncommon"},summer:{presence:"resident",commonness:"uncommon"},fall:{presence:"resident",commonness:"common"},winter:{presence:"resident",commonness:"common"}},range:"north_america",captureStats:{difficulty:6,speed:4,flightiness:7,camouflage:5,sizeScore:9,movementPattern:"soaring",flightPattern:"soaring",behaviorNotes:"Often spotted on telephone poles or dead trees scanning for prey. In binoculars view, moves in slow thermal circles — easy to track but very alert. Will peel away from soar suddenly if disturbed. High in sky = small apparent target despite large wingspan."},rarity:"uncommon",rarityColor:"#2196f3",points:250,verificationThreshold:.85,verificationMethods:2,description:"The most common large hawk in North America — and the one you've probably heard in every action movie, even when the scene shows a Bald Eagle. Look for them perched on highway poles, soaring over open fields, or circling on thermals over suburban neighborhoods. Pairs return to the same territory year after year, adding sticks to an ever-growing nest that can eventually weigh hundreds of pounds.",funFact:"Red-tailed Hawks can see ultraviolet light, which makes rodent urine trails glow — a built-in tracking system that leads them directly to vole runways.",eBirdCode:"rethaw",merlinId:"Red-tailed_Hawk"},{id:"great_blue_heron",commonName:"Great Blue Heron",scientificName:"Ardea herodias",family:"Ardeidae",order:"Pelecaniformes",sizeCategory:"very_large",length_cm:[91,137],wingspan_cm:[167,201],weight_g:[1820,3630],appearance:{billShape:"spear",billSizeRelative:"massive",billColor:{male:"yellow-orange",female:"yellow-orange"},crestPresent:!0,crestColor:{male:"black-white",female:"black-white"},primaryColor:{male:"#6080A0",female:"#6080A0"},uiColor:"#6080A0",secondaryColors:{male:["#6080A0 (blue-gray body)","#FAFAFA (white head)","#1A1A1A (black eyestripe)","#C8A060 (rusty thighs)","#F5E6C8 (plumes)"],female:["Identical to male"]},distinctiveMarkings:{male:["White head with black eyestripe extending to black plume","Blue-gray body","Chestnut-rusty thighs","Long yellow-orange dagger bill","Long black plumes on back and breast","S-curved neck in flight (diagnostic for herons vs. cranes)","Stands 4 feet tall"],female:["Identical to male in plumage"],juvenile:["All gray-brown head (no white or plumes)","Dark cap solid black","Streaked neck","Duller overall"]},plumageDescription:{male:"Prehistoric in scale — North America's largest heron. Blue-gray plumage, white face with a black stripe running from behind the eye to trailing black plumes, and a massive yellow-orange spear bill. The neck is folded into a tight S-curve at rest and in flight (a field mark separating herons from cranes, which fly with necks extended).",female:"Identical to male. Females may average slightly smaller but are not reliably distinguished in the field.",juvenile:"Lacks the white head and ornamental plumes of adults. Dark-capped, brownish, and streaked. Earns adult plumage over two years."}},primaryHabitat:["marshes","lakeshores","rivers","tidal_flats","ponds","flooded_fields"],feedingLayer:"water",flightStyle:"soaring",socialBehavior:{breeding:"colonial_nesting",winter:"solitary"},typicalGroupSize:{min:1,max:3},activeHours:"diurnal",sound:{callDescription:'Harsh, prehistoric "FRAAAAHNK" — a loud, grating croak, especially when flushed from a feeding spot. Sounds like a pterodactyl.',songDescription:"No true song. Nesting colonies produce a cacophony of bill-clacking, croaking, and grunting.",loudness:8,callFrequency:2,singingSeason:{spring:"occasional",summer:"occasional",fall:"occasional",winter:"rare"},sounds:["frahnk","croak","clack"]},seasons:{spring:{presence:"resident",commonness:"uncommon"},summer:{presence:"summer",commonness:"uncommon"},fall:{presence:"migrant",commonness:"uncommon"},winter:{presence:"winter",commonness:"uncommon"}},range:"north_america",captureStats:{difficulty:5,speed:1,flightiness:6,camouflage:6,sizeScore:10,movementPattern:"stalking",flightPattern:"soaring",behaviorNotes:"Stands motionless in shallow water for minutes — sometimes hours — before a lightning-fast strike. In binoculars view, barely moves; the challenge is its distance from shore and its wariness. Will take long, low flight away if alarmed. Reward for patience: one of the most spectacular birds on the continent."},rarity:"uncommon",rarityColor:"#2196f3",points:280,verificationThreshold:.85,verificationMethods:2,description:'Standing four feet tall with a six-foot wingspan, the Great Blue Heron is a living dinosaur. They are consummate hunters — that statue-still pose in the shallows is pure predatory patience, followed by a strike too fast to see. They eat fish, frogs, voles, small birds, even snakes. Colonial nesters called "heronries" can host hundreds of pairs, their giant stick nests filling the tops of tall trees like a fairy-tale forest.',funFact:`A heron's neck can strike with such speed and force that biologists call it a "biological spear gun." The S-curve of the neck stores elastic energy like a spring, releasing it in a strike faster than the eye can follow.`,eBirdCode:"greher",merlinId:"Great_Blue_Heron"},{id:"mourning_dove",commonName:"Mourning Dove",scientificName:"Zenaida macroura",family:"Columbidae",order:"Columbiformes",sizeCategory:"small",length_cm:[22,36],wingspan_cm:[37,45],weight_g:[96,170],appearance:{billShape:"thin",billSizeRelative:"small",billColor:{male:"dark gray",female:"dark gray"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#C4A882",female:"#C4A882"},uiColor:"#C4A882",distinctiveMarkings:{male:["Soft buffy-brown overall","Small black spot below ear","Long pointed tail with white edges","Rosy-pink wash on breast","Iridescent neck patch"],female:["Nearly identical to male, slightly duller"],juvenile:["Scaly-looking, spotted below"]},plumageDescription:{male:"Soft warm brown above, pale below with a gentle rosy-pink wash. A small black spot sits below and behind the eye. The neck has a subtle iridescent green-and-pink sheen. The long, pointed tail fans out in flight to reveal white-tipped outer feathers.",female:"Nearly identical to male but slightly duller, with less iridescence on the neck.",juvenile:"Scaly appearance due to pale feather edges; spotted breast."}},primaryHabitat:["open_fields","gardens","farmland","woodland_edge","roadsides"],feedingLayer:"ground",flightStyle:"direct",socialBehavior:{breeding:"monogamous_pairs",winter:"flocks"},typicalGroupSize:{min:1,max:20},activeHours:"diurnal",sound:{callDescription:'The familiar "coo-OO-oo-oo-oo" — a soft, mournful five-note call that gives the species its name.',songDescription:'Repeated soft cooing, slightly descending: "cooOOoo-oo-oo".',loudness:4,callFrequency:8,singingSeason:{spring:"frequent",summer:"frequent",fall:"occasional",winter:"occasional"}},seasons:{spring:{presence:"resident",commonness:"very_common"},summer:{presence:"resident",commonness:"very_common"},fall:{presence:"resident",commonness:"common"},winter:{presence:"resident",commonness:"common"}},captureStats:{difficulty:2,speed:3,flightiness:3,camouflage:4,sizeScore:4,movementPattern:"walking",flightPattern:"direct",behaviorNotes:"Walks slowly on ground picking up seeds. Flushes with a whistling wing noise when startled. Often perches on wires."},rarity:"common",rarityColor:"#4caf50",points:80,verificationThreshold:.6,verificationMethods:1,description:"One of North America's most abundant birds, the Mourning Dove is a year-round fixture from suburban yards to open farmland. Its mournful cooing is one of the most recognizable sounds in the American soundscape. Despite its gentle look, it is a prolific breeder — pairs can raise up to six broods per year. It swallows seeds whole and stores them in its crop, returning to a perch to digest.",funFact:"Mourning Doves can drink by sucking water like a straw, without lifting their heads — a trick shared by very few birds.",eBirdCode:"moudov",merlinId:"Mourning_Dove"},{id:"american_crow",commonName:"American Crow",scientificName:"Corvus brachyrhynchos",family:"Corvidae",order:"Passeriformes",sizeCategory:"medium",length_cm:[40,53],wingspan_cm:[85,100],weight_g:[316,620],appearance:{billShape:"hooked",billSizeRelative:"large",billColor:{male:"black",female:"black"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#1A1A1A",female:"#1A1A1A"},uiColor:"#4A4A5A",distinctiveMarkings:{male:["All black with glossy blue-violet iridescence","Fan-shaped tail","Heavy bill",'Loud "caw caw" call'],female:["Identical to male"],juvenile:["Duller black, brighter blue mouth lining"]},plumageDescription:{male:"Entirely black with a blue-violet gloss in good light. Heavy rounded bill, fan-shaped tail (distinguish from Fish Crow and Common Raven). Legs and feet black.",female:"Identical to male.",juvenile:"Dull black without gloss; gape (corner of bill) bright blue, fading by first winter."}},primaryHabitat:["woodland_edge","farmland","urban","parks","roadsides"],feedingLayer:"multi",flightStyle:"direct",socialBehavior:{breeding:"cooperative_family_groups",winter:"large_roosts"},typicalGroupSize:{min:2,max:500},activeHours:"diurnal",sound:{callDescription:'Loud, harsh "caw caw caw" — endlessly varied. Also rattles, clicks, and mimics other sounds.',songDescription:"No true song; communicates with a complex vocabulary of caws, rattles, and coos.",loudness:9,callFrequency:9,singingSeason:{spring:"frequent",summer:"frequent",fall:"frequent",winter:"frequent"}},seasons:{spring:{presence:"resident",commonness:"very_common"},summer:{presence:"resident",commonness:"very_common"},fall:{presence:"resident",commonness:"very_common"},winter:{presence:"resident",commonness:"very_common"}},captureStats:{difficulty:5,speed:5,flightiness:7,camouflage:1,sizeScore:7,movementPattern:"walking",flightPattern:"direct",behaviorNotes:'Highly wary and intelligent. Will often post a "lookout" crow while others feed. Approaches cautiously and flushes at significant distance.'},rarity:"common",rarityColor:"#4caf50",points:100,verificationThreshold:.65,verificationMethods:1,description:`The American Crow is one of North America's most intelligent animals, period. They use tools, recognize individual human faces, hold grudges for years, and conduct what appear to be "funerals" for dead flockmates. Winter roosts can number in the millions. Their notorious wariness — shaped by centuries of persecution — makes them challenging to approach, despite being everywhere.`,funFact:'Crows remember and recognize individual human faces, and will "scold" a person who has previously threatened them — even training their young to do the same.',eBirdCode:"amecro",merlinId:"American_Crow"},{id:"song_sparrow",commonName:"Song Sparrow",scientificName:"Melospiza melodia",family:"Passerellidae",order:"Passeriformes",sizeCategory:"small",length_cm:[11,18],wingspan_cm:[18,24],weight_g:[17,49],appearance:{billShape:"conical",billSizeRelative:"small",billColor:{male:"pinkish-gray",female:"pinkish-gray"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#8B6F50",female:"#8B6F50"},uiColor:"#9E7B58",distinctiveMarkings:{male:["Heavy brown streaking on white breast","Central breast spot","Brown-streaked crown with gray median stripe","Long rounded tail","Broad gray supercilium"],female:["Identical to male"],juvenile:["Finer streaking, buffier tones"]},plumageDescription:{male:"Brown and streaky throughout. The white breast bears bold brown streaks that converge into a central spot — the single best field mark. A broad gray eyebrow contrasts with brown streaks on the head. Pumps its long rounded tail in flight.",female:"Identical to male.",juvenile:"Similar but buffer, with finer, less defined streaking."}},primaryHabitat:["shrubs","wetland_edge","gardens","thickets","woodland_edge"],feedingLayer:"ground",flightStyle:"bounding",socialBehavior:{breeding:"territorial_pairs",winter:"loose_flocks"},typicalGroupSize:{min:1,max:6},activeHours:"diurnal",sound:{callDescription:'Sharp "chimp" or "tchep" contact call.',songDescription:"Opens with 2–3 pure notes then a buzzy trill, then a varied mix of trills and notes. Each male has a repertoire of ~20 distinct song types.",loudness:6,callFrequency:7,singingSeason:{spring:"frequent",summer:"frequent",fall:"moderate",winter:"occasional"}},seasons:{spring:{presence:"resident",commonness:"common"},summer:{presence:"resident",commonness:"common"},fall:{presence:"resident",commonness:"common"},winter:{presence:"resident",commonness:"common"}},captureStats:{difficulty:4,speed:4,flightiness:5,camouflage:6,sizeScore:2,movementPattern:"hopping",flightPattern:"bounding",behaviorNotes:"Skulks low in dense shrubs. Often pumps tail while perched. Will dart back into cover quickly if alarmed."},rarity:"common",rarityColor:"#4caf50",points:90,verificationThreshold:.65,verificationMethods:1,description:"The Song Sparrow's voice fills wetland edges and shrubby yards across the continent. It is one of the most extensively studied birds in North America — researchers have tracked individual birds' song dialects, territorial behavior, and evolution for decades. Despite its plain brown looks, the complexity of its song is extraordinary: a male sings dozens of distinct song types and improvises combinations constantly.",funFact:"Song Sparrows have regional dialects — birds in different areas sing noticeably different versions of the song, similar to regional accents in human speech.",eBirdCode:"sonspa",merlinId:"Song_Sparrow"},{id:"downy_woodpecker",commonName:"Downy Woodpecker",scientificName:"Dryobates pubescens",family:"Picidae",order:"Piciformes",sizeCategory:"small",length_cm:[14,18],wingspan_cm:[25,31],weight_g:[20,33],appearance:{billShape:"spear",billSizeRelative:"small",billColor:{male:"gray",female:"gray"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#FAFAFA",female:"#FAFAFA"},uiColor:"#CC2222",distinctiveMarkings:{male:["Black and white checkered pattern","Bold white back stripe","Red spot on back of head","Small stubby bill"],female:["Identical but no red head spot"],juvenile:["Red cap (both sexes), loses to adult pattern by fall"]},plumageDescription:{male:"Boldly patterned in black and white. A broad white stripe runs down the center of the back. The head has bold black-and-white stripes, and males show a small red patch on the nape. Tiny bill — notably shorter than the Hairy Woodpecker, its near-identical larger cousin.",female:"Same pattern as male but lacks the red nape patch.",juvenile:"Both sexes have a red cap in juvenile plumage."}},primaryHabitat:["woodland","woodland_edge","gardens","orchards","parks"],feedingLayer:"canopy",flightStyle:"undulating",socialBehavior:{breeding:"territorial_pairs",winter:"solitary_or_mixed_flocks"},typicalGroupSize:{min:1,max:2},activeHours:"diurnal",sound:{callDescription:'Sharp "pik!" — higher and softer than Hairy Woodpecker.',songDescription:"Rapid whinny descending in pitch. Also drums on resonant wood.",loudness:5,callFrequency:6,singingSeason:{spring:"frequent",summer:"moderate",  that routinely descends trees face-down.",female:"Same pattern as male but with a duller gray cap instead of black.",juvenile:"Similar to female."}},primaryHabitat:["woodland","woodland_edge","parks","gardens"],feedingLayer:"canopy",flightStyle:"undulating",socialBehavior:{breeding:"monogamous_pairs",winter:"pairs_or_mixed_flocks"},typicalGroupSize:{min:1,max:2},activeHours:"diurnal",sound:{callDescription:'Loud nasal "yank yank yank" — unmistakable.',songDescription:'Rapid nasal series: "whi-whi-whi-whi-whi".',loudness:6,callFrequency:7,singingSeason:{spring:"frequent",summer:"moderate",fall:"moderate",winter:"moderate"}},seasons:{spring:{presence:"resident",commonness:"common"},summer:{presence:"resident",commonness:"common"},fall:{presence:"resident",commonness:"common"},winter:{presence:"resident",commonness:"common"}},captureStats:{difficulty:4,speed:5,flightiness:5,camouflage:2,sizeScore:2,movementPattern:"climbing",flightPattern:"undulating",behaviorNotes:"Creeps headfirst down tree trunks, wedging large seeds into bark crevices to hammer open. Very active and alert."},rarity:"common",rarityColor:"#4caf50",points:110,verificationThreshold:.7,verificationMethods:1,description:'The White-breasted Nuthatch is the only bird that routinely walks headfirst down tree trunks, giving it a unique vantage to spot insects that upward-climbing birds miss. Its nasal "yank yank" call is a staple of woodland soundscapes across the continent. It stuffs seeds and nuts into bark crevices, hammering them open — hence the name "nuthatch" from "nuthack."',funFact:"White-breasted Nuthatches smear insects around the entrance of their nest hole — possibly to deter squirrels and other predators with the odor.",eBirdCode:"wbnu",merlinId:"White-breasted_Nuthatch"},{id:"dark_eyed_junco",commonName:"Dark-eyed Junco",scientificName:"Junco hyemalis",family:"Passerellidae",order:"Passeriformes",sizeCategory:"small",length_cm:[13,17],wingspan_cm:[18,25],weight_g:[15,30],appearance:{billShape nce)","White cheek patch","Stout bill"],female:["Plain buff-brown","Broad buffy eyebrow","Streaked back","No bib"],juvenile:["Similar to female"]},plumageDescription:{male:"The breeding male is handsomely marked: chestnut-and-black streaked back, gray crown flanked by chestnut, white cheeks, and a black bib whose size signals social rank.",female:"Plain and streaky brown with a distinctive broad buffy supercilium.",juvenile:"Resembles female."}},primaryHabitat:["urban","suburban","farmyards","buildings"],feedingLayer:"ground",flightStyle:"direct",socialBehavior:{breeding:"colonial",winter:"large_flocks"},typicalGroupSize:{min:5,max:100},activeHours:"diurnal",sound:{callDescription:'Cheerful, unceasing "cheep cheep cheep" — the quintessential urban sparrow.',songDescription:"Series of repeated chirps and cheeps; not melodic.",loudness:5,callFrequency:9,singingSeason:{spring:"frequent",summer:"frequent",fall:"frequent",winter:"frequent"}},seasons:{spring:{presence:"resident",commonness:"very_common"},summer:{presence:"resident",commonness:"very_common"},fall:{presence:"resident",commonness:"very_common"},winter:{presence:"resident",commonness:"very_common"}},captureStats:{difficulty:2,speed:4,flightiness:3,camouflage:4,sizeScore:2,movementPattern:"hopping",flightPattern:"direct",behaviorNotes:"Highly adapted to humans; bold and confiding near buildings and cafes. Forages in noisy flocks."},rarity:"common",rarityColor:"#4caf50",points:70,verificationThreshold:.55,verificationMethods:1,description:"Introduced to New York in 1851, the House Sparrow has colonized every corner of North America where humans live. It's among the world's most abundant birds. Though often overlooked, its success is a study in adaptability — it has evolved measurably in the 170 years since introduction, with different US populations already diverging in body size and bill shape in response to local climates.",funFact:"Male House Sparrows with larger black bibs are dominant and get first access to food and mates — female sparrows prefer males with bigger bibs.",eBirdCode:"houspa",merlinId:"House_Sparrow"},{id:"european_starling",commonName:"European Starling",scientificName:"Sturnus vulgaris",family:"Sturnidae",order:"Passeriformes",sizeCategory:"small",length_cm:[19,22],wingspan_cm:[31,44],weight_g:[58,101],appearance:{billShape:"spear",billSizeRelative:"medium",billColor:{male:"yellow (breeding)",female:"yellow (breeding)"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#2A2A2A",female:"#2A2A2A"},uiColor:"#556B55",distinctiveMarkings:{male:["Iridescent green-purple gloss in breeding plumage","Spotted in winter (spots wear off by spring)","Short tail, triangular wing shape","Yellow bill in spring"],female:["Similar to male; bill base pink in female vs. blue in male"],juvenile:["Plain gray-brown, transitioning to adult spottedness"]},plumageDescription:{male:'In summer a glossy, oil-slick mix of iridescent green and purple. In winter the feather tips show white spots that gradually wear away by spring. The short tail and triangular wing shape make it look like a "flying arrowhead" in flight.',female:"Nearly identical to male; distinguished by the pinkish-tan base to the lower mandible (blue in males).",juvenile:"Uniformly grayish-brown, molting into spotted adult plumage through the first winter."}},primaryHabitat:["urban","farmland","parks","woodland_edge"],feedingLayer:"ground",flightStyle:"direct",socialBehavior:{breeding:"loosely_colonial",winter:"massive_flocks"},typicalGroupSize:{min:1,max:1e5},activeHours:"diurnal",sound:{callDescription:"Raspy, varied — whistles, rattles, clicks, and an extraordinary range of mimicry.",songDescription:"A rambling medley of whistles and rattles, often including perfect mimicry of other birds' calls.",loudness:7,callFrequency:8,singingSeason:{spring:"frequent",summer:"moderate",fall:"moderate",winter:"moderate"}},seasons:{spring:{presence:"resident",commonness:"very_common"},summer:{presence:" ely migratory, many urban populations have gone resident year-round, thriving on parks, golf courses, and manicured lawns. Mated pairs bond for life, and both parents vigorously defend chicks — triggering many a suburban standoff.",funFact:"Geese fly in V-formation because each bird's wingtip vortex creates an uplift for the bird behind. The lead goose works hardest — so the formation rotates leadership to share the effort.",eBirdCode:"cangoo",merlinId:"Canada_Goose"},{id:"osprey",commonName:"Osprey",scientificName:"Pandion haliaetus",family:"Pandionidae",order:"Accipitriformes",sizeCategory:"large",length_cm:[52,60],wingspan_cm:[150,180],weight_g:[1200,2050],appearance:{billShape:"hooked",billSizeRelative:"large",billColor:{male:"blue-gray/black",female:"blue-gray/black"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#3A3020",female:"#3A3020"},uiColor:"#5A8080",distinctiveMarkings:{male:["Dark brown above, white below","White head with bold dark eye stripe","Distinctive wrist patches (dark carpal patches) in flight",'Bowed wings in flight ("M" shape)'],female:["Brown necklace across upper breast"],juvenile:["Pale edges on back feathers give scaled appearance"]},plumageDescription:{male:"Dark chocolate-brown above and bright white below. The white head sports a bold dark stripe through the eye. In flight the long, bowed wings with dark carpal patches are unmistakable — no other raptor looks quite like it.",female:"Nearly identical to male but typically shows a brown necklace across the breast.",juvenile:"Similar to adult but back feathers edged with pale buff, giving a scaled look."}},primaryHabitat:["coastlines","rivers","lakes","estuaries","reservoirs"],feedingLayer:"aerial",flightStyle:"soaring",socialBehavior:{breeding:"monogamous_pairs",winter:"solitary"},typicalGroupSize:{min:1,max:2},activeHours:"diurnal",sound:{callDescription:'High, whistled "cheep-cheep-cheep" or "kyew kyew kyew" — surprisingly small-sounding for such a large bird.',songDescription:"No song; communicates with high whistled calls.",loudness:6,callFrequency:4,singingSeason:{spring:"moderate",summer:"moderate",fall:"occasional",winter:"rare"}},seasons:{spring:{presence:"migrant_and_breeder",commonness:"uncommon"},summer:{presence:"breeder",commonness:"uncommon"},fall:{presence:"migrant",commonness:"uncommon"},winter:{presence:"absent_most_of_US",commonness:"rare"}},captureStats:{difficulty:7,speed:7,flightiness:6,camouflage:2,sizeScore:8,movementPattern:"soaring",flightPattern:"soaring",behaviorNotes:"Hunts by hovering over water then plunge-diving feet-first. Perches conspicuously on dead snags near water. Usually detected by call."},rarity:"uncommon",rarityColor:"#2196f3",points:200,verificationThreshold:.75,verificationMethods:1,description:"The Osprey is a specialist fish hunter found on every continent except Antarctica. It is one of the great conservation success stories — DDT nearly wiped it out, but after the ban it has fully recovered across North America. Watching an Osprey stall in a hover, then fold its wings and plunge 30 feet into water feet-first to seize a fish is one of nature's great spectacles.",funFact:"Ospreys have reversible outer toes and barbed pads on the feet specifically to grip slippery fish — and they always rotate their catch to face forward in flight for aerodynamics.",eBirdCode:"osprey",merlinId:"Osprey"},{id:"eastern_bluebird",commonName:"Eastern Bluebird",scientificName:"Sialia sialis",family:"Turdidae",order:"Passeriformes",sizeCategory:"small",length_cm:[16,21],wingspan_cm:[25,32],weight_g:[27,34],appearance:{billShape:"thin",billSizeRelative:"small",billColor:{male:"black",female:"black"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#1E6DCC",female:"#5A80B0"},uiColor:"#1E6DCC",distinctiveMarkings:{male:["Brilliant royal blue upperparts","Rusty-orange breast and flanks","White belly","Plump shape with thin bill"],female:["Grayish-blue above, paler than male","Washed orange on breast, much paler than male"],juvenile:["Spotted breast like a thrush, blue in wings and tail"]},plumageDescription:{male:"One of North America's most beautiful birds: brilliant royal blue above, warm rusty-orange on the breast and flanks, and clean white below.",female:"Grayish above with blue restricted to wings and tail. Washed orange on the breast — paler and less saturated than the male.",juvenile:"Spotted breast typical of the thrush family, with blue in the wings."}},primaryHabitat:["open_woodland","orchards","farmland","parks","roadsides"],feedingLayer:"multi",flightStyle:"undulating",socialBehavior:{breeding:"monogamous_pairs",winter:"small_flocks"},typicalGroupSize:{min:1,max:15},activeHours:"diurnal",sound:{callDescription:'Soft, melodious "chur-lee" or "tur-a-wee."',songDescription:'A series of mellow, warbled phrases: "tru-al-ly, tru-al-ly" — gentle and musical.',loudness:4,callFrequency:5,singingSeason:{spring:"frequent",summer:"moderate",fall:"occasional",winter:"occasional"}},seasons:{spring:{presence:"resident",commonness:"uncommon"},summer:{presence:"resident",commonness:"uncommon"},fall:{presence:"resident",commonness:"uncommon"},winter:{presence:"resident",commonness:"uncommon"}},captureStats:{difficulty:5,speed:5,flightiness:6,camouflage:1,sizeScore:3,movementPattern:"perching",flightPattern:"undulating",behaviorNotes:"Perches on low branches or fence posts, drops to the ground to take insects. Beautiful but skittish."},rarity:"uncommon",rarityColor:"#2196f3",points:180,verificationThreshold:.75,verificationMethods:1,description:"The Eastern Bluebird is a symbol of happiness and spring across the eastern US. It nearly vanished in the 20th century as competition with introduced House Sparrows and European Starlings for nest cavities sent populations plummeting. A massive citizen-science effort to install nest boxes reversed the decline — millions of boxes now line trails, roadsides, and farmland, and the species has fully recovered.",funFact:"The Eastern Bluebird's color isn't from pigment — the feathers contain no blue dye. The blue is produced by the microscopic structure of the feather barbs scattering light, similar to how the sky is blue.",eBirdCode:"easblu",merlinId:"Eastern_Bluebird"},{id:"ruby_throated_hummingbird",commonName:"Ruby-throated Hummingbird",scientificName:"Archilochus colubris",family:"Trochilidae",order:"Apodiformes",sizeCategory:"tiny",length_cm:[7,9],wingspan_cm:[8,11],weight_g:[2,6],appearance:{billShape:"thin",billSizeRelative:"massive",billColor:{male:"black",female:"black"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#2A5A20",female:"#2A5A20"},uiColor:"#CC1122",distinctiveMarkings:{male:["Iridescent green upperparts","Brilliant ruby-red gorget (throat)","White chest and belly","Forked tail","Hovers at flowers"],female:["Green above, white below","No red throat","Rounded tail with white tips"],juvenile:["Similar to female"]},plumageDescription:{male:"Glittering emerald-green above. The throat gorget blazes ruby-red in good light but looks black at the wrong angle. White chest and belly, notched tail.",female:"Green above, white below with faint streaking on throat. White-tipped outer tail feathers.",juvenile:"Resembles female."}},primaryHabitat:["gardens","woodland_edge","orchards","meadows"],feedingLayer:"aerial",flightStyle:"hovering",socialBehavior:{breeding:"solitary_males",winter:"solitary"},typicalGroupSize:{min:1,max:1},activeHours:"diurnal",sound:{callDescription:'Soft "tseep" or "chewp." Wing beats produce an audible hum.',songDescription:"Series of rapid chipping notes; no true song.",loudness:2,callFrequency:4,singingSeason:{spring:"moderate",summer:"moderate",fall:"rare",winter:"absent"}},seasons:{spring:{presence:"migrant_and_breeder",commonness:"uncommon"},summer:{presence:"breeder",commonness:"uncommon"},fall:{presence:"migrant",commonness:"uncommon"},winter:{presence:"absent",commonness:"absent"}},captureStats:{difficulty:9,speed:10,flightiness:8,camouflage:2,sizeScore:1,movementPattern:"hovering",flightPattern:"hovering",behaviorNotes:"Extremely fast — can fly backwards, sideways, and hover perfectly. Defends feeders and flower patches aggressively. Blink and you miss it."},rarity:"uncommon",rarityColor:"#2196f3",points:250,verificationThreshold:.8,verificationMethods:1,description:"The only hummingbird that breeds in the eastern US, the Ruby-throated is a marvel of miniaturized engineering. Its heart beats over 1,200 times per minute in flight. It crosses the Gulf of Mexico non-stop — 800 miles over open water — twice a year on migration, fueled by fat reserves that double its body weight before departure. A single nest, the size of half a walnut, is made of plant fibers bound with spider silk.",funFact:"A Ruby-throated Hummingbird in migration can double its body weight in fat reserves — then burn it all off crossing the Gulf of Mexico in an 18-20 hour non-stop flight.",eBirdCode:"rthhum",merlinId:"Ruby-throated_Hummingbird"},{id:"cedar_waxwing",commonName:"Cedar Waxwing",scientificName:"Bombycilla cedrorum",family:"Bombycillidae",order:"Passeriformes",sizeCategory:"small",length_cm:[14,17],wingspan_cm:[22,30],weight_g:[30,40],appearance:{billShape:"thin",billSizeRelative:"small",billColor:{male:"black",female:"black"},crestPresent:!0,crestColor:{male:"brown",female:"brown"},primaryColor:{male:"#9B7B55",female:"#9B7B55"},uiColor:"#CC8822",distinctiveMarkings:{male:["Silky warm-brown body","Sleek crest","Black mask","Yellow tail tip","Red waxy wing tips","Lemon-yellow belly"],female:["Nearly identical to male"],juvenile:["Streaky, lacks wax tips; face mask faint"]},plumageDescription:{male:"One of the most elegantly-groomed birds in North America. Silky warm-brown with a sleek crest, black mask, lemon-yellow belly, yellow tail tip, and the namesake red waxy droplets on wing feather tips.",female:"Nearly identical to male; slightly less red wax, slighter mask.",juvenile:"Streaky brown, lacks wax tips until first winter."}},primaryHabitat:["woodland","orchards","gardens","fruiting_trees","streamsides"],feedingLayer:"canopy",flightStyle:"undulating",socialBehavior:{breeding:"loose_colonies",winter:"nomadic_flocks"},typicalGroupSize:{min:5,max:200},activeHours:"diurnal",sound:{callDescription:'High, thin "seee" — a pure high-pitched whistle, often the first sign of a passing flock overhead.',songDescription:'High trilled "sreeee"; thin whistle notes.',loudness:4,callFrequency:8,singingSeason:{spring:"frequent",summer:"frequent",fall:"moderate",winter:"moderate"}},seasons:{spring:{presence:"resident",commonness:"uncommon"},summer:{presence:"resident",commonness:"uncommon"},fall:{presence:"nomadic",commonness:"common"},winter:{presence:"nomadic",commonness:"common"}},captureStats:{difficulty:6,speed:6,flightiness:6,camouflage:3,sizeScore:3,movementPattern:"perching",flightPattern:"undulating",behaviorNotes:"Appears suddenly in fruiting trees, strips them, and moves on. Listen for the high seee calls overhead. Flocks are compact and coordinated."},rarity:"uncommon",rarityColor:"#2196f3",points:200,verificationThreshold:.75,verificationMethods:1,description:"Cedar Waxwings are wandering nomads, following fruit crops across the continent rather than fixed territories. They are famous for their elegant appearance and for passing berries beak-to-beak down a perched line of birds — a social display of fruit-sharing. They have been observed getting drunk on fermented berries, stumbling around until they sober up.",funFact:"Cedar Waxwings sometimes pass berries beak-to-beak down a row of perched birds — apparently a courtship or social bonding behavior. They also get intoxicated on fermented fruits and have been found unable to fly.",eBirdCode:"cedwax",merlinId:"Cedar_Waxwing"},{id:"turkey_vulture",commonName:"Turkey Vulture",scientificName:"Cathartes aura",family:"Cathartidae",order:"Cathartiformes",sizeCategory:"very_large",length_cm:[62,81],wingspan_cm:[160,1 y by smell — extraordinarily rare among birds — using one of the most highly developed olfactory systems in the animal kingdom. Its stomach acid is powerful enough to destroy anthrax, botulism, and cholera, preventing these diseases from spreading through the environment.",funFact:"Turkey Vultures are one of the only birds that find food primarily by smell. They have a greatly enlarged olfactory lobe in the brain and can detect a dead animal hidden under forest canopy from a mile away.",eBirdCode:"turvul",merlinId:"Turkey_Vulture"},{id:"common_grackle",commonName:"Common Grackle",scientificName:"Quiscalus quiscula",family:"Icteridae",order:"Passeriformes",sizeCategory:"small",length_cm:[28,34],wingspan_cm:[36,46],weight_g:[74,142],appearance:{billShape:"spear",billSizeRelative:"large",billColor:{male:"black",female:"black"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#1A1A1A",female:"#3A3030"},uiColor:"#7744AA",distinctiveMarkings:{male:["Iridescent blue-purple head","Bronze or purple gloss on body","Long keel-shaped tail","Pale yellow eye","Walks with tail cocked up"],female:["Less iridescent, shorter tail, brown tones"],juvenile:["Brown, dark eye"]},plumageDescription:{male:"Large and long-tailed. The head and neck gloss iridescent blue-purple; the body shows bronze or purple iridescence. The pale yellow eye is striking. Males cock the long, keel-shaped tail in a distinctive V-shape when walking.",female:"Less iridescent, shorter tail, brownish tones. Still shows some purple gloss.",juvenile:"Brown overall with a dark eye."}},primaryHabitat:["urban","suburban","farmland","woodland_edge","parks"],feedingLayer:"ground",flightStyle:"direct",socialBehavior:{breeding:"loose_colonies",winter:"massive_flocks"},typicalGroupSize:{min:1,max:1e4},activeHours:"diurnal",sound:{callDescription:'Loud, harsh "chak." Squeaky, creaky song like a rusty gate.',songDescription:'"Readle-eak" — a loud, squeaky, grinding note that sounds mechanical.',loudness:7
