ess:3,camouflage:4,sizeScore:2,movementPattern:"darting",flightPattern:"undulating",behaviorNotes:"Tiny and hyperactive — never still for more than a few seconds. Hangs upside-down from branch tips to reach insects. Paradoxically bold around humans; will sometimes land on an outstretched hand at feeders. The challenge is their size and constant motion."},rarity:"common",rarityColor:"#4caf50",points:120,verificationThreshold:.66,verificationMethods:1,description:`Possibly the most cheerful bird in North America. Chickadees stay through the harshest winters, traveling in small flocks through frozen forests, finding insects in bark crevices that no other bird can reach. They have a sophisticated social system and can lower their body temperature at night to conserve energy — a feat called "regulated hypothermia." Their alarm calls carry so much information about a predator's size, speed, and danger level that other species have learned to listen.`,funFact:"Every autumn, a chickadee's hippocampus (the memory center of the brain) actually grows larger to handle thousands of new food cache locations. It shrinks again in spring.",eBirdCode:"bkcchi",merlinId:"Black-capped_Chickadee"},{id:"american_goldfinch",commonName:"American Goldfinch",scientificName:"Spinus tristis",family:"Fringillidae",order:"Passeriformes",sizeCategory:"tiny",length_cm:[11,14],wingspan_cm:[19,22],weight_g:[11,20],appearance:{billShape:"conical",billSizeRelative:"small",billColor:{male:"pink-orange",female:"dull-pink"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#FFD700",female:"#B8A840"},uiColor:"#FFD700",secondaryColors:{male:["#1A1A1A (forehead cap, wings, tail)","#FAFAFA (wing bars, rump)","#F0A040 (bill)"],female:["#B8A840 (olive-yellow body)","#1A1A1A (wings)","#FAFAFA (wing bars)"]},distinctiveMarkings:{male:["Brilliant lemon-yellow body (breeding)","Black forehead cap","Black wings with white wing bars","White rump","Stubby pink-orange bill","Winter: olive-yellow, no black cap"],female:["Dull olive-yellow; no black cap","White wing bars on black-ish wings","Paler below than above","Year-round plumage similar to male winter"],juvenile:["Similar to female; buffy wing bars instead of white"]},plumageDescription:{male:"Summer male is electric: pure lemon-yellow with a small black cap on the forehead, jet-black wings with white wing bars, white rump. Winter male molts to olive-yellow, loses the black cap, and becomes almost unrecognizable until spring.",female:"Olive-yellow throughout the year — brighter in summer, duller in winter. Black wings with white bars. Often overlooked despite being present at most nyjer seed feeders.",juvenile:"Resembles female; buffy rather than white wing bars. Acquires adult plumage in first autumn."}},primaryHabitat:["fields","meadows","weedy_areas","feeders","open_woodland"],feedingLayer:"shrub",flightStyle:"undulating",socialBehavior:{breeding:"loose_colonies",winter:"flocks"},typicalGroupSize:{min:2,max:40},activeHours:"diurnal",sound:{callDescription:'"Per-chick-o-ree" or "po-ta-to-chip" call given in flight — this bouncy phrase perfectly matches the undulating flight pattern.',songDescription:"Long, canary-like warble of rapid twitters, trills, and chips. Energetic and sustained.",loudness:5,callFrequency:8,singingSeason:{spring:"moderate",summer:"frequent",fall:"occasional",winter:"rare"},sounds:["per-chick-o-ree","song-warble","contact-call"]},seasons:{spring:{presence:"resident",commonness:"common"},summer:{presence:"summer",commonness:"common"},fall:{presence:"migrant",commonness:"common"},winter:{presence:"winter",commonness:"uncommon"}},range:"north_america",captureStats:{difficulty:5,speed:6,flightiness:5,camouflage:2,sizeScore:2,movementPattern:"darting",flightPattern:"undulating",behaviorNotes:"Feeds acrobatically on seed heads — hanging sideways, upside-down. In flocks, individuals are scattered and constantly moving. The undulating flight — rise on wingbeats, dip on wing-fold — makes tracking in binoculars tricky."},rarity:"common",rarityColor:"#4caf50",points:115,verificationThreshold:.66,verificationMethods:1,description:"New Jersey's state bird and a frequent visitor to nyjer seed feeders. The male in breeding plumage is one of the most vivid birds in North America — a flying lemon with a black beret. Goldfinches are unusual songbirds in that they wait until July or August to nest, timing their breeding to peak thistle-seed abundance. They weave spider silk into their nests, which stretches as the nestlings grow.",funFact:"Goldfinch nests are so tightly woven they can hold water. If it rains during an early cold snap, the young have been known to drown — one reason late breeding evolved.",eBirdCode:"amegfi",merlinId:"American_Goldfinch"},{id:"mallard",commonName:"Mallard",scientificName:"Anas platyrhynchos",family:"Anatidae",order:"Anseriformes",sizeCategory:"medium",length_cm:[50,65],wingspan_cm:[81,98],weight_g:[720,1600],appearance:{billShape:"spatulate",billSizeRelative:"large",billColor:{male:"yellow-orange",female:"orange-black mottled"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#2D6B4A",female:"#8B6914"},uiColor:"#2D6B4A",secondaryColors:{male:["#2D6B4A (iridescent green head)","#FAFAFA (neck ring)","#8B3A2A (chestnut breast)","#C8C8C8 (gray flanks)","#1A1A1A (black stern)","#E8B830 (bill)"],female:["#8B6914 (mottled brown overall)","#FF8C00 (orange sides of bill)","#5B7F9E (speculum)","#FAFAFA (tail)"]},distinctiveMarkings:{male:["Iridescent green head","Thin white neck ring","Chestnut-brown breast","Gray body","Black rear end with curled tail feathers","Yellow-orange bill","Blue-purple speculum (wing patch)"],female:["Mottled brown streaky overall","Orange bill with black splotches","Dark eye stripe","Blue-purple speculum with white borders","Pale orange legs"],juvenile:["Resembles female; gains adult plumage through first winter"]},plumageDescription:{male:'Breeding male is a gallery piece: iridescent bottle-green head (that changes color angle to angle), separated by a crisp white neck ring from a chestnut breast. Gray flanks, black rump, and a distinctive curled black tail feather ("sex feather"). Bill bright yellow-orange.',female:"Mottled brown — perfectly camouflaged for nesting. Her orange bill shows black blotching. The blue-purple speculum (wing patch) flashes in flight on both sexes.",juvenile:"Resembles female initially. Males begin showing green head by November of their first year."}},primaryHabitat:["ponds","lakes","rivers","wetlands","parks","urban_water"],feedingLayer:"water",flightStyle:"direct",socialBehavior:{breeding:"pairs",winter:"large_flocks"},typicalGroupSize:{min:2,max:100},activeHours:"diurnal",sound:{callDescription:'Iconic "quack" — actually a female call. Males make a softer, nasal "raeb-raeb". Both sexes grunt, whistle, and murmur.',songDescription:`Not a songbird; uses calls for communication. The female's loud descending "quack-quack-quack" is the "duck sound" of cultural memory.`,loudness:7,callFrequency:6,singingSeason:{spring:"frequent",summer:"moderate",fall:"moderate",winter:"moderate"},sounds:["quack","raeb","grunt","whistle"]},seasons:{spring:{presence:"resident",commonness:"abundant"},summer:{presence:"resident",commonness:"common"},fall:{presence:"resident",commonness:"abundant"},winter:{presence:"resident",commonness:"common"}},range:"northern_hemisphere",captureStats:{difficulty:2,speed:2,flightiness:3,camouflage:4,sizeScore:8,movementPattern:"swimming",flightPattern:"direct",behaviorNotes:"Swims slowly on open water; dabbles with head submerged for aquatic vegetation. Accustomed to humans in urban parks — often approaches rather than flees. Large size makes centering easy; slow movement means patience is the only skill required."},rarity:"common",rarityColor:"#4caf50",points:90,verificationThreshold:.66,verificationMethods:1,description:"The world's most familiar duck and the ancestor of almost every domestic duck breed. Mallards are found on every continent except Antarctica and have adapted perfectly to city parks, drainage ditches, and golf course ponds. Watch for the courtship displays in winter — groups of males circle females with elaborate head-pumping, wing-flap, and whistle sequences that look choreographed.",funFact:'Mallards can sleep with one eye open and half their brain awake — a phenomenon called unihemispheric slow-wave sleep. Ducks at the edge of a flock keep the "outer eye" open, watching for predators.',eBirdCode:"mallar3",merlinId:"Mallard"},{id:"red_tailed_hawk",commonName:"Red-tailed Hawk",scientificName:"Buteo jamaicensis",family:"Accipitridae",order:"Accipitriformes",sizeCategory:"large",length_cm:[45,65],wingspan_cm:[110,145],weight_g:[690,1460],appearance:{billShape:"hooked",billSizeRelative:"large",billColor:{male:"gray-yellow",female:"gray-yellow"},crestPresent:!1,crestColor:{male:null,female:null},primaryColor:{male:"#8B6030",female:"#8B6030"},uiColor:"#C85020",secondaryColors:{male:["#C85020 (rufous-red tail, adults only)","#8B6030 (brown above)","#F5E6C8 (pale below)","#1A1A1A (belly band)","#F0C030 (cere, feet)"],female:["Same — sexes look identical; females are larger"]},distinctiveMarkings:{male:["Brick-red upper tail (adults; visible from above in flight)","Dark brown above",'Pale buffy below with dark "belly band" of streaking',"Hooked yellow-cere bill","Yellow taloned feet","Short, broad wings; short tail in soaring silhouette"],female:["Identical to male in plumage; notably larger in body size"],juvenile:["No red tail — brown barred tail instead","Yellow iris (adults have dark brown)","Heavily streaked breast and belly"]},plumageDescription:{male:"A large, bulky buteo with broad rounded wings and a short tail. The field mark that names it: the brick-red upper tail surface, visible as the bird banks in a soar. Below, pale body with a band of dark streaking across the belly. Brown above. Many color variants exist across its range.",female:"Identica funFact:"Red-tailed Hawks can see ultraviolet light, which makes rodent urine trails glow — a built-in tracking system that leads them directly to vole runways.",eBirdCode:"rethaw",merlinId:"Red-tailed_Hawk"},{id:"great_blue_heron",commonName:"Great Blue Heron",scientificName:"Ardea herodias",family:"Ardeidae",order:"Pelecaniformes",sizeCategory:"very_large",length_cm:[91,137],wingspan_cm:[167,201],weight_g:[1820,3630],appearance:{billShape:"spear",billSizeRelative:"massive",billColor:{male:"yellow-orange",female:"yellow-orange"},crestPresent:!0,crestColor:{male:"black-white",female:"black-white"},primaryColor:{male:"#6080A0",female:"#6080A0"},uiColor:"#6080A0",secondaryColors:{male:["#6080A0 (blue-gray body)","#FAFAFA (white head)","#1A1A1A (black eyestripe)","#C8A060 (rusty thighs)","#F5E6C8 (plumes)"],female:["Identical to male"]},distinctiveMarkings:{male:["White head with black eyestripe extending to black plume","Blue-gray body","Chestnut-rusty thighs","Long yellow-orange dagger bill","Long black plumes on back and breast","S-curved neck in flight (diagnostic for herons vs. cranes)","Stands 4 feet tall"],female:["Identical to male in plumage"],juvenile:["All gray-brown head (no white or plumes)","Dark cap solid black","Streaked neck","Duller overall"]},plumageDescription:{male:"Prehistoric in scale — North America's largest heron. Blue-gray plumage, white face with a black stripe running from behind the eye to trailing black plumes, and a massive yellow-orange spear bill. The neck is folded into a tight S-curve at rest and in flight (a field mark separating herons from cranes, which fly with necks extended).",female:"Identical to male. Females may average slightly smaller but are not reliably distinguished in the field.",juvenile:"Lacks the white head and ornamental plumes of adults. Dark-capped, brownish, and streaked. Earns adult plumage over two years."}},primaryHabitat:["marshes","lakeshores","rivers","tidal_flats","ponds","flooded_fields"],feedingLayer:"w
